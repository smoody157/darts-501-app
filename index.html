<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dart Room – Dart Calculator</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background:#000; overflow:hidden; font-family: Arial, Helvetica, sans-serif; }

    /* Stage centers the background image */
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    /* We render the background as an <img> so we can read its true size and compute a perfect math transform */
    #bg {
      position: absolute;
      left: 0;
      top: 0;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      opacity: 0; /* hidden; used only to compute sizing */
      pointer-events: none;
    }

    /* The visible background layer */
    #bg-visible {
      position: absolute;
      left: 0;
      top: 0;
      width: 0px; /* set by JS */
      height: 0px; /* set by JS */
      background-image: url("OUTCHARTAPP.jpeg");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Overlay is in BASE coordinate space (430x932), then we apply a single transform (scale + translate) */
    #overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 430px;
      height: 932px;
      transform-origin: top left;
    }

    /* Text styles */
    .neon {
      background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      text-align: center;
      filter: drop-shadow(0 0 10px rgba(0,210,255,0.55));
    }

    #score {
      position: absolute;
      top: 232px;
      left: 0;
      width: 430px;
      font-size: 92px;
      line-height: 1;
    }

    #brand {
      position: absolute;
      top: 176px; /* moved down slightly per header spacing */
      left: 0;
      width: 430px;
      text-align: center;
      font-size: 10px; /* resized to fit between gold borders */
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.80);
      text-shadow: 0 0 8px rgba(255,255,255,0.15);
      font-weight: 700;
    }

    .dart-label {
      position: absolute;
      width: 105px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.75);
      font-weight: 800;
      text-shadow: 0 0 8px rgba(255,255,255,0.12);
    }

    .dart-val {
      position: absolute;
      width: 105px;
      text-align: center;
      font-size: 25px;
      line-height: 1;
    }

    /* Dart labels ABOVE values, per your request */
    #dl1 { top: 408px; left: 40px; }
    #dl2 { top: 408px; left: 164px; }
    #dl3 { top: 408px; left: 288px; }
    #d1  { top: 424px; left: 40px; }
    #d2  { top: 424px; left: 164px; }
    #d3  { top: 424px; left: 288px; }

    #input {
      position: absolute;
      top: 468px;
      left: 0;
      width: 430px;
      font-size: 52px;
      text-align: center;
      color: #72d6ff;
      text-shadow: 0 0 15px rgba(0,210,255,0.65);
      font-weight: 900;
    }

    /* Top header bar */
    #topbar{
      position:absolute;
      top: 14px;
      left: 14px;
      width: 402px; /* 430 - 28 padding */
      display:flex;
      align-items:center;
      justify-content:space-between;
      pointer-events:none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(130,220,255,0.95);
      text-shadow: 0 0 10px rgba(0,210,255,0.25);
    }
    #topLeft, #topRight{ color: rgba(255,255,255,0.72); text-shadow: 0 0 8px rgba(0,0,0,0.5); }
    #topCenter{ color: rgba(130,220,255,0.95); }

    #version {
      position: absolute;
      top: 24px;
      right: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 0 6px rgba(0,0,0,0.45);
    }

    /* Invisible hit zones (buttons) */
    .hit {
      position: absolute;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }

    /* Mode buttons - aligned to your original coords */
    .mode { top: 375px; width: 60px; height: 40px; }
    #m301 { left: 125px; }
    #m501 { left: 185px; }
    #m701 { left: 245px; }

    /* Keypad grid area (3 columns). We map each cell precisely. */
    #pad {
    position:absolute;
    left:50px;
    top:560px;
    width:330px;
    height:300px;
    display:grid;
    grid-template-columns:110px 110px 110px;
    grid-template-rows:75px 75px 75px 75px;
    gap: 0px;
}
    #pad .hit { position: relative; width: 100%; height: 100%; }

    /* Apply button */
    #apply { bottom: 30px; left: 50px; width: 330px; height: 70px; }
#footer {
      position: absolute;
      left: 0;
      bottom: 6px;
      width: 430px;
      text-align: center;
      font-size: 9px;
      color: rgba(255,255,255,0.70);
      text-shadow: 0 0 8px rgba(0,0,0,0.55);
      background: transparent;
      pointer-events:none;
    }
  </style>
</head>

<body>
  <div id="stage">
    <!-- hidden loader img for true dimensions -->
    <img id="bg" src="OUTCHARTAPP.jpeg" alt="bg" />

    <!-- visible background -->
    <div id="bg-visible"></div>

    <!-- overlay in base coordinate space -->
    <div id="overlay">
      <div id="topbar" aria-hidden="true">
        <div id="topLeft">DART CALCULATOR</div>
        <div id="topCenter">v1.0.0</div>
        <div id="topRight">THE DART ROOM</div>
      </div>
<div id="brand">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>

      <div id="score" class="neon">501</div>

      <div id="dl1" class="dart-label">DART 1</div>
      <div id="dl2" class="dart-label">DART 2</div>
      <div id="dl3" class="dart-label">DART 3</div>

      <div id="d1" class="neon dart-val">-</div>
      <div id="d2" class="neon dart-val">-</div>
      <div id="d3" class="neon dart-val">-</div>

      <div id="input">---</div>

      <!-- Mode hit zones -->
      <button id="m301" class="hit mode" aria-label="301" onclick="APP.set(301)"></button>
      <button id="m501" class="hit mode" aria-label="501" onclick="APP.set(501)"></button>
      <button id="m701" class="hit mode" aria-label="701" onclick="APP.set(701)"></button>

      <!-- Keypad hit zones (invisible, aligned to artwork keypad grid) -->
      <div id="pad" aria-label="Keypad">
        <button class="hit" onclick="APP.key(7)"></button>
        <button class="hit" onclick="APP.key(8)"></button>
        <button class="hit" onclick="APP.key(9)"></button>
        <button class="hit" onclick="APP.key(4)"></button>
        <button class="hit" onclick="APP.key(5)"></button>
        <button class="hit" onclick="APP.key(6)"></button>
        <button class="hit" onclick="APP.key(1)"></button>
        <button class="hit" onclick="APP.key(2)"></button>
        <button class="hit" onclick="APP.key(3)"></button>
        <button class="hit" onclick="APP.clr()" aria-label="Delete"></button>
        <button class="hit" onclick="APP.key(0)" aria-label="Zero"></button>
        <button class="hit" onclick="APP.donate()" aria-label="Donate"></button>
      </div>

      <!-- Apply hit zone -->
      <button id="apply" class="hit" aria-label="Apply Turn" onclick="APP.apply()"></button>
<div id="footer">Dart Calculator is owned by The Dart Room. © The Dart Room. All Rights Reserved.</div>
    </div>
  </div>

<script>
/**
 * MATH-LOCKED LAYOUT (NO GUESSING):
 * - Background image provides the coordinate system.
 * - Overlay is built in base coordinates (430x932).
 * - We compute ONE transform to fit the background into the viewport.
 * - All hitboxes/text move together, so nothing “floats”.
 */
(function fitToBackground(){
  const bg = document.getElementById('bg');
  const bgVisible = document.getElementById('bg-visible');
  const overlay = document.getElementById('overlay');
  const stage = document.getElementById('stage');

  function applyFit() {
    const Wb = bg.naturalWidth || 430;
    const Hb = bg.naturalHeight || 932;

    const Wv = stage.clientWidth;
    const Hv = stage.clientHeight;

    // Fit entire image into viewport (contain), but reserve a small safe-bottom
    // so the APPLY TURN button is never cut off by browser UI.
    const SAFE_BOTTOM = 10; // px in viewport space
    const scale = Math.min(Wv / Wb, (Hv - SAFE_BOTTOM) / Hb);

    const drawW = Math.round(Wb * scale);
    const drawH = Math.round(Hb * scale);

    const offsetX = Math.round((Wv - drawW) / 2);
    const offsetY = Math.round(((Hv - SAFE_BOTTOM) - drawH) / 2);

    // Visible background sized/positioned
    bgVisible.style.left = offsetX + 'px';
    bgVisible.style.top = offsetY + 'px';
    bgVisible.style.width = drawW + 'px';
    bgVisible.style.height = drawH + 'px';

    // If the jpeg name is wrong, fall back to outs.jpg automatically
    // (GitHub is case-sensitive.)
    bgVisible.style.backgroundImage = "url('OUTCHARTAPP.jpeg'), url('outs.jpg')";

    // Overlay transform: translate to offset, scale to match drawn bg,
    // and also correct from base (430x932) to actual bg pixels (Wb,Hb)
    // by scaling base-to-bg first, then viewport scale.
    const baseW = 430, baseH = 932;
    const sx = (Wb / baseW) * scale;
    const sy = (Hb / baseH) * scale;

    overlay.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${sx}, ${sy})`;
  }

  function onReady(){
    applyFit();
    window.addEventListener('resize', applyFit, { passive:true });
  }

  bg.addEventListener('load', onReady);

  // If OUTCHARTAPP.jpeg fails to load, fall back to outs.jpg
  bg.addEventListener('error', () => {
    bg.src = 'outs.jpg';
  });

  // In some caches, load may have already fired
  if (bg.complete) {
    if (bg.naturalWidth) onReady();
    else bg.src = 'outs.jpg';
  }
})();

/* APP LOGIC (ALL BUTTONS ACTIVE) */
/* APP LOGIC (CHECKOUT RECOMMENDER) */
const APP = {
  s: 501,
  i: "",

  draw(){
    document.getElementById('score').innerText = this.s;
    document.getElementById('input').innerText = this.i || "---";
  },

  set(n){
    this.s = n;
    this.i = "";
    this.draw();
    this.updateOut(); // recommendations depend on remaining score
  },

  key(n){
    if (this.i.length < 3) {
      this.i += String(n);
      this.draw();
    }
  },

  clr(){
    this.i = "";
    this.draw();
  },

  // --- CHECKOUT ENGINE (math instead of a hard-coded chart) ---
  // Standard segments: S1-20, D1-20, T1-20, SB(25), BULL(50).
  // We require the LAST dart to be a double (D1-20) or BULL(50) for a valid out.
  // If no out (or score > 170), we show "-" in the dart boxes.
  updateOut(){
    const [a,b,c] = CHECKOUT.best(this.s);
    document.getElementById('d1').innerText = a || "-";
    document.getElementById('d2').innerText = b || "-";
    document.getElementById('d3').innerText = c || "-";
  },

  apply(){
    const v = parseInt(this.i, 10);
    if (!isNaN(v)) {
      const next = this.s - v;

      // Bust rules (simple): cannot go below 0 or to 1
      if (next < 0 || next === 1) {
        this.i = "";
        this.draw();
        return;
      }

      this.s = next;
      this.i = "";
      this.draw();
      this.updateOut();
      return;
    }

    // if nothing entered, just clear
    this.i = "";
    this.draw();
  },

  donate(){
    window.open("https://venmo.com/u/Steve-Moody-8", "_blank");
  }
};

const CHECKOUT = (() => {
  const shots = [];

  // Singles / Doubles / Triples 1..20
  for (let n=1; n<=20; n++){
    shots.push({t:`S${n}`, v:n,  f:`${n}`});
    shots.push({t:`D${n}`, v:2*n, f:`D${n}`});
    shots.push({t:`T${n}`, v:3*n, f:`T${n}`});
  }
  // Bulls
  shots.push({t:"SB", v:25, f:"SB"});
  shots.push({t:"BULL", v:50, f:"BULL"});

  const isFinisher = (s) => s.t.startsWith("D") || s.t === "BULL";

  // Heuristic scoring: prefer fewer darts, prefer higher first dart, prefer T20, then T19, then bulls,
  // and avoid awkward singles when a better setup exists.
  function rank(combo){
    // combo is array of shot objects length 1..3
    let score = 0;

    // fewer darts better
    score -= combo.length * 1000;

    // prefer high first dart value
    score -= (200 - combo[0].v);

    // prefer T20, T19 for first dart if same value region
    const first = combo[0].t;
    if (first === "T20") score -= 60;
    if (first === "T19") score -= 40;
    if (first === "T18") score -= 20;

    // prefer double-20/double-16/double-18 finishes
    const last = combo[combo.length-1].t;
    if (last === "D20") score -= 30;
    if (last === "D16") score -= 24;
    if (last === "D18") score -= 18;
    if (last === "BULL") score -= 10;

    return score;
  }

  function best(remaining){
    // Standard out table only guarantees up to 170. Beyond that, show blanks.
    if (remaining < 2 || remaining > 170) return ["-","-","-"];

    let bestCombo = null;
    let bestRank = Infinity;

    // 1 dart
    for (const a of shots){
      if (!isFinisher(a)) continue;
      if (a.v === remaining){
        const combo = [a];
        const r = rank(combo);
        if (r < bestRank){ bestRank = r; bestCombo = combo; }
      }
    }

    // 2 darts
    for (const a of shots){
      for (const b of shots){
        if (!isFinisher(b)) continue;
        if (a.v + b.v === remaining){
          const combo = [a,b];
          const r = rank(combo);
          if (r < bestRank){ bestRank = r; bestCombo = combo; }
        }
      }
    }

    // 3 darts
    for (const a of shots){
      for (const b of shots){
        for (const c of shots){
          if (!isFinisher(c)) continue;
          if (a.v + b.v + c.v === remaining){
            const combo = [a,b,c];
            const r = rank(combo);
            if (r < bestRank){ bestRank = r; bestCombo = combo; }
          }
        }
      }
    }

    if (!bestCombo) return ["-","-","-"];

    const out = bestCombo.map(x => x.f);
    while (out.length < 3) out.push("-");
    return out;
  }

  return { best };
})();

APP.draw();
APP.updateOut();
</script>
</body>
</html>
