<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dart Calculator</title>
<style>
  html, body {
    margin:0; padding:0; width:100%; height:100%;
    background:#000; overflow:hidden;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color: transparent;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  /* Center a fixed 430x932 stage and scale it to fit */
  #wrap {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #stage {
    position:relative;
    width:430px; height:932px;
    transform-origin: top left;
    background: url('OUTCHARTAPP.jpeg') no-repeat 0 0 / 430px 932px; /* prevents stray top-left text */
  }

  /* Overlay */
  #overlay {
    position:absolute; inset:0;
    pointer-events:none; /* overlays never block taps */
  }

  /* Header bar */
  #topbar{
    position:absolute;
    top: 26px;
    left: 14px;
    width: 402px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index: 80;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }
  #topLeft, #topRight{
    color: rgba(0,0,0,0.85);
    font-weight: 900;
    white-space:nowrap;
  }
  #topCenter{
    color: rgba(0,140,255,0.95);
    font-weight: 900;
    text-shadow: 0 0 10px rgba(0,140,255,0.25);
    white-space:nowrap;
  }

  /* Brand line (centered between gold borders) */
  #brand {
    position:absolute;
    top: 168px;
    left: 0;
    width: 430px;
    text-align:center;
    font-size: 8px;
    letter-spacing: 1.1px;
    color: rgba(255,255,255,0.78);
    text-shadow: 0 0 8px rgba(255,255,255,0.12);
    font-weight: 800;
    z-index: 6;
  }

  #scoreLabel {
    position:absolute;
    top: 210px;
    left: 0;
    width: 430px;
    text-align:center;
    font-size: 18px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 0 10px rgba(0,0,0,0.55);
    font-weight: 900;
    z-index: 6;
  }

  /* Remaining score (DO NOT MOVE) */
  #score {
    position:absolute;
    top: 205px;
    left: 0;
    width: 430px;
    text-align:center;
    font-size: 86px;
    line-height: 1;
    color: rgba(255,255,255,0.98);
    text-shadow: 0 0 18px rgba(255,255,255,0.12), 0 0 18px rgba(0,0,0,0.55);
    font-weight: 900;
    z-index: 6;
  }

  /* Dart labels + values */
  .dart-label, .dart-val {
    position:absolute;
    width: 120px;
    text-align:center;
    z-index: 6;
  }
  .dart-label {
    font-size: 14px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.70);
    text-shadow: 0 0 10px rgba(0,0,0,0.55);
    font-weight: 900;
  }
  .dart-val {
    font-size: 26px;
    letter-spacing: 1px;
    color: rgba(130,220,255,0.95);
    text-shadow: 0 0 12px rgba(0,210,255,0.25);
    font-weight: 900;
  }

  /* X tweaks: DART 1 slightly left, DART 3 slightly right; values follow */
  #dl1 { top: 372px; left: 36px; }
  #d1  { top: 388px; left: 36px; }

  #dl2 { top: 372px; left: 164px; }
  #d2  { top: 388px; left: 164px; }

  #dl3 { top: 372px; left: 292px; }
  #d3  { top: 388px; left: 292px; }

  /* Typed input shown in the small rectangle (high-contrast) */
  #input {
    position:absolute;
    top: 486px;
    left: 132px;
    width: 166px;
    height: 46px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 34px;
    color: rgba(0,0,0,0.88);
    text-shadow: none;
    font-weight: 900;
    letter-spacing: 3px;
    z-index: 6;
  }

  /* Mode buttons (touch) */
  .mode {
    position:absolute;
    top: 305px;
    width: 110px;
    height: 48px;
    background: transparent;
    border: none;
    outline: none;
    z-index: 80;
    pointer-events:auto;
    touch-action: manipulation;
  }
  #m301 { left: 52px; }
  #m501 { left: 160px; }
  #m701 { left: 268px; }

  /* Mode label overlays: lower + centered inside borders */
  .modeText {
    position:absolute;
    top: 318px; /* lowered */
    width: 110px;
    height: 48px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 18px;
    font-weight: 900;
    color: rgba(255,255,255,0.90);
    text-shadow: 0 0 10px rgba(0,0,0,0.60);
    z-index: 6;
  }
  #t301 { left: 52px; }
  #t501 { left: 160px; }
  #t701 { left: 268px; }

  /* Keypad grid (touch layer) */
  #pad {
    position:absolute;
    left:50px;
    top:560px;
    width:330px;
    height:300px;
    display:grid;
    grid-template-columns:110px 110px 110px;
    grid-template-rows:75px 75px 75px 75px;
    gap:0px;
    z-index: 70;
    pointer-events:auto;
  }
  #pad button {
    width:100%; height:100%;
    background: transparent;
    border:none; outline:none;
    pointer-events:auto;
    touch-action: manipulation;
  }

  /* Apply Turn */
  #apply {
    position:absolute;
    left: 50px;
    top: 870px;
    width: 330px;
    height: 54px;
    background: transparent;
    border:none; outline:none;
    z-index: 80;
    pointer-events:auto;
    touch-action: manipulation;
  }

  /* Donate patch + rewritten text (NOT on touchpads) */
  #donateMask{
    position:absolute;
    top: 560px;
    left: 50px;
    transform: translate(224px, 229px); /* inset */
    width: 102px;
    height: 67px;
    border-radius: 12px;
    background: rgba(0,0,0,0.62);
    mix-blend-mode: multiply;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    opacity: 0.92;
    z-index: 10;
  }
  #donateText{
    position:absolute;
    top: 560px;
    left: 50px;
    transform: translate(224px, 229px);
    width: 102px;
    height: 67px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size: 1px; /* half of 2px */
    line-height: 1.05;
    font-weight: 900;
    letter-spacing: 0.15px;
    color: rgba(255,85,170,0.95);
    text-shadow: none;
    z-index: 11;
  }

  /* Footer */
  #footer {
    position:absolute;
    left:0;
    bottom:10px;
    width:430px;
    text-align:center;
    font-size:9px;
    color: rgba(255,255,255,0.70);
    text-shadow: 0 0 8px rgba(0,0,0,0.55);
    z-index: 6;
  }
</style>
</head>

        <div id="topbar" aria-hidden="true">

          <div id="topRight">THE DART ROOM</div>

        <div id="dl1" class="dart-label">DART 1</div>
        <div id="dl2" class="dart-label">DART 2</div>
        <div id="dl3" class="dart-label">DART 3</div>
        <div id="d1" class="dart-val">-</div>

        <div id="donateMask" aria-hidden="true"></div>

      <button id="m301" class="mode" onclick="APP.set(301)" aria-label="301"></button>

        <button onclick="APP.donate()" aria-label="Donate"></button>
      </div>

      <button id="apply" onclick="APP.apply()" aria-label="Apply Turn"></button>

      <div id="overlay">
        <div id="footer">Dart Calculator is owned by The Dart Room. © The Dart Room. All Rights Reserved.</div>
      </div>
    </div>
  </div>

  function fmtShot(s){
    if (!s) return "-";
    s = String(s).trim().toUpperCase();
    if (s === "SB" || s === "S25") return "B";
    if (s === "DB" || s === "BULL" || s === "D25") return "DB";
    return s;
  }

  const APP = {
    s: 501,
    i: "",

    draw(){
      document.getElementById('score').innerText = this.s;
      document.getElementById('input').innerText = this.i || "---";
    },

    set(n){
      this.s = n;
      this.i = "";
      this.draw();
      this.updateOut();
    },

    key(n){
      if (this.i.length < 3) {
        this.i += String(n);
        this.draw();
      }
    },

    clr(){
      this.i = "";
      this.draw();
    },

    updateOut(){
      let cur = this.s;
      const darts = ["-","-","-"];
      for (let k=0; k<3; k++) {
        if (!cur || cur < 2 || cur > 501) break; /* chart is 501 outs */
        const shot = OUT_SHOT[cur];
        const rem  = OUT_REM[cur];
        if (!shot || rem === null || rem === undefined) break;
        darts[k] = fmtShot(shot);
        cur = rem;
        if (cur === 0) break;
      }
      document.getElementById('d1').innerText = darts[0];
      document.getElementById('d2').innerText = darts[1];
      document.getElementById('d3').innerText = darts[2];
    },

    apply(){
      const v = parseInt(this.i, 10);
      if (!isNaN(v)) {
        const next = this.s - v;
        if (next < 0 || next === 1) {
          this.i = "";
          this.draw();
          return;
        }
        this.s = next;
        this.i = "";
        this.draw();
        this.updateOut();
        return;
      }
      this.i = "";
      this.draw();
    },

    donate(){
      window.open("https://venmo.com/u/Steve-Moody-8", "_blank");
    }
  };

  APP.draw();
  APP.updateOut();
