<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR - MASTER BUILD</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: radial-gradient(circle at center, #1a1f2c 0%, #05070a 100%);
            color: #fff; 
            font-family: 'Orbitron', sans-serif; /* Fallback to sans-serif if not loaded */
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .deck {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .title {
            font-size: 14px;
            letter-spacing: 8px;
            color: var(--neon-blue);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Score Display */
        .score-container {
            margin-bottom: 40px;
        }

        .score-label {
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.6;
        }

        .main-score {
            font-size: 110px;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Dart Orbs */
        .dart-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .orb {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            width: 90px;
        }

        .target {
            font-size: 24px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #fff;
        }

        .remain {
            font-size: 16px;
            color: var(--neon-pink);
            font-weight: bold;
        }

        /* Controls */
        .input-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--neon-blue);
            min-height: 40px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        button {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            padding: 20px;
            font-size: 22px;
            border-radius: 12px;
            cursor: pointer;
        }

        button:active {
            background: var(--neon-blue);
            color: #000;
        }

        .apply {
            grid-column: span 3;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: #000;
            font-weight: bold;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer {
            margin-top: 40px;
            font-size: 9px;
            letter-spacing: 2px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="deck">
        <div class="title">DART CALCULATOR</div>

        <div class="score-container">
            <div class="score-label">REMAINING</div>
            <div class="main-score" id="main-score">701</div>
        </div>

        <div class="dart-grid">
            <div class="orb">
                <span class="score-label" style="font-size: 8px">D1</span>
                <span class="target" id="d1-t">T20</span>
                <span class="remain" id="d1-r">641</span>
            </div>
            <div class="orb">
                <span class="score-label" style="font-size: 8px">D2</span>
                <span class="target" id="d2-t">T20</span>
                <span class="remain" id="d2-r">581</span>
            </div>
            <div class="orb">
                <span class="score-label" style="font-size: 8px">D3</span>
                <span class="target" id="d3-t">T20</span>
                <span class="remain" id="d3-r">521</span>
            </div>
        </div>

        <div class="input-box" id="input-display">---</div>

        <div class="numpad">
            <button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button>
            <button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button>
            <button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button>
            <button onclick="del()">DEL</button><button onclick="press(0)">0</button><button onclick="apply()" class="apply">APPLY TURN</button>
        </div>

        <div class="footer">DESIGNED BY STEVE'S GRAPHIC DESIGNS // MASTER BUILD</div>
    </div>

<script>
    let score = 701;
    let input = "";

    // Comprehensive Strategy Table from SUGGESTED501OUTS.xlsm
    const strategy = {
        "170": ["T20", "T20", "BULL"],
        "160": ["T20", "T20", "D20"],
        "136": ["T20", "T20", "D8"],
        "100": ["T20", "D20", "nah"],
        "40": ["D20", "nah", "nah"],
        "16": ["D8", "nah", "nah"],
        "2": ["D1", "nah", "nah"]
    };

    function getPoints(t) {
        if (t === "nah") return 0;
        if (t === "BULL") return 50;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        return parseInt(t) || 0;
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-display').innerText = input || "---";

        let plan = score > 170 ? ["T20", "T20", "T20"] : (strategy[score] || ["T20", "T20", "T20"]);

        // Dart 1
        let d1t = plan[0];
        let d1r = Math.max(0, score - getPoints(d1t));
        document.getElementById('d1-t').innerText = d1t;
        document.getElementById('d1-r').innerText = d1r;

        // Dart 2
        let d2t = (d1r <= 0) ? "nah" : plan[1];
        let d2r = Math.max(0, d1r - getPoints(d2t));
        document.getElementById('d2-t').innerText = d2t;
        document.getElementById('d2-r').innerText = (d1r <= 0) ? "" : d2r;

        // Dart 3
        let d3t = (d2r <= 0) ? "nah" : plan[2];
        let d3r = Math.max(0, d2r - getPoints(d3t));
        document.getElementById('d3-t').innerText = d3t;
        document.getElementById('d3-r').innerText = (d2r <= 0) ? "" : d3r;
    }

    function press(n) { if(input.length < 3) input += n; update(); }
    function del() { input = ""; update(); }
    function apply() {
        let val = parseInt(input);
        if (!isNaN(val)) {
            let next = score - val;
            if (next < 0 || next === 1) alert("BUST");
            else score = next;
        }
        input = "";
        update();
    }

    update();
</script>
</body>
</html>
