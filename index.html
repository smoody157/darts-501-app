<script id="ng-6410-setup-filter-and-hooks">
(function(){
  function byId(id){ return document.getElementById(id); }
  function safe(fn){ try{ return fn(); }catch(e){ console.error(e); } }
  function norm(v){ return String(v || '').trim().toLowerCase(); }

  function isVisiblePlayer(p){
    if(!p) return false;
    var display = String(
      p.name ||
      [p.firstName || '', p.lastName || ''].filter(Boolean).join(' ').trim() ||
      p.email || ''
    ).trim();
    if(!display) return false;
    var lower = display.toLowerCase();
    if(lower === 'rt') return false;
    if(display.indexOf('@') !== -1) return false;
    return true;
  }

  function cleanedPlayers(){
    var arr = Array.isArray(window.PLAYERS) ? window.PLAYERS.slice() : [];
    return arr.filter(isVisiblePlayer);
  }

  function moveSetupControlsIntoPanel(){
    var body = byId('setupBody');
    var controls = byId('setupVisibleControls6403');
    if(!body || !controls) return;
    if(controls.parentElement !== body){
      body.appendChild(controls);
    }
  }

  function forceFeatureHooks(){
    var lb = byId('leaderboardTouchPad');
    if(lb){
      lb.onclick = function(){
        if(typeof window.showOverlay === 'function'){
          window.showOverlay('leaderboardOverlay');
        }
      };
    }

    var support = byId('supportTouchPad');
    if(support){
      support.onclick = function(){
        window.open('https://venmo.com/u/Steve-Moody-8', '_blank', 'noopener');
      };
    }
  }

  function patchRenderSetupBody(){
    if(window.__ng6410SetupPatched || typeof window.renderSetupBody !== 'function') return;
    window.__ng6410SetupPatched = true;
    var old = window.renderSetupBody;

    window.renderSetupBody = function(){
      var result = old.apply(this, arguments);

      safe(function(){
        var body = byId('setupBody');
        if(!body) return result;

        var game = String(window.selectedGame || '').toUpperCase();
        var setup = window.setupState || {};
        if(!Array.isArray(setup.players)) setup.players = [];
        var me = window.currentEmail || '';

        var players = cleanedPlayers();
        players.sort(function(a,b){
          var ao = (typeof window.playerIsOnline === 'function' && window.playerIsOnline(a.email)) ? 0 : 1;
          var bo = (typeof window.playerIsOnline === 'function' && window.playerIsOnline(b.email)) ? 0 : 1;
          if(ao !== bo) return ao - bo;
          return String(a.name || '').localeCompare(String(b.name || ''));
        });

        var rows = [];
        if(game === 'KILLER' || game === '01'){
          rows.push({ key:'numPlayers', label:'NUMBER OF PLAYERS', values:(game === 'KILLER' ? ['2','3'] : ['1','2','3','4']) });
        }

        if(game === 'KILLER'){
          rows = rows.concat([
            { key:'targetMode', label:'TARGET MODE', values:['SINGLES','DOUBLES','TRIPLES'] },
            { key:'lives', label:'LIVES', values:['3','5','7'] },
            { key:'sets', label:'SETS', values:['1','3','5'] }
          ]);
        } else if(game === '01'){
          rows = rows.concat([
            { key:'startScore', label:'START SCORE', values:['701','501','301'] },
            { key:'inType', label:'IN TYPE', values:['STRAIGHT IN','DOUBLE IN'] },
            { key:'outType', label:'OUT TYPE', values:['STRAIGHT OUT','DOUBLE OUT'] },
            { key:'sets', label:'SETS', values:['1','3','5'] },
            { key:'legs', label:'LEGS', values:['1','3','5'] }
          ]);
        }

        var maxPlayers = parseInt(setup.numPlayers || ((game === 'KILLER') ? '2' : '1'), 10) || 1;
        if(me && !setup.players.includes(me)) setup.players.unshift(me);
        setup.players = setup.players.filter(function(email){
          if(email === me) return true;
          return players.some(function(p){ return p.email === email; });
        }).slice(0, maxPlayers);

        var setupRows = rows.map(function(cfg){
          return '<div class="roomLine">'
            + '<div class="roomLabel">' + cfg.label + '</div>'
            + '<div class="roomScroll"><div class="roomScrollInner">'
            + cfg.values.map(function(v){
                var active = String(setup[cfg.key] || '') === String(v);
                return '<div class="roomItem"><div class="roomValue">' + v + '</div>'
                  + '<button class="roomMiniBtn ' + (active ? 'active' : '') + '" data-setup-key6410="' + cfg.key + '" data-setup-value6410="' + v + '">'
                  + (active ? 'SELECTED' : 'SELECT') + '</button></div>';
              }).join('')
            + '</div></div>'
            + '<div class="roomSummary">' + (setup[cfg.key] || '') + '</div></div>';
        }).join('');

        var playerBlock = '<div class="roomLine">'
          + '<div class="roomLabel">PLAYERS</div>'
          + '<div class="roomScroll"><div class="roomScrollInner">'
          + players.map(function(p){
              var active = Array.isArray(setup.players) && setup.players.includes(p.email);
              return '<div class="roomItem"><div class="roomValue">' + (p.name || '') + '</div>'
                + '<button class="roomMiniBtn ' + (active ? 'active' : '') + '" data-player6410="' + (p.email || '') + '">'
                + (active ? 'SELECTED' : 'SELECT') + '</button></div>';
            }).join('')
          + '</div></div>'
          + '<div class="roomSummary">' + ((setup.players || []).length) + ' SELECTED</div></div>';

        body.innerHTML = setupRows + playerBlock;

        Array.from(document.querySelectorAll('[data-setup-key6410]')).forEach(function(btn){
          if(btn.__b6410) return;
          btn.__b6410 = true;
          btn.addEventListener('click', function(){
            var key = btn.getAttribute('data-setup-key6410');
            var value = btn.getAttribute('data-setup-value6410');
            window.setupState = window.setupState || {};
            window.setupState[key] = value;

            if(key === 'numPlayers'){
              var lim = parseInt(value || '1', 10) || 1;
              var mine = window.currentEmail || '';
              var kept = (window.setupState.players || []).filter(function(x){ return x === mine || x; });
              if(mine){
                var rest = kept.filter(function(x){ return x !== mine; }).slice(0, Math.max(0, lim - 1));
                window.setupState.players = [mine].concat(rest);
              } else {
                window.setupState.players = kept.slice(0, lim);
              }
            }
            window.renderSetupBody();
          });
        });

        Array.from(document.querySelectorAll('[data-player6410]')).forEach(function(btn){
          if(btn.__b6410) return;
          btn.__b6410 = true;
          btn.addEventListener('click', function(){
            var email = btn.getAttribute('data-player6410');
            window.setupState = window.setupState || {};
            if(!Array.isArray(window.setupState.players)) window.setupState.players = [];
            var mine = window.currentEmail || '';
            var lim = parseInt(window.setupState.numPlayers || ((game === 'KILLER') ? '2' : '1'), 10) || 1;

            if(window.setupState.players.includes(email)){
              if(email !== mine){
                window.setupState.players = window.setupState.players.filter(function(x){ return x !== email; });
              }
            } else {
              if(mine && !window.setupState.players.includes(mine)) window.setupState.players.unshift(mine);
              var others = window.setupState.players.filter(function(x){ return x !== mine; });
              if(email !== mine && others.length < Math.max(0, lim - (mine ? 1 : 0))){
                window.setupState.players.push(email);
              }
            }
            window.renderSetupBody();
          });
        });

        moveSetupControlsIntoPanel();
        forceFeatureHooks();
      });

      return result;
    };
  }

  function boot6410(){
    patchRenderSetupBody();
    moveSetupControlsIntoPanel();
    forceFeatureHooks();
    safe(function(){
      if(typeof window.renderSetupBody === 'function' && byId('setupOverlay') && byId('setupOverlay').classList.contains('active')){
        window.renderSetupBody();
      }
    });
    setTimeout(moveSetupControlsIntoPanel, 120);
    setTimeout(forceFeatureHooks, 200);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot6410, {once:true});
  }else{
    boot6410();
  }
  window.addEventListener('load', boot6410);
})();
</script>
