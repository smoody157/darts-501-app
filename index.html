function issueInvites(){
  if(typeof db === 'undefined') return;

  const info = hostInfo();
  const hostEmail = normEmail(info.hostEmail);
  if(!hostEmail) return;

  const rawInvited = Array.isArray(invitedPlayers) ? invitedPlayers : [];
  const cleanInvited = rawInvited.map(normEmail).filter(function(email){ return email && email !== hostEmail; });
  const order = [hostEmail].concat(cleanInvited);
  const playersObj = {};

  order.forEach(function(email, idx){
    playersObj[email] = idx === 0 ? 'joined' : 'waiting';
  });

  waitingPlayers = order.map(function(email, idx){
    const known = playerLookup(email) || {name: email, email: email};
    return {
      name: known.name || email,
      email: email,
      status: idx === 0 ? 'joined' : 'waiting',
      host: idx === 0
    };
  });
  window.waitingPlayers = waitingPlayers;

  if(typeof refreshWaitingList === 'function') refreshWaitingList();

  const matchId = hostEmail.replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
  currentMatchId = matchId;
  window.currentMatchId = currentMatchId;

  db.collection('matches').doc(matchId).set({
    hostEmail: hostEmail,
    hostName: info.hostName,
    game: info.game,
    players: playersObj,
    order: order,
    ts: Date.now()
  }, {merge:true}).catch(function(){});

  const payload = {
    hostEmail: hostEmail,
    hostName: info.hostName,
    game: info.game,
    matchId: matchId,
    status: 'pending',
    ts: Date.now()
  };

  cleanInvited.forEach(function(target){
    db.collection('invites').doc(target).set(payload, {merge:true}).catch(function(){});
  });

  bindMatch(matchId);
}

  function db(){

  function now(){ return Date.now(); }
  function norm(v){ return (v || '').trim().toLowerCase(); }

    }
    return a;
  }
  function nextIndex(index, size){

    return (index + 1) % size;
  }
  function getOuts(score){
    try{
      const val = (typeof OUTS !== 'undefined' && OUTS[String(score)]) ? OUTS[String(score)] : ["","",""];
      return [val[0] || '-', val[1] || '-', val[2] || '-'];
    }catch(e){
      return ['-','-','-'];
    }
  }
  function canFinishExactly(nextScore, scoreValue, outType){
    if(nextScore !== 0) return true;
    if(outType === 'DOUBLE OUT'){
      return scoreValue % 2 === 0;
    }
    return true;
  }

  const originalBeginSequence = window.beginSequence;
  window.beginSequence = async function(){
    const everyoneReady = Array.isArray(window.waitingPlayers) && window.waitingPlayers.filter(function(p){ return !p.host; }).every(function(p){ return p.status === 'joined'; });
    if(!everyoneReady) return;

    if(window.selectedGame === '01'){
      const selectedPlayers = (window.setupState && Array.isArray(window.setupState.players) && window.setupState.players.length)
        ? window.setupState.players.slice()
        : (Array.isArray(window.waitingPlayers) ? window.waitingPlayers.map(function(p){ return p.email; }) : [window.currentEmail]);

      const randomized = shuffle(selectedPlayers.filter(Boolean));
      window.setupState = window.setupState || {};
      window.setupState.turnOrder = randomized;

      try{
        if(window.currentMatchId && db()){
          db().collection('matches').doc(window.currentMatchId).set({
            setupState: Object.assign({}, window.setupState, {turnOrder: randomized}),
            order: randomized
          }, {merge:true}).catch(function(){});
        }

    }

  };

  function createInitial01State(){
    const setup = window.setupState || {};

  function ensure01State(callback){

    if(window.currentMatchId && db()){

          }, {merge:true}).catch(function(){});
        }
        done(window.__o1State);
      }).catch(function(){
        done(window.__o1State);
      });
      return;
    }

  }

  function sync01StateToFirestore(){

    }, {merge:true}).catch(function(){});
  }

  function currentTurnEmail(){

  }

  function isMyTurn(){
    return norm(currentTurnEmail()) === norm(window.currentEmail);
  }

  function update01Display(){
    const state = window.__o1State;
    if(!state) return;

    const currentEmail = currentTurnEmail();
    const nextEmail = state.turnOrder[nextIndex(state.currentTurnIndex, state.turnOrder.length)];
    const currentPlayer = getPlayerByEmail(currentEmail);
    const nextPlayer = getPlayerByEmail(nextEmail);
    const currentScore = state.scores[currentEmail];
    const nextScore = state.scores[nextEmail];
    const outs = getOuts(currentScore);

    const title = document.getElementById('o1SmallGame');
    const leftName = document.getElementById('o1CurrentName');
    const leftScore = document.getElementById('o1CurrentScore');
    const rightName = document.getElementById('o1NextName');
    const rightScore = document.getElementById('o1NextScore');
    const d1 = document.getElementById('o1D1');
    const d2 = document.getElementById('o1D2');
    const d3 = document.getElementById('o1D3');

    const status = document.getElementById('o1Status');
    const list = document.getElementById('o1PlayerList');

    if(title) title.textContent = String(state.startScore);
    if(leftName) leftName.textContent = currentPlayer.name || currentEmail;
    if(leftScore) leftScore.textContent = String(currentScore);
    if(rightName) rightName.textContent = nextPlayer.name || nextEmail;
    if(rightScore) rightScore.textContent = String(nextScore);
    if(d1) d1.textContent = outs[0];
    if(d2) d2.textContent = outs[1];
    if(d3) d3.textContent = outs[2];
    if(entry) entry.textContent = (window.__o1PendingInput || '');
    if(status) status.textContent = isMyTurn() ? 'YOUR TURN' : ((currentPlayer.name || 'PLAYER').toUpperCase() + ' SHOOTING');

    if(list){
      list.innerHTML = state.turnOrder.map(function(email, idx){
        const p = getPlayerByEmail(email);
        const score = state.scores[email];
        const turnLabel = idx === state.currentTurnIndex ? 'ACTIVE' : ('P' + (idx + 1));
        return '<div class="o1row"><div class="o1rowName">' + (p.name || email) + '</div><div class="o1rowTurn">' + turnLabel + '</div><div class="o1rowScore">' + String(score) + '</div></div>';

  function setPendingInput(value){

  function appendDigit(d){

  function clearInput(){

  function undoInput(){

  function endTurn(actionType, enteredValue, nextScoreValue){

      type: actionType,
      player: shooter,
      enteredValue: enteredValue,
      nextScore: nextScoreValue,
      at: now()

    state.updatedAt = now();

    if(actionType === 'win'){
      state.winnerEmail = shooter;
      sync01StateToFirestore();
      update01Display();
      const winner = getPlayerByEmail(shooter);
      if(typeof window.triggerWinner === 'function') window.triggerWinner(winner.name || shooter);

    }

    state.currentTurnIndex = nextIndex(state.currentTurnIndex, state.turnOrder.length);
    sync01StateToFirestore();
    clearInput();
    update01Display();
  }

  function processEnteredScore(rawValue){
    const state = window.__o1State;
    if(!state || state.winnerEmail || !isMyTurn()) return;

    const shooter = currentTurnEmail();
    const current = parseInt(state.scores[shooter], 10) || 0;
    const value = parseInt(rawValue, 10);
    if(!Number.isFinite(value) || value < 0) return;

    if(!state.stats[shooter]) state.stats[shooter] = {turns:0, busts:0, misses:0, points:0};
    state.stats[shooter].turns += 1;

    if(value === 0){
      state.stats[shooter].misses += 3;
      endTurn('miss', 0, current);
      return;
    }

    const nextScoreValue = current - value;
    if(nextScoreValue < 0 || !canFinishExactly(nextScoreValue, value, state.outType)){
      state.stats[shooter].busts += 1;
      endTurn('bust', value, current);
      return;
    }

    state.scores[shooter] = nextScoreValue;
    state.stats[shooter].points += value;
    state.history.push({
      player: shooter,
      scored: value,
      before: current,
      after: nextScoreValue,
      at: now()
    });

    if(nextScoreValue === 0){
      endTurn('win', value, 0);
      return;
    }

    endTurn('score', value, nextScoreValue);
  }

<script id="ng-5798-killer-engine">

  function db(){ try{ return (window.firebase && firebase.firestore) ? firebase.firestore() : null; }catch(e){ return null; } }
  function now(){ return Date.now(); }
  function norm(v){ return (v || '').trim().toLowerCase(); }
  function byEmail(email){ return (window.PLAYERS || []).find(function(p){ return norm(p.email) === norm(email); }) || {name: email || '', email: email || ''}; }
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function aliveOrder(state){ return state.turnOrder.filter(function(email){ return state.players[email] && state.players[email].alive; }); }
  function nextAliveIndex(state,startIndex){
    const total = state.turnOrder.length;
    for(let step=1; step<=total; step++){
      const idx = (startIndex + step) % total;
      const email = state.turnOrder[idx];
      if(state.players[email] && state.players[email].alive) return idx;
    }
    return startIndex;
  }
  function currentEmailForKiller(){
    const state = window.__killerState;
    if(!(state && state.turnOrder && state.turnOrder.length)) return window.currentEmail || '';
    return state.turnOrder[state.currentTurnIndex] || state.turnOrder[0];
  }
  function myTurn(){ return norm(currentEmailForKiller()) === norm(window.currentEmail); }
  function killerMode(){
    const setup = window.setupState || {};
    const raw = String(setup.killerMode || 'DOUBLES').toUpperCase();
    if(raw.indexOf('TRIPLE') >= 0) return 'TRIPLES';
    if(raw.indexOf('SINGLE') >= 0 || raw.indexOf('STRAIGHT') >= 0) return 'SINGLES';
    return 'DOUBLES';
  }
  function hitLabel(target, mode){
    if(target === 'BULL') return 'BULL';
    if(mode === 'DOUBLES') return 'D' + target;
    if(mode === 'TRIPLES') return 'T' + target;
    return String(target);
  }
  function buildBoard(mode){
    return REAL_DARTBOARD_SEQUENCE.map(function(target){
      return {target: target, label: hitLabel(target, mode)};
    });
  }
  function playerStateLabel(p){
    if(!p.alive) return 'OUT';
    return p.killer ? 'KILLER' : 'HUNTING';

  function renderLives(p){

    return html;
  }

  window.__killerPending = [];
  window.__killerMatchUnsub = null;
  window.__killerWinnerShown = null;

  function createInitialKillerState(){
    const setup = window.setupState || {};
    const selected = (Array.isArray(setup.turnOrder) && setup.turnOrder.length)
      ? setup.turnOrder.slice()
      : ((Array.isArray(setup.players) && setup.players.length) ? shuffle(setup.players.slice()) : [window.currentEmail]);
    const maxLives = parseInt(setup.lives || '3', 10) || 3;
    const mode = killerMode();
    const targets = shuffle(REAL_DARTBOARD_SEQUENCE.slice()).slice(0, selected.length);
    const players = {};
    selected.forEach(function(email, idx){
      const info = byEmail(email);
      players[email] = {
        email: email,
        name: info.name || email,
        target: targets[idx],
        killer: false,
        lives: maxLives,
        maxLives: maxLives,
        alive: true,
        stats: {dartsThrown:0, misses:0, hits:0, kills:0, livesGained:0, livesLost:0}
      };
    });
    return {
      type: 'KILLER',
      mode: mode,
      turnOrder: selected,
      currentTurnIndex: 0,
      players: players,
      history: [],
      winnerEmail: null,
      boardSequence: REAL_DARTBOARD_SEQUENCE.slice(),
      updatedAt: now()
    };
  }

  function ensureState(callback){
    const done = typeof callback === 'function' ? callback : function(){};
    if(window.__killerState){ done(window.__killerState); return; }
    const initial = createInitialKillerState();
    window.__killerState = initial;
    if(window.currentMatchId && db()){
      db().collection('matches').doc(window.currentMatchId).get().then(function(snap){
        const data = snap.exists ? (snap.data() || {}) : {};
        if(data.gameState && data.gameState.type === 'KILLER'){
          window.__killerState = data.gameState;
          if(!window.__killerState.mode) window.__killerState.mode = killerMode();
          if(!window.__killerState.boardSequence) window.__killerState.boardSequence = REAL_DARTBOARD_SEQUENCE.slice();
        }else{
          db().collection('matches').doc(window.currentMatchId).set({gameState: initial}, {merge:true}).catch(function(){});
        }
        done(window.__killerState);
      }).catch(function(){ done(window.__killerState); });
      return;
    }
    done(window.__killerState);
  }

  function syncState(){
    if(window.currentMatchId && db() && window.__killerState){
      db().collection('matches').doc(window.currentMatchId).set({gameState: window.__killerState}, {merge:true}).catch(function(){});
    }
  }

  function pushHit(target){
    if(!myTurn() || !window.__killerState || window.__killerState.winnerEmail || window.__killerPending.length >= 3) return;
    window.__killerPending.push(target);
    updateDisplay();
  }

  function undoHit(){
    if(!myTurn() || !window.__killerPending.length) return;
    window.__killerPending.pop();
    updateDisplay();
  }

  function processTurn(){
    const state = window.__killerState;
    if(!(state && myTurn()) || state.winnerEmail || window.__killerPending.length !== 3) return;

    const shooterEmail = currentEmailForKiller();
    const shooter = state.players[shooterEmail];
    if(!(shooter && shooter.alive)) return;

    window.__killerPending.forEach(function(target){
      shooter.stats.dartsThrown += 1;

      if(target === 'MISS'){
        shooter.stats.misses += 1;
        state.history.push({player: shooterEmail, type:'MISS', at: now()});
        return;
      }

      shooter.stats.hits += 1;
      state.history.push({player: shooterEmail, type:'HIT', target: target, at: now()});

      if(!shooter.killer){
        if(target === shooter.target){
          shooter.killer = true;
          state.history.push({player: shooterEmail, type:'BECAME_KILLER', at: now()});
        }
        return;
      }

      if(target === shooter.target){
        if(shooter.lives < shooter.maxLives){
          shooter.lives += 1;
          shooter.stats.livesGained += 1;
          state.history.push({player: shooterEmail, type:'GAIN_LIFE', at: now()});
        }
        return;
      }

      state.turnOrder.forEach(function(email){
        if(email === shooterEmail) return;
        const targetPlayer = state.players[email];
        if(!(targetPlayer && targetPlayer.alive)) return;
        if(target === targetPlayer.target){

      state.winnerEmail = alive[0];

      updateDisplay();

    state.currentTurnIndex = nextAliveIndex(state, state.currentTurnIndex);

    if(list){

        const p = state.players[email];

    });

    `;

  function db(){ try{ return (window.firebase && firebase.firestore) ? firebase.firestore() : null; }catch(e){ return null; } }
  function now(){ return Date.now(); }
  function norm(v){ return (v || '').trim().toLowerCase(); }
  function byEmail(email){ return (window.PLAYERS || []).find(function(p){ return norm(p.email) === norm(email); }) || {name: email || '', email: email || ''}; }
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function currentEmailForATW(){ const s=window.__atwState; return (s && s.turnOrder && s.turnOrder.length) ? s.turnOrder[s.currentTurnIndex] : (window.currentEmail || ''); }

    if(raw.indexOf('TRIPLE') >= 0) return 'TRIPLES';
    if(raw.indexOf('DOUBLE') >= 0) return 'DOUBLES';

    });
  }
  function currentTargetFor(player){
    const idx = Math.max(0, Math.min(ATW_SEQUENCE.length - 1, player.progressIndex || 0));

  }
  function isFinished(player){
    return !!player.finished || (player.progressIndex >= ATW_SEQUENCE.length);
  }

  window.__atwMatchUnsub = null;
  window.__atwWinnerShown = null;

  function createInitialATWState(){
    const setup = window.setupState || {};
    const players = (Array.isArray(setup.turnOrder) && setup.turnOrder.length)
      ? setup.turnOrder.slice()
      : ((Array.isArray(setup.players) && setup.players.length) ? shuffle(setup.players.slice()) : [window.currentEmail]);
    const mode = atwMode();
    const obj = {};
    players.forEach(function(email){
      const info = byEmail(email);
      obj[email] = {
        email: email,
        name: info.name || email,
        progressIndex: 0,
        finished: false,
        stats: {dartsThrown:0, misses:0, hits:0}
      };
    });
    return {
      type: 'ATW',
      mode: mode,
      turnOrder: players,
      currentTurnIndex: 0,
      players: obj,
      boardSequence: REAL_DARTBOARD_SEQUENCE.slice(),
      history: [],
      winnerEmail: null,
      updatedAt: now()

  function ensureState(callback){
    const done = typeof callback === 'function' ? callback : function(){};
    if(window.__atwState){ done(window.__atwState); return; }

    window.__atwState = initial;
    if(window.currentMatchId && db()){
      db().collection('matches').doc(window.currentMatchId).get().then(function(snap){
        const data = snap.exists ? (snap.data() || {}) : {};
        if(data.gameState && data.gameState.type === 'ATW'){

    window.__atwPending.pop();
    updateDisplay();
  }

    const shooterEmail = currentEmailForATW();
    const shooter = state.players[shooterEmail];
    if(!shooter || shooter.finished) return;

    const mode = state.mode || atwMode();

    window.__atwPending.forEach(function(target){
      if(shooter.finished) return;
      shooter.stats.dartsThrown += 1;

      if(target === 'MISS'){
        shooter.stats.misses += 1;
        state.history.push({player: shooterEmail, type:'MISS', at: now()});
        return;
      }

      const needed = currentTargetFor(shooter);
      if(target === needed){
        shooter.stats.hits += 1;
        shooter.progressIndex += 1;
        state.history.push({player: shooterEmail, type:'HIT', target: target, advancedTo: shooter.progressIndex, at: now()});
        if(shooter.progressIndex >= ATW_SEQUENCE.length){
          shooter.finished = true;

      }
    });

      syncState();

      window.__atwWinnerShown = state.winnerEmail;
      const winner = state.players[state.winnerEmail];
      if(typeof window.triggerWinner === 'function'){
        window.triggerWinner((winner && winner.name) || state.winnerEmail);
      }
    }
  }

      : ((Array.isArray(setup.players) && setup.players.length) ? shuffle(setup.players.slice()) : [window.currentEmail]);
    const playerMap = {};
    players.forEach(function(email){
      const info = byEmail(email);
      playerMap[email] = {
        email: email,
        name: info.name || email,
        score: 0,
        marks: createMarks(),
        stats: {dartsThrown:0, misses:0, hits:0}
      };
    });
    return {
      type: 'CRICKET',
      scoring: scoringMode(),
      turnOrder: players,
      currentTurnIndex: 0,
      players: playerMap,
      winnerEmail: null,
      updatedAt: now(),
      history: []
    };
  }

  function ensureState(callback){
    const done = typeof callback === 'function' ? callback : function(){};
    if(window.__cricketState){ done(window.__cricketState); return; }
    const initial = createInitialState();
    window.__cricketState = initial;
    if(window.currentMatchId && db()){
      db().collection('matches').doc(window.currentMatchId).get().then(function(snap){
        const data = snap.exists ? (snap.data() || {}) : {};
        if(data.gameState && data.gameState.type === 'CRICKET'){
          window.__cricketState = data.gameState;
          if(!window.__cricketState.scoring) window.__cricketState.scoring = scoringMode();
        }else{
          db().collection('matches').doc(window.currentMatchId).set({gameState: initial}, {merge:true}).catch(function(){});
        }
        done(window.__cricketState);
      }).catch(function(){ done(window.__cricketState); });
      return;
    }
    done(window.__cricketState);
  }

  function syncState(){
    if(window.currentMatchId && db() && window.__cricketState){
      db().collection('matches').doc(window.currentMatchId).set({gameState: window.__cricketState}, {merge:true}).catch(function(){});
    }
  }

  function hitToTargetAndMarks(hit){
    if(hit === 'MISS') return null;
    if(hit === 'SBULL' || hit === 'BULL') return {target:'BULL', marks:1, points:25};
    if(hit === 'DBULL') return {target:'BULL', marks:2, points:50};
    const m = String(hit).match(/^([SDT])(\d{1,2})$/);
    if(!m) return null;
    const ring = m[1];
    const target = m[2];
    if(CRICKET_TARGETS.indexOf(target) === -1) return null;
    const marks = ring === 'S' ? 1 : (ring === 'D' ? 2 : 3);
    const points = parseInt(target, 10) * marks;
    return {target: target, marks: marks, points: points};
  }

  function allClosed(player){
    return CRICKET_TARGETS.every(function(t){ return (player.marks[t] || 0) >= 3; });
  }

  function canScoreOnTarget(state, shooterEmail, target){
    return state.turnOrder.some(function(email){
      if(email === shooterEmail) return false;
      const p = state.players[email];
      return p && (p.marks[target] || 0) < 3;
    });
  }

  function checkWinner(state){
    const players = state.turnOrder.map(function(email){ return state.players[email]; }).filter(Boolean);
    const maxScore = Math.max.apply(null, players.map(function(p){ return p.score || 0; }));
    const eligible = players.filter(function(p){ return allClosed(p) && (p.score || 0) >= maxScore; });
    if(eligible.length) return eligible[0].email;
    return null;
  }

  function pushHit(hit){
    if(!myTurn() || !window.__cricketState || window.__cricketState.winnerEmail || window.__cricketPending.length >= 3) return;
    window.__cricketPending.push(hit);
    updateDisplay();
  }

  function undoHit(){
    if(!myTurn() || !window.__cricketPending.length) return;
    window.__cricketPending.pop();
    updateDisplay();
  }

  function processTurn(){
    const state = window.__cricketState;
    if(!(state && myTurn()) || state.winnerEmail || window.__cricketPending.length !== 3) return;

    const shooterEmail = currentCricketEmail();
    const shooter = state.players[shooterEmail];
    if(!shooter) return;

    state.scoring = state.scoring || scoringMode();

    window.__cricketPending.forEach(function(hit){
      shooter.stats.dartsThrown += 1;

      if(hit === 'MISS'){
        shooter.stats.misses += 1;
        state.history.push({player: shooterEmail, type:'MISS', at: now()});
        return;
      }

      const info = hitToTargetAndMarks(hit);
      if(!info){
        shooter.stats.misses += 1;
        state.history.push({player: shooterEmail, type:'INVALID', hit: hit, at: now()});
        return;
      }

      shooter.stats.hits += 1;
      const current = shooter.marks[info.target] || 0;
      const needed = Math.max(0, 3 - current);
      const appliedMarks = Math.min(info.marks, needed);
      const overflowMarks = Math.max(0, info.marks - appliedMarks);

      shooter.marks[info.target] = Math.min(3, current + info.marks);

      if(state.scoring === 'STANDARD' && overflowMarks > 0 && canScoreOnTarget(state, shooterEmail, info.target)){
        if(info.target === 'BULL'){
          shooter.score += overflowMarks * 25;
        } else {
          shooter.score += overflowMarks * parseInt(info.target, 10);
        }
      }

      state.history.push({
        player: shooterEmail,
        type:'HIT',
        hit: hit,
        target: info.target,
        marks: info.marks,
        at: now()
      });
    });

    state.updatedAt = now();

    const winner = checkWinner(state);
    if(winner){
      state.winnerEmail = winner;
      window.__cricketPending = [];
      syncState();
      updateDisplay();
      return;
    }

    state.currentTurnIndex = nextIndex(state.turnOrder, state.currentTurnIndex);
    window.__cricketPending = [];
    syncState();
    updateDisplay();
  }

  function markDisplay(count){
    const c = Math.max(0, Math.min(3, count || 0));
    if(c === 0) return '';
    if(c === 1) return '/';
    if(c === 2) return 'X';
    return 'O';
  }

  function cricketHitLabel(hit){
    if(hit === 'MISS') return 'MISS';
    if(hit === 'SBULL' || hit === 'BULL') return 'SB';
    if(hit === 'DBULL') return 'DB';
    return hit;
  }

  function updateDisplay(){
    const state = window.__cricketState;
    if(!state) return;
    const shooter = state.players[currentCricketEmail()] || null;

    const sub = document.getElementById('cricketSub');
    const turnName = document.getElementById('cricketTurnName');
    const turnStatus = document.getElementById('cricketTurnStatus');
    const d1 = document.getElementById('cricketDart1');
    const d2 = document.getElementById('cricketDart2');
    const d3 = document.getElementById('cricketDart3');
    const table = document.getElementById('cricketTable');

    if(sub) sub.textContent = (state.scoring || scoringMode()) + ' • DARTCONNECT STYLE';
    if(turnName) turnName.textContent = shooter ? shooter.name : '';
    if(turnStatus){
      turnStatus.textContent = state.winnerEmail
        ? 'GAME OVER'
        : (myTurn() ? 'YOUR TURN' : (((shooter && shooter.name) || 'PLAYER').toUpperCase() + ' SHOOTING'));
    }
    if(d1) d1.textContent = window.__cricketPending[0] ? cricketHitLabel(window.__cricketPending[0]) : '-';
    if(d2) d2.textContent = window.__cricketPending[1] ? cricketHitLabel(window.__cricketPending[1]) : '-';
    if(d3) d3.textContent = window.__cricketPending[2] ? cricketHitLabel(window.__cricketPending[2]) : '-';

    if(table){
      let html = '';
      html += '<div class="cricketHead cricketNameHead">PLAYER</div>';
      CRICKET_TARGETS.forEach(function(t){ html += '<div class="cricketHead">' + t + '</div>'; });
      html += '<div class="cricketHead">PTS</div>';

      state.turnOrder.forEach(function(email){
        const p = state.players[email];
        const active = email === currentCricketEmail();
        html += '<div class="cricketRow ' + (active ? 'active' : '') + '" style="display:contents">';
        html += '<div class="cricketCell cricketRowName">' + p.name + '</div>';
        CRICKET_TARGETS.forEach(function(t){
          const closed = (p.marks[t] || 0) >= 3;
          html += '<div class="cricketCell cricketMark ' + (closed ? 'closed' : '') + '">' + markDisplay(p.marks[t]) + '</div>';
        });
        html += '<div class="cricketCell cricketScore">' + String(p.score || 0) + '</div>';
        html += '</div>';
      });

      table.innerHTML = html;
    }

    document.querySelectorAll('.cricketBoard .cricketBtn[data-hit]').forEach(function(btn){
      btn.disabled = !myTurn() || !!state.winnerEmail || window.__cricketPending.length >= 3;
    });
    const missBtn = document.getElementById('cricketMissBtn');
    const undoBtn = document.getElementById('cricketUndoBtn');
    const enterBtn = document.getElementById('cricketEnterBtn');
    if(missBtn) missBtn.disabled = !myTurn() || !!state.winnerEmail || window.__cricketPending.length >= 3;
    if(undoBtn) undoBtn.disabled = !myTurn() || !!state.winnerEmail || window.__cricketPending.length === 0;
    if(enterBtn) enterBtn.disabled = !myTurn() || !!state.winnerEmail || window.__cricketPending.length !== 3;

    if(state.winnerEmail && window.__cricketWinnerShown !== state.winnerEmail){
      window.__cricketWinnerShown = state.winnerEmail;
      const winner = state.players[state.winnerEmail];
      if(typeof window.triggerWinner === 'function'){
        window.triggerWinner((winner && winner.name) || state.winnerEmail);
      }
    }
  }

  function boardButtons(){
    return [
      'S20','D20','T20',
      'S19','D19','T19',
      'S18','D18','T18',
      'S17','D17','T17',
      'S16','D16','T16',
      'S15','D15','T15',
      'SBULL','DBULL'
    ];
  }

  window.renderCricketGame = function(){
    window.__cricketPending = [];
    window.__cricketWinnerShown = null;
    ensureState(function(state){
      const body = document.getElementById('liveGameBody');
      if(!body) return;
      body.innerHTML = `
        <div class="cricketWrap">
          <div class="cricketLeft">
            <div class="cricketPanel">
              <div class="cricketHeader">
                <div class="cricketTitle">CRICKET</div>
                <div class="cricketSub" id="cricketSub">${(state.scoring || scoringMode())} • DARTCONNECT STYLE</div>
              </div>
              <div class="cricketTable" id="cricketTable"></div>
            </div>
          </div>
          <div class="cricketRight">
            <div class="cricketPanel">
              <div class="cricketTurnName" id="cricketTurnName"></div>
              <div class="cricketTurnStatus" id="cricketTurnStatus"></div>
              <div class="cricketDarts">
                <div class="cricketDart" id="cricketDart1">-</div>
                <div class="cricketDart" id="cricketDart2">-</div>
                <div class="cricketDart" id="cricketDart3">-</div>
              </div>
              <div class="cricketBoard">
                ${boardButtons().map(function(hit){
                  return '<button class="cricketBtn" data-hit="' + hit + '">' + hit + '</button>';
                }).join('')}
                <button class="cricketBtn" id="cricketMissBtn">MISS</button>
                <button class="cricketBtn" id="cricketUndoBtn">UNDO</button>
                <button class="cricketBtn primary wide" id="cricketEnterBtn">ENTER</button>
              </div>
            </div>
          </div>
        </div>
      `;
      body.querySelectorAll('[data-hit]').forEach(function(btn){
        btn.addEventListener('click', function(){ pushHit(btn.getAttribute('data-hit')); });
      });
      document.getElementById('cricketMissBtn').addEventListener('click', function(){ pushHit('MISS'); });
      document.getElementById('cricketUndoBtn').addEventListener('click', undoHit);
      document.getElementById('cricketEnterBtn').addEventListener('click', processTurn);
      updateDisplay();

      if(window.currentMatchId && db()){
        if(window.__cricketMatchUnsub){ try{ window.__cricketMatchUnsub(); }catch(e){} }
        window.__cricketMatchUnsub = db().collection('matches').doc(window.currentMatchId).onSnapshot(function(snap){
          if(!snap.exists) return;
          const data = snap.data() || {};
          if(data.gameState && data.gameState.type === 'CRICKET'){
            window.__cricketState = data.gameState;
            if(!window.__cricketState.scoring) window.__cricketState.scoring = scoringMode();
            if(window.__cricketState.winnerEmail) window.__cricketPending = [];
            updateDisplay();
          }
        }, function(){});
      }
    });
  };

  const oldSetupConfig = window.setupConfig || setupConfig;
  window.setupConfig = setupConfig = function(game){
    const cfgs = {
      "01":[
        {key:"startScore",label:"START SCORE",values:["701","501","301"]},
        {key:"inType",label:"IN TYPE",values:["STRAIGHT IN","DOUBLE IN"]},
        {key:"outType",label:"OUT TYPE",values:["STRAIGHT OUT","DOUBLE OUT"]},
        {key:"sets",label:"SETS",values:["1","3","5"]},
        {key:"legs",label:"LEGS",values:["1","3","5"]}
      ],
      "KILLER":[
        {key:"killerMode",label:"TARGET MODE",values:["SINGLES","DOUBLES","TRIPLES"]},
        {key:"lives",label:"LIVES",values:["3","5","7"]},
        {key:"sets",label:"SETS",values:["1","3","5"]}
      ],
      "ATW":[
        {key:"atwMode",label:"TARGET MODE",values:["SINGLES","DOUBLES","TRIPLES"]},
        {key:"sets",label:"SETS",values:["1","3","5"]}
      ],
      "CRICKET":[
        {key:"scoring",label:"SCORING",values:["STANDARD","NO SCORE"]},
        {key:"sets",label:"SETS",values:["1","3","5"]}
      ],
      "SHANGHAI":[{key:"legs",label:"ROUNDS",values:["7","10","20"]}],
      "HALVE IT":[{key:"legs",label:"ROUNDS",values:["STANDARD","SHORT"]}]
    };
    return cfgs[game] || (oldSetupConfig ? oldSetupConfig(game) : []);
  };

  const originalStartGame = window.startGame || startGame;
  window.startGame = startGame = function(){
    showScreen('playersPage');
    showOverlay('liveGameOverlay');
    $('liveGameTitle').textContent = selectedGame;
    let bg='./01BG.png';
    if(selectedGame==='KILLER') bg='./killerBG.jpg';
    if(selectedGame==='CRICKET') bg='./CricketBG.png';

    if(selectedGame==='01') render01Game();
    else if(selectedGame==='KILLER') renderKillerGame();

    else if(selectedGame==='CRICKET') renderCricketGame();
    else $('liveGameBody').innerHTML = `<div class="pageHeader" style="top:40%;left:50%;transform:translateX(-50%);position:absolute">${selectedGame}</div>`;
  };
})();
</script>

















<script id="ng-5940-setup-frame-script">
(function(){
  const $ = (id) => document.getElementById(id);

  function normalizeSetupForGame(){
    if(!window.setupState) window.setupState = {};
    if(!window.setupState.players || !Array.isArray(window.setupState.players)){
      window.setupState.players = window.currentEmail ? [window.currentEmail] : [];
    }
    if(window.currentEmail && !window.setupState.players.includes(window.currentEmail)){
      window.setupState.players = [window.currentEmail].concat(window.setupState.players.filter(x => x !== window.currentEmail));
    }

    if(window.selectedGame === 'KILLER'){
      if(!window.setupState.numPlayers) window.setupState.numPlayers = '1';
      if(!window.setupState.targetMode) window.setupState.targetMode = 'SINGLES';
      if(!window.setupState.lives) window.setupState.lives = '3';
      if(!window.setupState.sets) window.setupState.sets = '1';

      const maxPlayers = parseInt(window.setupState.numPlayers, 10) || 1;
      if(Array.isArray(window.setupState.players)){
        const current = window.currentEmail ? [window.currentEmail] : [];
        const others = window.setupState.players.filter(x => x !== window.currentEmail).slice(0, Math.max(0, maxPlayers - current.length));
        window.setupState.players = current.concat(others);
      }
    }
  }

  function killerRows(){
    return [
      { key:'numPlayers', label:'NUMBER OF PLAYERS', values:['1','2','3'] },
      { key:'targetMode', label:'TARGET MODE', values:['SINGLES','DOUBLES','TRIPLES'] },
      { key:'lives', label:'LIVES', values:['3','5','7'] },
      { key:'sets', label:'SETS', values:['1','3','5'] }
    ];
  }

  function standardRows(game){
    const cfgs = {
      "01":[
        {key:"startScore",label:"START SCORE",values:["701","501","301"]},
        {key:"inType",label:"IN TYPE",values:["STRAIGHT IN","DOUBLE IN"]},
        {key:"outType",label:"OUT TYPE",values:["STRAIGHT OUT","DOUBLE OUT"]},
        {key:"sets",label:"SETS",values:["1","3","5"]},
        {key:"legs",label:"LEGS",values:["1","3","5"]}
      ],
      "CRICKET":[
        {key:"scoring",label:"SCORING",values:["STANDARD","NO SCORE"]},
        {key:"sets",label:"SETS",values:["1","3","5"]}
      ],
      "SHANGHAI":[{key:"legs",label:"ROUNDS",values:["7","10","20"]}],
      "ATW":[{key:"order",label:"ORDER",values:["STANDARD","RANDOM"]}],
      "HALVE IT":[{key:"legs",label:"ROUNDS",values:["STANDARD","SHORT"]}]
    };
    return cfgs[game] || [];
  }

  function renderSetupBodyPatched(){
    normalizeSetupForGame();

    const currentNames = Array.isArray(window.PLAYERS) ? window.PLAYERS : [];
    const game = window.selectedGame || '';
    const rows = game === 'KILLER' ? killerRows() : standardRows(game);

    const numPlayersCfg = rows.find(r => r.key === 'numPlayers');
    const remainingRows = rows.filter(r => r.key !== 'numPlayers');

    const numPlayersBlock = numPlayersCfg ? `
      <div class="roomLine">
        <div class="roomLabel">${numPlayersCfg.label}</div>
        <div class="roomScroll">
          <div class="roomScrollInner">
            ${numPlayersCfg.values.map(v => `
              <div class="roomItem">
                <div class="roomValue">${v}</div>
                <button class="roomMiniBtn ${window.setupState[numPlayersCfg.key] === v ? 'active' : ''}" data-key="${numPlayersCfg.key}" data-value="${v}">
                  ${window.setupState[numPlayersCfg.key] === v ? 'SELECTED' : 'SELECT'}
                </button>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="roomSummary">${window.setupState[numPlayersCfg.key] || ''}</div>
      </div>
    ` : '';

    const playerBlock = `
      <div class="roomLine">
        <div class="roomLabel">PLAYERS</div>
        <div class="roomScroll">
          <div class="roomScrollInner">
            ${currentNames.map(p => `
              <div class="roomItem">
                <div class="roomValue">${p.name}</div>
                <button class="roomMiniBtn ${window.setupState.players.includes(p.email) ? 'active' : ''}" data-player="${p.email}">
                  ${window.setupState.players.includes(p.email) ? 'SELECTED' : 'SELECT'}
                </button>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="roomSummary">${window.setupState.players.length} SELECTED</div>
      </div>
    `;

    const optionBlocks = remainingRows.map(cfg => `
      <div class="roomLine">
        <div class="roomLabel">${cfg.label}</div>
        <div class="roomScroll">
          <div class="roomScrollInner">
            ${cfg.values.map(v => `
              <div class="roomItem">
                <div class="roomValue">${v}</div>
                <button class="roomMiniBtn ${window.setupState[cfg.key] === v ? 'active' : ''}" data-key="${cfg.key}" data-value="${v}">
                  ${window.setupState[cfg.key] === v ? 'SELECTED' : 'SELECT'}
                </button>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="roomSummary">${window.setupState[cfg.key] || ''}</div>
      </div>
    `).join('');

    const body = $('setupBody');
    if(!body) return;
    body.innerHTML = numPlayersBlock + playerBlock + optionBlocks;

    document.querySelectorAll('[data-player]').forEach(btn => btn.addEventListener('click', () => {
      const email = btn.dataset.player;
      const maxPlayers = (window.selectedGame === 'KILLER')
        ? (parseInt(window.setupState.numPlayers || '1', 10) || 1)
        : 99;

      if(window.setupState.players.includes(email)){
        if(email !== window.currentEmail){
          window.setupState.players = window.setupState.players.filter(x => x !== email);
        }
      } else {
        if(window.setupState.players.length < maxPlayers){
          window.setupState.players.push(email);
        }
      }
      renderSetupBodyPatched();
    }));

    document.querySelectorAll('[data-key]').forEach(btn => btn.addEventListener('click', () => {
      window.setupState[btn.dataset.key] = btn.dataset.value;
      if(btn.dataset.key === 'numPlayers'){
        normalizeSetupForGame();
      }
      renderSetupBodyPatched();
    }));
  }

  function bindSetupButtons(){
    const bind = (id, handler) => {
      const el = $(id);
      if(!el || typeof handler !== 'function') return;
      el.onclick = handler;
      el.ontouchstart = function(e){
        if(e && typeof e.preventDefault === 'function') e.preventDefault();
        handler(e);
        return false;
      };
    };

    bind('setupPlayerOneBtn', function(){
      if(window.currentEmail){
        window.setupState.players = [window.currentEmail];
        window.setupState.numPlayers = '1';
      }
      renderSetupBodyPatched();
    });

    bind('setupInviteArtBtn', function(){
      const players = window.setupState && Array.isArray(window.setupState.players) ? window.setupState.players : [];
      if(typeof window.issueInvites === 'function'){
        window.invitedPlayers = players.filter(function(x){ return x !== window.currentEmail; });
        window.issueInvites();
      }
      if(typeof window.renderWaitingList === 'function') window.renderWaitingList();
      if(typeof window.updateWaitingTime === 'function') window.updateWaitingTime();
      if(typeof window.showOverlay === 'function') window.showOverlay('waitingOverlay');
    });

    bind('setupBackArtBtn', function(){
      if(typeof window.hideAllOverlays === 'function') window.hideAllOverlays();
      if(typeof window.showScreen === 'function') window.showScreen('playersPage');
    });

    bind('setupExitArtBtn', function(){
      if(typeof window.hideAllOverlays === 'function') window.hideAllOverlays();
      if(typeof window.showScreen === 'function') window.showScreen('landingPage');
    });
  }


  if(!window.__ng6310PresenceHooks){
    window.__ng6310PresenceHooks = true;
    window.addEventListener('beforeunload', function(){ if(window.currentEmail) window.removeOnlineStatus(); });
    document.addEventListener('visibilitychange', function(){
      if(!window.currentEmail) return;
      if(document.visibilityState === 'visible') window.updateOnlineStatus();
      else window.removeOnlineStatus();
    });
  }

  function boot(){
    window.renderSetupBody = renderSetupBodyPatched;
    normalizeSetupForGame();
    bindSetupButtons();

    if(typeof window.openSetup === 'function' && !window.__ng5940OpenPatched){
      const original = window.openSetup;
      window.openSetup = function(){
        const result = original.apply(this, arguments);
        normalizeSetupForGame();
        renderSetupBodyPatched();
        bindSetupButtons();
        return result;
      };
      window.__ng5940OpenPatched = true;
    }

    setTimeout(() => {
      normalizeSetupForGame();
      renderSetupBodyPatched();
      bindSetupButtons();
    }, 60);

    setTimeout(bindSetupButtons, 260);
    setTimeout(bindSetupButtons, 900);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot, {once:true});
  } else {
    boot();
  }
})();
</script>
<script id="ng-6038-feature-buttons-script">
(function(){
  function $(id){ return document.getElementById(id); }

  function safeShow(id){
    if(typeof window.showOverlay === 'function' && $(id)) window.showOverlay(id);

  function safeHide(id){

  function rulesMarkup(game){

      url('./killer screen.png') center/cover no-repeat !important;
  }
  #transitionLayer .transBg{
    width:100% !important;
    height:100% !important;
    object-fit:cover !important;
    background:transparent !important;
  }
  .ng6102Wrap{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .ng6102Panel{
    width:min(86vw, 760px);
    border-radius:22px;
    background:rgba(8,12,24,.34);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 0 24px rgba(0,0,0,.28);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    color:#fff;
    padding:20px 24px;
  }
  .ng6102Title{
    text-align:center;
    font-size:28px;
    font-weight:900;
    margin-bottom:16px;
    text-shadow:0 0 12px rgba(0,0,0,.95);
  }
  .ng6102Row{
    display:grid;
    gap:16px;
    align-items:center;
    margin:10px 0;
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    font-size:30px;
    font-weight:900;
    text-shadow:0 0 10px rgba(0,0,0,.95);
  }
  .ng6102Row.order{ grid-template-columns:80px 1fr; }
  .ng6102Row.target{ grid-template-columns:1.2fr .8fr; }
  .ng6102Num,.ng6102Name,.ng6102Val{ text-align:center; }
</style>

<script id="ng-6102-full-rewire-script">
(function(){
  function norm(v){ return String(v || '').trim().toLowerCase(); }
  function now(){ return Date.now(); }
  function byId(id){ return document.getElementById(id); }
  function delay(ms){ return new Promise(function(resolve){ setTimeout(resolve, ms); }); }
  function safeShow(id){ if(typeof window.showOverlay === 'function' && byId(id)) window.showOverlay(id); }
  function safeHide(id){ if(typeof window.hideOverlay === 'function' && byId(id)) window.hideOverlay(id); }

  window.__ng6102 = window.__ng6102 || {
    bootedFor: '',
    playersUnsub: null,
    matchUnsub: null,
    inviteUnsub: null,
    playerDocUnsub: null,
    matchInviteUnsub: null,
    heartbeat: null,
    onlineMap: {},
    lastPhaseTs: 0
  };

  function playerByEmail(email){
    var clean = norm(email);
    return (window.PLAYERS || []).find(function(p){ return norm(p && p.email) === clean; }) || null;
  }

  function mergePlayerDoc(data, docId){
    var email = norm((data && data.email) || docId);
    if(!email) return;
    var merged = {
      email: email,
      name: (data && data.name) || [data && data.firstName || '', data && data.lastName || ''].filter(Boolean).join(' ').trim() || email,
      firstName: (data && data.firstName) || '',
      lastName: (data && data.lastName) || '',
      online: !!(data && data.online),
      lastSeen: (data && (data.lastSeen || data.updatedAt)) || 0
    };
    window.PLAYERS = window.PLAYERS || [];
    var idx = window.PLAYERS.findIndex(function(p){ return norm(p && p.email) === email; });
    if(idx === -1) window.PLAYERS.push(merged);
    else window.PLAYERS[idx] = Object.assign({}, window.PLAYERS[idx], merged);
  }

  function selectedInvitees(){
    var me = norm(window.currentEmail);
    var fromSetup = (window.setupState && Array.isArray(window.setupState.players)) ? window.setupState.players.slice() : [];
    var fromInvited = Array.isArray(window.invitedPlayers) ? window.invitedPlayers.slice() : [];
    return Array.from(new Set(fromSetup.concat(fromInvited).map(norm).filter(function(email){
      return !!email && email !== me;
    })));
  }

  function bindPlayersCollection(){
    if(typeof db === 'undefined') return;
    if(window.__ng6102.playersUnsub){
      try{ window.__ng6102.playersUnsub(); }catch(_e){}
      window.__ng6102.playersUnsub = null;
    }
    window.__ng6102.playersUnsub = db.collection('players').onSnapshot(function(snapshot){
      var map = {};
      snapshot.forEach(function(doc){
        var data = doc.data() || {};
        mergePlayerDoc(data, doc.id);
        var email = norm(data.email || doc.id);
        map[email] = !!data.online && ((now() - (data.lastSeen || data.updatedAt || 0)) < 20000);
      });
      window.__ng6102.onlineMap = map;
      if(typeof window.renderPlayers === 'function') window.renderPlayers();
    }, function(err){
      console.error('6102 players listener failed', err);
    });
  }

  window.playerIsOnline = function(email){
    var clean = norm(email);
    return !!window.__ng6102.onlineMap[clean];
  };
  try{ playerIsOnline = window.playerIsOnline; }catch(_e){}

  window.updateOnlineStatus = function(){
    if(typeof db === 'undefined') return;
    var email = norm(window.currentEmail);
    if(!email) return;
    var me = playerByEmail(email) || { name: window.currentEmail || email };
    db.collection('players').doc(email).set({
      email: email,
      name: me.name || email,
      firstName: me.firstName || '',
      lastName: me.lastName || '',
      online: true,
      lastSeen: now(),
      updatedAt: now()
    }, {merge:true}).catch(function(err){
      console.error('6102 updateOnlineStatus failed', err);
    });
    window.__ng6102.onlineMap[email] = true;
    if(typeof window.renderPlayers === 'function') window.renderPlayers();
  };
  try{ updateOnlineStatus = window.updateOnlineStatus; }catch(_e){}

  window.removeOnlineStatus = function(){
    if(typeof db === 'undefined') return;
    var email = norm(window.currentEmail);
    if(!email) return;
    db.collection('players').doc(email).set({
      email: email,
      online: false,
      lastSeen: now(),
      updatedAt: now()
    }, {merge:true}).catch(function(err){
      console.error('6102 removeOnlineStatus failed', err);
    });
    window.__ng6102.onlineMap[email] = false;
    if(typeof window.renderPlayers === 'function') window.renderPlayers();
  };
  try{ removeOnlineStatus = window.removeOnlineStatus; }catch(_e){}

  function startHeartbeat(){
    if(window.__ng6102.heartbeat){
      clearInterval(window.__ng6102.heartbeat);
    }
    window.__ng6102.heartbeat = setInterval(function(){
      if(window.currentEmail) window.updateOnlineStatus();
    }, 3000);
  }

  function updateInviteMessage6102(){
    var el = byId('inviteMessage');
    var inv = window.__activeInvite || null;
    if(!el || !inv) return;
    el.textContent = (inv.hostName || 'The host') + ' has invited you to play a match of ' + (inv.game || 'a game') + '.';
  }
  window.updateInviteMessage = updateInviteMessage6102;
  try{ updateInviteMessage = window.updateInviteMessage; }catch(_e){}

  function clearInviteState(email){
    var clean = norm(email);
    if(!clean || typeof db === 'undefined') return;
    db.collection('invites').doc(clean).delete().catch(function(){});
    db.collection('players').doc(clean).set({ pendingInvite: null, updatedAt: now() }, {merge:true}).catch(function(){});
  }

  window.issueInvites = function(){
    if(typeof db === 'undefined') return;
    var me = norm(window.currentEmail);
    if(!me) return;

    var host = playerByEmail(me) || { email: me, name: window.currentEmail || me };
    var invitees = selectedInvitees();
    window.invitedPlayers = invitees.slice();

    var order = [me].concat(invitees);
    var playersMap = {};
    order.forEach(function(email, idx){
      playersMap[email] = idx === 0 ? 'joined' : 'waiting';
    });

    var matchId = me.replace(/[^a-z0-9]/g, '_') + '_' + now();
    window.currentMatchId = matchId;

    db.collection('matches').doc(matchId).set({
      hostEmail: me,
      hostName: host.name || me,
      game: window.selectedGame || 'a game',
      order: order,
      players: playersMap,
      phase: '',
      phaseTs: 0,
      ts: now()
    }, {merge:true}).then(function(){
      var payload = {
        hostEmail: me,
        hostName: host.name || me,
        game: window.selectedGame || 'a game',
        matchId: matchId,
        status: 'pending',
        ts: now()
      };
      return Promise.all(invitees.map(function(email){
        return Promise.all([
          db.collection('invites').doc(email).set(payload, {merge:true}),
          db.collection('players').doc(email).set({ pendingInvite: payload, updatedAt: now() }, {merge:true})
        ]);
      }));
    }).then(function(){
      window.bindMatch(matchId);
      window.refreshWaitingFromMatchDoc({
        hostEmail: me,
        order: order,
        players: playersMap
      });
      safeShow('waitingOverlay');
    }).catch(function(err){
      console.error('6102 issueInvites failed', err);
    });
  };
  try{ issueInvites = window.issueInvites; }catch(_e){}

  function bindInviteListeners(){
    if(typeof db === 'undefined') return;
    var email = norm(window.currentEmail);
    if(!email) return;

    ['inviteUnsub','playerDocUnsub','matchInviteUnsub'].forEach(function(k){
      if(window.__ng6102[k]){
        try{ window.__ng6102[k](); }catch(_e){}
        window.__ng6102[k] = null;
      }
    });

    window.__ng6102.inviteUnsub = db.collection('invites').doc(email).onSnapshot(function(doc){
      if(!doc.exists) return;
      var data = doc.data() || {};
      if(data.status === 'pending'){
        window.__activeInvite = data;
        window.currentMatchId = data.matchId || null;
        updateInviteMessage6102();
        safeShow('inviteOverlay');
      }
    }, function(err){
      console.error('6102 invite doc listener failed', err);
    });

    window.__ng6102.playerDocUnsub = db.collection('players').doc(email).onSnapshot(function(doc){
      if(!doc.exists) return;
      var data = doc.data() || {};
      mergePlayerDoc(data, doc.id);
      var pending = data.pendingInvite || null;
      if(pending && pending.status === 'pending'){
        window.__activeInvite = pending;
        window.currentMatchId = pending.matchId || null;
        updateInviteMessage6102();
        safeShow('inviteOverlay');
      }
    }, function(err){
      console.error('6102 player doc listener failed', err);
    });

    window.__ng6102.matchInviteUnsub = db.collection('matches').where('players.' + email, '==', 'waiting').onSnapshot(function(snapshot){
      if(snapshot.empty) return;
      var docs = [];
      snapshot.forEach(function(doc){ docs.push({ id: doc.id, data: doc.data() || {} }); });
      docs.sort(function(a,b){ return (b.data.ts || 0) - (a.data.ts || 0); });
      var top = docs[0];
      window.__activeInvite = {
        hostEmail: top.data.hostEmail || '',
        hostName: top.data.hostName || 'The host',
        game: top.data.game || 'a game',
        matchId: top.id,
        status: 'pending',
        ts: top.data.ts || 0
      };
      window.currentMatchId = top.id;
      updateInviteMessage6102();
      safeShow('inviteOverlay');
    }, function(err){
      console.error('6102 match query listener failed', err);
    });
  }
  window.bindInviteListener = bindInviteListeners;
  try{ bindInviteListener = window.bindInviteListener; }catch(_e){}

  window.acceptInvite = function(){
    var inv = window.__activeInvite || {};
    var email = norm(window.currentEmail);
    if(!(inv.matchId && email) || typeof db === 'undefined') return;
    window.currentMatchId = inv.matchId;
    db.collection('matches').doc(inv.matchId).set({
      ['players.' + email]: 'joined',
      players: { [email]: 'joined' }
    }, {merge:true}).finally(function(){
      clearInviteState(email);
      window.__activeInvite = null;
      window.bindMatch(inv.matchId);
      safeHide('inviteOverlay');
      safeShow('waitingOverlay');
    });
  };
  try{ acceptInvite = window.acceptInvite; }catch(_e){}

  window.declineInvite = function(){
    var inv = window.__activeInvite || {};
    var email = norm(window.currentEmail);
    if(inv.matchId && email && typeof db !== 'undefined'){
      db.collection('matches').doc(inv.matchId).set({
        ['players.' + email]: 'declined',
        players: { [email]: 'declined' }
      }, {merge:true}).catch(function(){});
    }
    clearInviteState(email);
    window.__activeInvite = null;
    safeHide('inviteOverlay');
    if(typeof window.showScreen === 'function') window.showScreen('playersPage');
  };
  try{ declineInvite = window.declineInvite; }catch(_e){}

  window.refreshWaitingFromMatchDoc = function(data){
    data = data || {};
    var nested = (data.players && typeof data.players === 'object') ? data.players : {};
    var dotted = {};
    Object.keys(data).forEach(function(k){
      if(k.indexOf('players.') === 0){
        dotted[norm(k.slice(8))] = String(data[k] || '').toLowerCase();
      }
    });

    var order = Array.isArray(data.order) && data.order.length
      ? data.order.slice()
      : Array.from(new Set(Object.keys(nested).map(norm).concat(Object.keys(dotted))));
    var hostEmail = norm(data.hostEmail || order[0] || '');

    window.waitingPlayers = order.map(function(email, idx){
      var clean = norm(email);
      var known = playerByEmail(clean) || { name: email, email: clean };
      var status = String(
        nested[email] ||
        nested[clean] ||
        dotted[clean] ||
        (idx === 0 ? 'joined' : 'waiting')
      ).toLowerCase();

      return {
        name: known.name || email,
        email: clean,
        status: status,
        host: clean === hostEmail || (!hostEmail && idx === 0)
      };
    });

    window.refreshWaitingList();
  };
  try{ refreshWaitingFromMatchDoc = window.refreshWaitingFromMatchDoc; }catch(_e){}

  window.refreshWaitingList = function(){
    var slots = byId('waitingSlots');
    if(!slots) return;
    var rows = (Array.isArray(window.waitingPlayers) ? window.waitingPlayers : []).map(function(p){
      var status = String((p && p.status) || (p && p.host ? 'joined' : 'waiting')).toLowerCase();
      var cls = status === 'joined' ? 'joined' : (status === 'declined' ? 'declined' : 'waiting');
      var icon = status === 'joined' ? '✓' : (status === 'declined' ? '✕' : '⏳');
      var label = p.host ? 'HOST' : (status === 'joined' ? 'JOINED' : status.toUpperCase());
      return '<div class="waitingRowFill"><div class="waitingNameFill '+cls+'">'+(p.name || p.email || 'PLAYER')+'</div><div class="waitingStatusFill"><div class="statusBubble '+cls+'">'+icon+'</div><div class="waitingStatusLabel '+cls+'">'+label+'</div></div></div>';
    });
    var blanks = Math.max(0, 8 - rows.length);
    slots.innerHTML = rows.join('') + new Array(blanks).fill('<div class="waitingSlot"></div>').join('');
    var btn = byId('waitingStartGameBtn');
    var me = norm(window.currentEmail);
    var list = (window.waitingPlayers || []);
    var amHost = list.some(function(p){ return p && p.host && norm(p.email) === me; });
    var everyoneReady = list.filter(function(p){ return p && !p.host; }).length > 0 &&
      list.filter(function(p){ return p && !p.host; }).every(function(p){ return String(p.status || '').toLowerCase() === 'joined'; });

    if(btn){
      btn.classList.toggle('hostVisible', !!amHost && !!everyoneReady);
      btn.disabled = !(amHost && everyoneReady);
    }

    if(everyoneReady && amHost && window.currentMatchId && !window.__ng6102AutoStarted){
      window.__ng6102AutoStarted = true;
      setTimeout(function(){
        if(window.__ng6102AutoStarted && typeof window.startGameFromWaiting6015 === 'function'){
          window.startGameFromWaiting6015();
        }
      }, 550);
    }
    if(!everyoneReady){
      window.__ng6102AutoStarted = false;
    }
  };
  try{ refreshWaitingList = window.refreshWaitingList; }catch(_e){}

  window.bindMatch = function(matchId){
    if(typeof db === 'undefined') return;
    if(window.__ng6102.matchUnsub){
      try{ window.__ng6102.matchUnsub(); }catch(_e){}
      window.__ng6102.matchUnsub = null;
    }
    if(!matchId) return;
    window.currentMatchId = matchId;
    window.__ng6102.matchUnsub = db.collection('matches').doc(matchId).onSnapshot(function(doc){
      if(!doc.exists) return;
      var data = doc.data() || {};
      window.refreshWaitingFromMatchDoc(data);
      handlePhase6102(data);
    }, function(err){
      console.error('6102 match listener failed', err);
    });
  };
  try{ bindMatch = window.bindMatch; }catch(_e){}

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  function joinedPlayers(){
    var list = Array.isArray(window.waitingPlayers) ? window.waitingPlayers : [];
    return list.filter(function(p){
      var s = String((p && p.status) || '').toLowerCase();
      return p && (p.host || s === 'joined');
    }).map(function(p){
      return { email:p.email || '', name:p.name || p.email || 'PLAYER', host:!!p.host };
    });
  }

  function isHost(){
    var me = norm(window.currentEmail);
    return (window.waitingPlayers || []).some(function(p){ return p && p.host && norm(p.email) === me; });
  }

  function setPhase(phase, extra){
    if(!window.currentMatchId || typeof db === 'undefined') return;
    db.collection('matches').doc(window.currentMatchId).set(
      Object.assign({ phase: phase, phaseTs: now() }, extra || {}),
      { merge:true }
    );
  }

  function gameTransitionBg(kind){
    var game = String(window.selectedGame || '').toUpperCase();
    if(kind === 'welcome') return (typeof ngArt === 'function') ? ngArt('welcome', './welcomescreen.png') : './welcomescreen.png';
    if(kind === 'setup_intro') return (typeof ngArt === 'function') ? ngArt('letsSetup', './Letssetupyourmatch.png') : './Letssetupyourmatch.png';
    if(kind === 'randomizer') return (typeof ngArt === 'function') ? ngArt('randomizer', './Whogoesfirstscreen.png') : './Whogoesfirstscreen.png';
    if(kind === 'killer_randomizer') return (typeof ngArt === 'function') ? ngArt('killerRandomizer', './killer screen.png') : './killer screen.png';
    if(kind === 'shootWell') return (typeof ngArt === 'function') ? ngArt('shootWell', './ShootwellScreen.png') : './ShootwellScreen.png';
    if(game === 'KILLER') return (typeof ngArt === 'function') ? ngArt('setupKiller', './killer screen.png') : './killer screen.png';
    return (typeof ngArt === 'function') ? ngArt('setupDefault', './8D1759AF-358A-4891-8CD7-EB5B044931F6.png') : './8D1759AF-358A-4891-8CD7-EB5B044931F6.png';
  }

  function showTransitionScene(title, subtitle, bgSrc){
    var layer = byId('transitionLayer');
    if(!layer) return;
    layer.classList.add('active');
    layer.innerHTML = ''
      + '<img id="transitionBg" class="transBg show" src="' + (bgSrc || gameTransitionBg()) + '" alt="">'
      + '<div class="ng6102Wrap"><div class="ng6102Panel">'
      + '<div class="ng6102Title">' + title + '</div>'
      + '<div class="ng6102Row" style="grid-template-columns:1fr;font-size:24px;">' + subtitle + '</div>'
      + '</div></div>';
  }

  function clearTransition(){
    var layer = byId('transitionLayer');
    if(!layer) return;
    layer.classList.remove('active');
    layer.innerHTML = '<img id="transitionBg" class="transBg" src="" alt="">';
  }

  async function runOrderRandomizer(){
    var layer = byId('transitionLayer');
    if(!layer) return [];
    var players = joinedPlayers();
    if(!players.length) return [];
    layer.classList.add('active');
    layer.innerHTML = '<img id="transitionBg" class="transBg show" src="' + gameTransitionBg('randomizer') + '" alt=""><div class="ng6102Wrap"><div class="ng6102Panel"><div class="ng6102Title">ORDER OF PLAY</div><div id="ng6102OrderRows"></div></div></div>';
    var rows = byId('ng6102OrderRows');
    rows.innerHTML = players.map(function(_, i){
      return '<div class="ng6102Row order"><div class="ng6102Num">'+(i+1)+'</div><div class="ng6102Name" id="ng6102OrderName'+i+'"></div></div>';
    }).join('');

    for(var t=0;t<24;t++){
      var shuffled = shuffle(players);
      shuffled.forEach(function(p, i){
        var el = byId('ng6102OrderName'+i);
        if(el) el.textContent = p.name;
      });
      await delay(85 + (t>16 ? 28*(t-16) : 0));
    }

    var finalOrder = shuffle(players);
    finalOrder.forEach(function(p, i){
      var el = byId('ng6102OrderName'+i);
      if(el) el.textContent = p.name;
    });
    return finalOrder;
  }

  async function runTargetRandomizer(orderEmails){
    var layer = byId('transitionLayer');
    if(!layer) return [];
    var list = joinedPlayers();
    var ordered = (orderEmails || []).map(function(email){
      return list.find(function(p){ return norm(p.email) === norm(email); }) || { email: email, name: email };
    });
    if(!ordered.length) ordered = list;
    var vals = Array.from({length:20}, function(_, i){ return String(i+1); }).concat(['BULL']);

    layer.classList.add('active');
    layer.innerHTML = '<img id="transitionBg" class="transBg show" src="' + gameTransitionBg('killer_randomizer') + '" alt=""><div class="ng6102Wrap"><div class="ng6102Panel"><div class="ng6102Title">KILLER TARGETS</div><div id="ng6102TargetRows"></div></div></div>';
    var rows = byId('ng6102TargetRows');
    rows.innerHTML = ordered.map(function(p, i){
      return '<div class="ng6102Row target"><div class="ng6102Name">'+p.name+'</div><div class="ng6102Val" id="ng6102TargetVal'+i+'"></div></div>';
    }).join('');

    for(var t=0;t<26;t++){
      ordered.forEach(function(_, i){
        var val = vals[Math.floor(Math.random() * vals.length)];
        var el = byId('ng6102TargetVal'+i);
        if(el) el.textContent = val;
      });
      await delay(80 + (t>18 ? 30*(t-18) : 0));
    }

    var bag = shuffle(vals).slice(0, ordered.length);
    bag.forEach(function(target, i){
      var el = byId('ng6102TargetVal'+i);
      if(el) el.textContent = target;
    });
    return bag;
  }

  async function handlePhase6102(data){
    if(!data || !data.phase || data.phaseTs === window.__ng6102.lastPhaseTs) return;
    window.__ng6102.lastPhaseTs = data.phaseTs;

    if(data.phase === 'welcome_players'){
      showTransitionScene(String(window.selectedGame || 'MATCH') + ' MATCH', 'Welcome players', (typeof ngArt === 'function') ? ngArt('players', './PlayersBG.png') : './PlayersBG.png');
      await delay(2200);
      if(isHost()) setPhase('setup_intro');
      return;
    }

    if(data.phase === 'setup_intro'){
      showTransitionScene(String(window.selectedGame || 'MATCH') + ' MATCH', "Let's get your game set up", (typeof ngArt === 'function') ? ngArt('setupDefault', './8D1759AF-358A-4891-8CD7-EB5B044931F6.png') : './8D1759AF-358A-4891-8CD7-EB5B044931F6.png');
      await delay(2200);
      if(isHost()) setPhase('order_randomizer');
      return;
    }

    if(data.phase === 'order_randomizer'){
      var order = await runOrderRandomizer();
      if(isHost()){
        setPhase('order_hold', {
          turnOrder: order.map(function(p){ return p.email; }),
          turnOrderNames: order.map(function(p){ return p.name; })
        });
      }
      return;
    }

    if(data.phase === 'order_hold'){
      await delay(2200);
      if(isHost()){
        if(String(window.selectedGame || '').toUpperCase() === 'KILLER') setPhase('killer_randomizer');
        else setPhase('shoot_well');
      }
      return;
    }

    if(data.phase === 'killer_randomizer'){
      var targets = await runTargetRandomizer(Array.isArray(data.turnOrder) ? data.turnOrder : []);
      if(isHost()) setPhase('killer_hold', { killerTargets: targets });
      return;
    }

    if(data.phase === 'killer_hold'){
      await delay(2200);
      if(isHost()) setPhase('shoot_well');
      return;
    }

    if(data.phase === 'shoot_well'){

<script id="ng-6310-clean-runtime">

    var email = norm(window.__pendingRegistrationEmail);
    var first = (($('regFirstName') && $('regFirstName').value) || '').trim();

  function bindPresenceListener(){

      if(window.__ng6310[k]){
        try{ window.__ng6310[k](); }catch(_e){}
        window.__ng6310[k] = null;
      }

    function repaint(){

    window.__ng6310.presenceMap = window.__ng6310.presenceMap || {};

    window.__ng6310.presenceUnsub = window.db.collection('presence').onSnapshot(function(snapshot){
      var map = Object.assign({}, window.__ng6310.presenceMap || {});
      snapshot.forEach(function(doc){
        var d = doc.data() || {};
        var email = norm(d.email || doc.id);

      var map = Object.assign({}, window.__ng6310.presenceMap || {});
      snapshot.forEach(function(doc){
        var d = doc.data() || {};
        var email = norm(d.email || doc.id);
        if(!email) return;
        var idx = (window.PLAYERS || []).findIndex(function(p){ return norm(p && p.email) === email; });
        var merged = Object.assign({email: email}, d, {name: d.name || [d.firstName || '', d.lastName || ''].filter(Boolean).join(' ').trim() || email});
        if(idx >= 0) window.PLAYERS[idx] = Object.assign({}, window.PLAYERS[idx], merged);
        else (window.PLAYERS = window.PLAYERS || []).push(merged);
        if(typeof d.online !== 'undefined' || d.lastSeen || d.updatedAt){
          var prev = map[email] || {};
          map[email] = { online: !!d.online || !!prev.online, ts: Number(d.lastSeen || d.updatedAt || prev.ts || 0) };
        }
      });
      if(window.currentEmail){
        map[norm(window.currentEmail)] = { online: true, ts: now() };
      }
      window.__ng6310.presenceMap = map;
      repaint();
    }, function(){});
  }
  window.bindPresenceListener = bindPresenceListener;

  function writePresence(online){
    if(!(window.db && window.db.collection)) return;
    var email = norm(window.currentEmail);
    if(!email) return;
    var stamp = now();
    window.db.collection('presence').doc(email).set({
      email: email,
      online: !!online,
      ts: stamp
    }, {merge:true}).catch(function(){});
    window.db.collection('players').doc(email).set({
      email: email,
      online: !!online,
      lastSeen: stamp,
      updatedAt: stamp
    }, {merge:true}).catch(function(){});
    window.__ng6310 = window.__ng6310 || {};
    window.__ng6310.presenceMap = window.__ng6310.presenceMap || {};

  function isFreshPresence(entry){
    if(!entry || !entry.online) return false;
    return (now() - Number(entry.ts || 0)) < 45000;
  }

  window.playerIsOnline = function(email){
    var clean = norm(email);
    if(!clean) return false;
    if(clean === norm(window.currentEmail)) return true;
    var fromPresence = false;
    if(window.__ng6310 && window.__ng6310.presenceMap && typeof window.__ng6310.presenceMap[clean] !== 'undefined'){
      fromPresence = isFreshPresence(window.__ng6310.presenceMap[clean]);

    var fromPlayer = false;
    var p = (window.PLAYERS || []).find(function(x){ return norm(x && x.email) === clean; });
    if(p){
      var last = Number(p.lastSeen || p.updatedAt || 0);
      fromPlayer = !!p.online && ((now() - last) < 45000);

    return fromPresence || fromPlayer;

      var ao = window.playerIsOnline(a.email) ? 1 : 0;

    list.querySelectorAll('.playerHistoryBtn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var email = btn.getAttribute('data-email');

        if($('playerHistoryBody')) $('playerHistoryBody').innerHTML = '<div class="ngOverlayBody"><div class="ngInfoCard"><div class="ngInfoTitle">' + htmlEscape(playerName(p)) + '</div><div class="ngInfoCopy">Player history screen is active and styled. Firebase history can flow here.</div></div></div>';
        if(typeof showOverlay === 'function') showOverlay('playerHistoryOverlay');

      btn.addEventListener('click', function(){
        var email = btn.getAttribute('data-email');

  function htmlEscape(v){
    return String(v || '').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; });
  }
  function attrEscape(v){
    return htmlEscape(v);

  // fix enter path to always use registration overlay for new users
  window.handleEnterIntoApp = async function(e){
    if(e) e.preventDefault();
    var email = (($('emailInput') && $('emailInput').value) || '').trim().toLowerCase();
    if(!email) return false;

<script id="ng-6408-invite-sync-and-alignment">
(function(){
  function byId(id){ return document.getElementById(id); }
  function norm(v){ return String(v || '').trim().toLowerCase(); }
  function now(){ return Date.now(); }
  function delay(ms){ return new Promise(function(resolve){ setTimeout(resolve, ms); }); }
  function safe(fn){ try{ return fn(); }catch(e){ console.error(e); } }
  function show(id){ if(typeof window.showOverlay === 'function' && byId(id)) window.showOverlay(id); }
  function hide(id){ if(typeof window.hideOverlay === 'function' && byId(id)) window.hideOverlay(id); }
  function art(key, fallback){ return (typeof window.ngArt === 'function') ? window.ngArt(key, fallback) : fallback; }

  function renderOrderPanel(names){
    var layer = byId('transitionLayer');
    if(!layer) return;
    layer.classList.add('active');
    layer.innerHTML = '<img id="transitionBg" class="transBg show" src="' + art('whoGoesFirst','./Whogoesfirstscreen.png') + '" alt="">'
      + '<div class="ng6102Wrap"><div class="ng6102Panel"><div class="ng6102Title">ORDER OF PLAY</div>'
      + (names || []).map(function(name, i){
          return '<div class="ng6102Row order"><div class="ng6102Num">' + (i + 1) + '</div><div class="ng6102Name">' + name + '</div></div>';
        }).join('')
      + '</div></div>';
  }

  function renderTargetsPanel(names, targets){
    var layer = byId('transitionLayer');
    if(!layer) return;
    layer.classList.add('active');
    layer.innerHTML = '<img id="transitionBg" class="transBg show" src="' + art('setupKiller','./killer screen.png') + '" alt="">'
      + '<div class="ng6102Wrap"><div class="ng6102Panel"><div class="ng6102Title">KILLER TARGETS</div>'
      + (names || []).map(function(name, i){
          return '<div class="ng6102Row target"><div class="ng6102Name">' + name + '</div><div class="ng6102Val">' + ((targets || [])[i] || '') + '</div></div>';
        }).join('')
      + '</div></div>';
  }

  function patchInviteListener(){
    if(window.__ng6408InvitePatched || typeof window.bindInviteListener !== 'function') return;
    window.__ng6408InvitePatched = true;

    window.bindInviteListener = function(){
      if(typeof db === 'undefined') return;
      var email = norm(window.currentEmail);
      if(!email) return;

      var state = window.__ng6102 || window.__ng6090State || {};
      ['inviteUnsub','playerDocUnsub','matchInviteUnsub'].forEach(function(k){
        if(state[k]){
          try{ state[k](); }catch(_e){}
          state[k] = null;
        }
      });

      if(state){
        state.inviteUnsub = db.collection('invites').doc(email).onSnapshot(function(doc){
          if(!doc.exists) return;
          var data = doc.data() || {};
          if(data.status === 'pending'){
            window.__activeInvite = data;
            window.currentMatchId = data.matchId || null;
            window.selectedGame = data.game || window.selectedGame;
            if(typeof window.updateInviteMessage === 'function') window.updateInviteMessage();
            show('inviteOverlay');
          }
        }, function(err){ console.error('6408 invite doc listener failed', err); });

        state.playerDocUnsub = db.collection('players').doc(email).onSnapshot(function(doc){
          if(!doc.exists) return;
          var data = doc.data() || {};
          var pending = data.pendingInvite || null;
          if(pending && pending.status === 'pending'){
            window.__activeInvite = pending;
            window.currentMatchId = pending.matchId || null;
            window.selectedGame = pending.game || window.selectedGame;
            if(typeof window.updateInviteMessage === 'function') window.updateInviteMessage();
            show('inviteOverlay');
          }
        }, function(err){ console.error('6408 player doc listener failed', err); });

        state.matchInviteUnsub = null; // disable fallback query that was surfacing stale game invites
      }
    };
  }

  function patchIssueInvites(){
    if(window.__ng6408IssuePatched || typeof window.issueInvites !== 'function') return;
    window.__ng6408IssuePatched = true;
    var old = window.issueInvites;
    window.issueInvites = function(){
      var gameSnapshot = String(window.selectedGame || '').trim();
      var out = old.apply(this, arguments);
      // keep latest invite payload/game snapshot authoritative
      safe(function(){
        var me = norm(window.currentEmail);
        var matchId = window.currentMatchId;
        if(typeof db === 'undefined' || !me || !matchId || !gameSnapshot) return;
        db.collection('matches').doc(matchId).set({ game: gameSnapshot, updatedAt: now() }, {merge:true}).catch(function(){});
        (window.invitedPlayers || []).forEach(function(email){
          if(!email) return;
          var payload = {
            hostEmail: me,
            hostName: ((window.PLAYERS || []).find(function(p){ return norm(p.email) === me; }) || {}).name || me,
            game: gameSnapshot,
            matchId: matchId,
            status: 'pending',
            ts: now()
          };
          db.collection('invites').doc(norm(email)).set(payload, {merge:true}).catch(function(){});
          db.collection('players').doc(norm(email)).set({ pendingInvite: payload, updatedAt: now() }, {merge:true}).catch(function(){});
        });
      });
      return out;
    };
  }

  function patchAcceptInvite(){
    if(window.__ng6408AcceptPatched || typeof window.acceptInvite !== 'function') return;
    window.__ng6408AcceptPatched = true;
    window.acceptInvite = function(){
      var inv = window.__activeInvite || {};
      var email = norm(window.currentEmail);
      if(!(inv.matchId && email) || typeof db === 'undefined') return;
      window.currentMatchId = inv.matchId;
      db.collection('matches').doc(inv.matchId).get().then(function(snap){
        var data = snap.exists ? (snap.data() || {}) : {};
        window.selectedGame = data.game || inv.game || window.selectedGame;
        return db.collection('matches').doc(inv.matchId).set({
          game: window.selectedGame || inv.game || data.game || '',
          ['players.' + email]: 'joined',
          players: { [email]: 'joined' }
        }, {merge:true});
      }).finally(function(){
        safe(function(){
          if(typeof clearInviteState === 'function') clearInviteState(email);
        });
        window.__activeInvite = null;
        if(typeof window.bindMatch === 'function') window.bindMatch(inv.matchId);
        hide('inviteOverlay');
        show('waitingOverlay');
      });
    };
  }

  function patchPhaseSync(){
    if(window.__ng6408PhasePatched || typeof window.handlePhase6102 !== 'function') return;
    window.__ng6408PhasePatched = true;
    var old = window.handlePhase6102;
    window.handlePhase6102 = async function(data){
      var nonHost = (typeof window.isHost === 'function' && !window.isHost());

      if(data && data.phase === 'order_randomizer' && nonHost){
        renderOrderPanel(Array.isArray(data.turnOrderNames) ? data.turnOrderNames : []);
        return;
      }

      if(data && data.phase === 'order_hold' && Array.isArray(data.turnOrderNames) && data.turnOrderNames.length){
        window.setupState = window.setupState || {};
        window.setupState.turnOrder = Array.isArray(data.turnOrder) ? data.turnOrder.slice() : [];
        renderOrderPanel(data.turnOrderNames.slice());
        await delay(2200);
        if(typeof window.isHost === 'function' && window.isHost()){
          if(String(window.selectedGame || '').toUpperCase() === 'KILLER' && typeof window.setPhase === 'function') window.setPhase('killer_randomizer');
          else if(typeof window.setPhase === 'function') window.setPhase('shoot_well');
        }
        return;
      }

      if(data && data.phase === 'killer_randomizer' && nonHost){
        renderTargetsPanel(Array.isArray(data.turnOrderNames) ? data.turnOrderNames : [], []);
        return;
      }

      if(data && data.phase === 'killer_hold' && Array.isArray(data.killerTargets)){
        renderTargetsPanel(
          Array.isArray(data.turnOrderNames) ? data.turnOrderNames : (((window.setupState || {}).turnOrderNames) || []),
          data.killerTargets
        );
        await delay(2200);
        if(typeof window.isHost === 'function' && window.isHost() && typeof window.setPhase === 'function') window.setPhase('shoot_well');
        return;
      }

      return old.apply(this, arguments);
    };
  }

  function patchWaitingRefresh(){
    if(window.__ng6408WaitPatched || typeof window.refreshWaitingFromMatchDoc !== 'function') return;
    window.__ng6408WaitPatched = true;
    var old = window.refreshWaitingFromMatchDoc;
    window.refreshWaitingFromMatchDoc = function(data){
      var out = old.apply(this, arguments);
      safe(function(){
        var slots = byId('waitingSlots');
        if(slots) slots.style.justifyContent = 'stretch';
      });
      return out;
    };
  }

  function boot6408(){
    patchInviteListener();
    patchIssueInvites();
    patchAcceptInvite();
    patchPhaseSync();
    patchWaitingRefresh();
    safe(function(){ if(typeof window.bindInviteListener === 'function' && window.currentEmail) window.bindInviteListener(); });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot6408, {once:true});
  } else {
    boot6408();
  }
  window.addEventListener('load', boot6408);
})();
</script>
