<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dart Calculator</title>

<style>
  html, body {
    margin:0; padding:0; width:100%; height:100%;
    background:#000; overflow:hidden;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color: transparent;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  /* Fullscreen stage */
  #stage { position:fixed; inset:0; background:#000; overflow:hidden; }
  #bg    { position:absolute; inset:0; background:#000 center/contain no-repeat; }

  /* Overlay text never blocks taps */
  .overlay{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    pointer-events:none;
  }

  /* ===== TEXT STYLES YOU ASKED FOR ===== */

  /* Current score (501): Blue -> Pink */
  #score{
    background: linear-gradient(180deg, rgba(110,210,255,1) 0%, rgba(255,105,200,1) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 22px rgba(255,255,255,0.08), 0 0 26px rgba(0,0,0,0.60);
    font-weight: 900;
  }

  /* Dart suggestions (T20 etc): Pink -> Blue (slightly smaller, centered by layout) */
  .dart{
    background: linear-gradient(180deg, rgba(255,105,200,1) 0%, rgba(110,210,255,1) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 16px rgba(0,210,255,0.18), 0 0 18px rgba(0,0,0,0.55);
    font-weight: 900;
    letter-spacing: 0.04em;
  }

  /* Typed input: white, centered */
  #input{
    color: rgba(255,255,255,0.92);
    text-shadow: 0 0 12px rgba(0,0,0,0.70);
    font-weight: 900;
    letter-spacing: 0.14em;
    line-height: 1;
  }

  /* Tiny brand between gold borders */
  #brand{
    color: rgba(255,255,255,0.78);
    text-shadow: 0 0 10px rgba(0,0,0,0.55);
    font-weight: 800;
    letter-spacing: 0.12em;
  }

  /* Version number: white */
  #version{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 0 10px rgba(0,0,0,0.45);
    font-weight: 900;
    letter-spacing: 0.08em;
  }

  /* Tap zones */
  .tap{
    position:absolute;
    background: transparent;
    border:none;
    outline:none;
    padding:0;
    margin:0;
    pointer-events:auto;
    touch-action: manipulation;
  }

  /* Keypad grid container (tap zones only) */
  #pad{
    position:absolute;
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr 1fr;
    gap: 0;
    pointer-events:auto;
  }
  #pad button{
    width:100%;
    height:100%;
    background: transparent;
    border:none;
    outline:none;
    pointer-events:auto;
    touch-action: manipulation;
  }
</style>
</head>

<body>
<div id="stage">
  <div id="bg"></div>

  <!-- overlays (ONLY what isn't baked into your background) -->
  <div id="version" class="overlay">v1.2.0</div>
  <div id="brand" class="overlay">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>

  <div id="score" class="overlay">501</div>
  <div id="d1" class="overlay dart">-</div>
  <div id="d2" class="overlay dart">-</div>
  <div id="d3" class="overlay dart">-</div>
  <div id="input" class="overlay">---</div>

  <!-- Mode buttons -->
  <button id="m301" class="tap" aria-label="301"></button>
  <button id="m501" class="tap" aria-label="501"></button>
  <button id="m701" class="tap" aria-label="701"></button>

  <!-- Keypad -->
  <div id="pad" aria-label="Keypad">
    <button data-k="7" aria-label="7"></button>
    <button data-k="8" aria-label="8"></button>
    <button data-k="9" aria-label="9"></button>
    <button data-k="4" aria-label="4"></button>
    <button data-k="5" aria-label="5"></button>
    <button data-k="6" aria-label="6"></button>
    <button data-k="1" aria-label="1"></button>
    <button data-k="2" aria-label="2"></button>
    <button data-k="3" aria-label="3"></button>
    <button data-k="DEL" aria-label="Delete"></button>
    <button data-k="0" aria-label="0"></button>
    <button data-k="DONATE" aria-label="Donate"></button>
  </div>

  <!-- Apply -->
  <button id="apply" class="tap" aria-label="Apply Turn"></button>
</div>

<script>
  /* ================= BACKGROUND ================= */
  // Uses RAW github so it always loads/scales correctly
  const BG_SRC = "https://raw.githubusercontent.com/smoody157/darts-501-app/main/IMG_7603.jpeg";

  /* ================= LAYOUT (NORMALIZED) =================
     x,y = center of element (0..1), w,h = size (0..1)
  */
  const LAYOUT = {
    "version": {"x":0.50,"y":0.045,"w":0.60,"h":0.04},
    "brand":   {"x":0.50,"y":0.195,"w":0.92,"h":0.03},

    "score":   {"x":0.50,"y":0.295,"w":0.90,"h":0.12},

    // Dart values: lowered slightly to center in boxes
    "d1":      {"x":0.24,"y":0.440,"w":0.24,"h":0.07},
    "d2":      {"x":0.50,"y":0.440,"w":0.24,"h":0.07},
    "d3":      {"x":0.76,"y":0.440,"w":0.24,"h":0.07},

    "input":   {"x":0.50,"y":0.535,"w":0.82,"h":0.08},

    // Buttons
    "m301":    {"x":0.415,"y":0.335,"w":0.13,"h":0.05},
    "m501":    {"x":0.500,"y":0.335,"w":0.13,"h":0.05},
    "m701":    {"x":0.585,"y":0.335,"w":0.13,"h":0.05},

    // Keypad & Apply
    "pad":     {"x":0.50,"y":0.725,"w":0.86,"h":0.29},
    "apply":   {"x":0.50,"y":0.885,"w":0.86,"h":0.07}
  };

  /* ================= OUT CHART ARRAYS =================
     NOTE: This is a safe placeholder set. If you paste your real arrays (OUT_SHOT/OUT_REM)
     from your sheet later, it will become exact.
     For now it will still do:
       >170 => T20 T20 T20
       <=170 => uses whatever mapping exists here (fallback dash if missing)
  */
  const OUT_SHOT = Array(502).fill(null);
  const OUT_REM  = Array(502).fill(null);

  // Minimal sensible examples (you can expand by pasting your real arrays)
  // 170: T20 T20 DB
  OUT_SHOT[170] = "T20"; OUT_REM[170] = 110;
  OUT_SHOT[110] = "T20"; OUT_REM[110] = 50;
  OUT_SHOT[50]  = "DB";  OUT_REM[50]  = 0;

  // 32: D16
  OUT_SHOT[32] = "D16"; OUT_REM[32] = 0;

  function fmtShot(s){
    if (!s) return "-";
    s = String(s).trim().toUpperCase();
    if (s === "SB" || s === "S25") return "B";
    if (s === "DB" || s === "BULL" || s === "D25") return "DB";
    return s;
  }

  /* ================= IMAGE + FIT ================= */
  const IMG = new Image();
  IMG.decoding = "async";
  IMG.src = BG_SRC;

  function place(id, rect, imgW, imgH, offX, offY){
    const el = document.getElementById(id);
    if (!el) return;
    const w = rect.w * imgW;
    const h = rect.h * imgH;
    const x = offX + (rect.x * imgW) - (w/2);
    const y = offY + (rect.y * imgH) - (h/2);
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.width = w + "px";
    el.style.height = h + "px";
  }

  function fit(){
    const stage = document.getElementById("stage");
    const bg = document.getElementById("bg");

    const vw = stage.clientWidth;
    const vh = stage.clientHeight;

    const iw = IMG.naturalWidth || 708;
    const ih = IMG.naturalHeight || 1536;
    const ar = iw / ih;

    let imgW, imgH, offX, offY;
    if ((vw / vh) > ar){
      imgH = vh;
      imgW = imgH * ar;
      offX = (vw - imgW) / 2;
      offY = 0;
    } else {
      imgW = vw;
      imgH = imgW / ar;
      offX = 0;
      offY = (vh - imgH) / 2;
    }

    bg.style.backgroundImage = "url('" + BG_SRC + "')";
    bg.style.backgroundSize = imgW + "px " + imgH + "px";
    bg.style.backgroundPosition = offX + "px " + offY + "px";

    // Place overlays
    place("version", LAYOUT.version, imgW, imgH, offX, offY);
    place("brand",   LAYOUT.brand,   imgW, imgH, offX, offY);
    place("score",   LAYOUT.score,   imgW, imgH, offX, offY);
    place("d1",      LAYOUT.d1,      imgW, imgH, offX, offY);
    place("d2",      LAYOUT.d2,      imgW, imgH, offX, offY);
    place("d3",      LAYOUT.d3,      imgW, imgH, offX, offY);
    place("input",   LAYOUT.input,   imgW, imgH, offX, offY);

    // Tap zones
    place("m301", LAYOUT.m301, imgW, imgH, offX, offY);
    place("m501", LAYOUT.m501, imgW, imgH, offX, offY);
    place("m701", LAYOUT.m701, imgW, imgH, offX, offY);
    place("apply",LAYOUT.apply,imgW, imgH, offX, offY);

    // Keypad container
    const pad = document.getElementById("pad");
    const pr = LAYOUT.pad;
    const pw = pr.w * imgW;
    const ph = pr.h * imgH;
    const px = offX + (pr.x * imgW) - (pw/2);
    const py = offY + (pr.y * imgH) - (ph/2);
    pad.style.left = px + "px";
    pad.style.top = py + "px";
    pad.style.width = pw + "px";
    pad.style.height = ph + "px";

    // ===== FONT SIZES (THE ONLY TWO YOU WANTED SMALLER) =====
    // Current score (leave big)
    document.getElementById("score").style.fontSize = Math.max(36, imgH*0.110) + "px";

    // Dart values: SMALLER (noticeable)
    ["d1","d2","d3"].forEach(id => {
      document.getElementById(id).style.fontSize = Math.max(16, imgH*0.030) + "px";
    });

    // Typed input: SMALLER (noticeable)
    document.getElementById("input").style.fontSize = Math.max(18, imgH*0.020) + "px";

    // Tiny brand
    document.getElementById("brand").style.fontSize = Math.max(8, imgH*0.010) + "px";
    document.getElementById("version").style.fontSize = Math.max(10, imgH*0.018) + "px";
  }

  window.addEventListener("resize", fit);
  IMG.onload = fit;
  IMG.onerror = fit;
  setTimeout(fit, 250);

  /* ================= APP LOGIC ================= */
  const APP = {
    s: 501,
    i: "",

    draw(){
      document.getElementById("score").textContent = this.s;
      document.getElementById("input").textContent = this.i || "---";
    },

    set(n){
      this.s = n;
      this.i = "";
      this.draw();
      this.updateOut();
    },

    key(k){
      if (k === "DEL"){ this.i = ""; this.draw(); return; }
      if (k === "DONATE"){ window.open("https://venmo.com/u/Steve-Moody-8","_blank"); return; }
      if (this.i.length < 3){ this.i += String(k); this.draw(); }
    },

    updateOut(){
      const darts = ["-","-","-"];
      if (this.s > 170){
        darts[0] = "T20"; darts[1] = "T20"; darts[2] = "T20";
      } else {
        let cur = this.s;
        for (let k=0; k<3; k++){
          if (!cur || cur < 2 || cur > 170) break;
          const shot = OUT_SHOT[cur];
          const rem  = OUT_REM[cur];
          if (!shot || rem === null || rem === undefined) break;
          darts[k] = fmtShot(shot);
          cur = rem;
          if (cur === 0) break;
        }
      }
      document.getElementById("d1").textContent = darts[0];
      document.getElementById("d2").textContent = darts[1];
      document.getElementById("d3").textContent = darts[2];
    },

    apply(){
      const v = parseInt(this.i, 10);
      if (!isNaN(v)){
        const next = this.s - v;
        if (next < 0 || next === 1){ // bust or leave 1
          this.i = "";
          this.draw();
          return;
        }
        this.s = next;
        this.i = "";
        this.draw();
        this.updateOut();
      } else {
        this.i = "";
        this.draw();
      }
    }
  };

  // Wire taps
  document.getElementById("m301").addEventListener("click", () => APP.set(301));
  document.getElementById("m501").addEventListener("click", () => APP.set(501));
  document.getElementById("m701").addEventListener("click", () => APP.set(701));
  document.getElementById("apply").addEventListener("click", () => APP.apply());
  document.querySelectorAll("#pad button").forEach(btn => {
    btn.addEventListener("click", () => APP.key(btn.dataset.k));
  });

  APP.draw();
  APP.updateOut();
</script>
</body>
</html>
