<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OATS Checkout</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#000; font-family:Arial, sans-serif; overflow:hidden; }

#app {
  width:430px;
  height:932px;
  margin:auto;
  position:relative;
  background:url('./oats.jpeg') no-repeat center center;
  background-size:100% 100%;
}

/* Dart Labels */
.dart-label {
  position:absolute;
  font-size:10px;
  color:#aaa;
  top:4px;
  left:6px;
  pointer-events:none;
}

/* Neon text */
.neon {
  background:linear-gradient(to bottom,#72d6ff,#ff4fa1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
  text-align:center;
  position:absolute;
  width:100%;
}

#score { top:230px; font-size:90px; }
#input { top:515px; font-size:52px; }

.dart-box { position:absolute; width:105px; text-align:center; font-size:24px; top:430px; }
#d1 { left:40px; }
#d2 { left:164px; }
#d3 { left:288px; }

/* Keypad */
.grid {
  position:absolute;
  top:620px;
  left:50px;
  width:330px;
  height:240px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,1fr);
}

.grid button {
  background:transparent;
  border:none;
}

button { cursor:pointer; }

#apply { position:absolute; bottom:30px; left:50px; width:330px; height:70px; background:transparent; border:none; }

#donate {
  position:absolute;
  bottom:110px;
  right:50px;
  width:70px;
  height:40px;
  background:transparent;
  border:none;
}

</style>
</head>

<body>
<div id="app">

<div id="score" class="neon">501</div>
<div id="input" class="neon">---</div>

<div class="dart-box neon" id="d1"><div class="dart-label">Dart 1</div>-</div>
<div class="dart-box neon" id="d2"><div class="dart-label">Dart 2</div>-</div>
<div class="dart-box neon" id="d3"><div class="dart-label">Dart 3</div>-</div>

<div class="grid">
<button onclick="APP.key(7)"></button>
<button onclick="APP.key(8)"></button>
<button onclick="APP.key(9)"></button>
<button onclick="APP.key(4)"></button>
<button onclick="APP.key(5)"></button>
<button onclick="APP.key(6)"></button>
<button onclick="APP.key(1)"></button>
<button onclick="APP.key(2)"></button>
<button onclick="APP.key(3)"></button>
<button onclick="APP.clear()"></button>
<button onclick="APP.key(0)"></button>
<button onclick="window.open('https://your-donation-link.com','_blank')"></button>
</div>

<button id="apply" onclick="APP.apply()"></button>

</div>

const APP = {
score:501,
input:"",

draw(){
document.getElementById("score").innerText=this.score;
document.getElementById("input").innerText=this.input||"---";
let out=OUTS[this.score]||["-","-","-"];
document.getElementById("d1").lastChild.textContent=out[0]||"-";
document.getElementById("d2").lastChild.textContent=out[1]||"-";
document.getElementById("d3").lastChild.textContent=out[2]||"-";
},

key(n){ if(this.input.length<3) this.input+=n; this.draw(); },
clear(){ this.input=""; this.draw(); },

apply(){
let v=parseInt(this.input);
if(!isNaN(v) && this.score-v>=0 && this.score-v!==1)
this.score-=v;
this.input="";
this.draw();
}
};

APP.draw();

</html>
