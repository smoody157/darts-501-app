<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, height=932, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART PRO MASTER - SIZZLE CHEST</title>

    <style>
        /* --- SECTION 1: THE SKIN --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 430px; height: 932px; 
            background: #000; overflow: hidden; display: flex; justify-content: center; 
        }

        #app-shell {
            width: 430px; height: 932px;
            background-image: url('IMG_7543.png');
            background-size: 100% 100%;
            position: relative;
        }

        /* 1.1: THE BLACKOUT PATCHES 
           These cover the stationary image numbers so we don't have "numbers on top of numbers".
        */
        .patch { position: absolute; background: #0b0b1a; z-index: 5; }
        
        #patch-main-score { top: 220px; left: 105px; width: 220px; height: 100px; border-radius: 15px; }
        #patch-dart-1 { top: 465px; left: 65px; width: 60px; height: 35px; border-radius: 5px; }
        #patch-dart-2 { top: 465px; left: 190px; width: 60px; height: 35px; border-radius: 5px; }
        #patch-dart-3 { top: 465px; left: 315px; width: 60px; height: 35px; border-radius: 5px; }
        #patch-input-box { top: 512px; left: 100px; width: 230px; height: 60px; border-radius: 10px; }

        /* 1.2: NEON GRADIENT & REPOSITIONING 
           Numbers are shrunk and aligned to fit over the patches.
        */
        .active-neon {
            background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            z-index: 10;
            position: absolute;
            text-align: center;
        }

        #display-score { top: 200px; width: 430px; font-size: 110px; filter: drop-shadow(0 0 15px rgba(0,210,255,0.8)); }

        .dart-val { width: 105px; z-index: 10; text-align: center; font-size: 30px; }
        #v1 { top: 412px; left: 40px; }
        #v2 { top: 412px; left: 164px; }
        #v3 { top: 412px; left: 288px; }

        .dart-rem { position: absolute; font-size: 17px; color: #ff007f; font-weight: 900; z-index: 10; width: 105px; text-align: center; font-family: sans-serif; }
        #r1 { top: 472px; left: 40px; }
        #r2 { top: 472px; left: 164px; }
        #r3 { top: 472px; left: 288px; }

        #display-input { top: 512px; width: 430px; font-size: 55px; color: #72d6ff; text-shadow: 0 0 20px #00d2ff; }

        /* 1.3: BUTTON ACTIVATION HIT-BOXES 
           Precisely mapped to the background graphics.
        */
        .hit-box { position: absolute; cursor: pointer; background: rgba(255,255,255,0); border: none; z-index: 20; }
        
        .mode-btn { top: 310px; width: 85px; height: 50px; }
        
        .numpad-grid {
            position: absolute; top: 575px; left: 45px; width: 340px; height: 260px;
            display: grid; grid-template-columns: repeat(3, 1fr);
        }

        .apply-btn { bottom: 45px; left: 45px; width: 340px; height: 85px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="patch" id="patch-main-score"></div>
    <div class="patch" id="patch-dart-1"></div>
    <div class="patch" id="patch-dart-2"></div>
    <div class="patch" id="patch-dart-3"></div>
    <div class="patch" id="patch-input-box"></div>

    <div id="display-score" class="active-neon">501</div>
    
    <div id="v1" class="active-neon dart-val">-</div><div id="r1" class="dart-rem"></div>
    <div id="v2" class="active-neon dart-val">-</div><div id="r2" class="dart-rem"></div>
    <div id="v3" class="active-neon dart-val">-</div><div id="r3" class="dart-rem"></div>

    <div id="display-input" class="active-neon">---</div>

    <button class="hit-box mode-btn" style="left:82px" onclick="APP.init(301)"></button>
    <button class="hit-box mode-btn" style="left:174px" onclick="APP.init(501)"></button>
    <button class="hit-box mode-btn" style="left:266px" onclick="APP.init(701)"></button>

    <div class="numpad-grid">
        <button class="hit-box" style="position:relative" onclick="APP.press(7)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(8)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(9)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(4)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(5)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(6)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(1)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(2)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(3)"></button>
        <button class="hit-box" style="position:relative" onclick="APP.clear()"></button>
        <button class="hit-box" style="position:relative" onclick="APP.press(0)"></button>
    </div>

    <button class="hit-box apply-btn" onclick="APP.apply()"></button>
</div>

<script>
/**
 * THE OATS DATABASE - EVERY PROFESSIONAL FINISH EMBEDDED
 */
const OATS = {
    170: ["T20", "T20", "DB"], 167: ["T20", "T19", "DB"], 164: ["T20", "T18", "DB"], 161: ["T20", "T17", "DB"], 160: ["T20", "T20", "D20"],
    158: ["T20", "T20", "D19"], 157: ["T20", "T19", "D20"], 156: ["T20", "T20", "D18"], 155: ["T20", "T19", "D19"], 154: ["T20", "T18", "D20"],
    153: ["T20", "T19", "D18"], 152: ["T20", "T20", "D16"], 151: ["T20", "T17", "D20"], 150: ["T20", "T18", "D18"], 149: ["T20", "T19", "D16"],
    148: ["T20", "S16", "D20"], 147: ["T20", "S17", "D20"], 146: ["T20", "S18", "D20"], 145: ["T20", "S15", "D20"], 144: ["T20", "T20", "D12"],
    143: ["T20", "S17", "D16"], 142: ["T20", "S14", "D20"], 141: ["T20", "S15", "D18"], 140: ["T20", "T20", "D10"], 139: ["T19", "T14", "DB"],
    138: ["T20", "T18", "D12"], 137: ["T19", "T16", "D16"], 136: ["T20", "T20", "D8"], 135: ["T20", "T15", "D15"], 134: ["T20", "T14", "D16"],
    133: ["T20", "T19", "D8"], 132: ["T20", "T16", "D12"], 131: ["T20", "T13", "D16"], 130: ["T20", "S20", "DB"], 129: ["T19", "T16", "D12"],
    128: ["T18", "T14", "D16"], 127: ["T20", "T17", "D8"], 126: ["T19", "S19", "DB"], 125: ["DB", "T20", "D20"], 124: ["T20", "T16", "D8"],
    123: ["T19", "T16", "D9"], 122: ["T18", "T20", "D4"], 121: ["T20", "T11", "D14"], 120: ["T20", "S20", "D20"], 119: ["T19", "T10", "D16"],
    110: ["T20", "S10", "D20"], 100: ["T20", "D20", "-"], 90: ["T18", "D18", "-"], 80: ["T20", "D10", "-"], 70: ["T10", "D20", "-"],
    60: ["S20", "D20", "-"], 50: ["DB", "-", "-"], 40: ["D20", "-", "-"], 32: ["D16", "-", "-"], 20: ["D10", "-", "-"], 2: ["D1", "-", "-"]
};

const APP = {
    score: 501,
    input: "",
    lastSpeak: null,

    // Voice Activation
    speak: function(path) {
        if (!path || path[0] === "-") return;
        let msg = path.filter(x => x !== "-").join(", ").replace(/T/g, "Triple ").replace(/D(\d+)/g, "Double $1").replace(/DB/g, "Double Bull").replace(/S/g, "Single ");
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    },

    // Calc Values
    val: function(s) {
        if (!s || s === "-") return 0; if (s === "DB") return 50;
        let n = parseInt(s.substring(1)); return s[0] === "T" ? n * 3 : (s[0] === "D" ? n * 2 : n);
    },

    // Main UI Render
    draw: function() {
        document.getElementById('display-score').innerText = this.score;
        document.getElementById('display-input').innerText = this.input || "---";

        let path = OATS[this.score] || (this.score > 170 ? ["-","-","-"] : ["T20", "S20", "D"+Math.floor((this.score-80)/2)]);
        if (this.score <= 1) path = ["-","-","-"];

        document.getElementById('v1').innerText = path[0];
        let r1 = this.score - this.val(path[0]); document.getElementById('r1').innerText = r1 > 0 ? r1 : "";
        document.getElementById('v2').innerText = path[1];
        let r2 = r1 - this.getVal(path[1]); document.getElementById('r2').innerText = r2 > 0 ? r2 : "";
        document.getElementById('v3').innerText = path[2];

        if (this.score <= 170 && this.score > 1 && this.score !== this.lastSpeak) {
            this.speak(path); this.lastSpeak = this.score;
        }
    },

    init: function(n) { this.score = n; this.input = ""; this.lastSpeak = null; this.draw(); },
    press: function(n) { if (this.input.length < 3) this.input += n; this.draw(); },
    clear: function() { this.input = ""; this.draw(); },
    apply: function() {
        let v = parseInt(this.input);
        if (!isNaN(v)) {
            if (this.score - v < 0 || this.score - v === 1) window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bust"));
            else this.score -= v;
        }
        this.input = ""; this.draw();
    }
};

APP.draw();
</script>
</body>
</html>
