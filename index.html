<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, height=932, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* SECTION 1: THE SKIN */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; width: 430px; height: 932px; background: #000; overflow: hidden; display: flex; justify-content: center; }
        
        #app-shell {
            width: 430px; height: 932px;
            background-image: url('IMG_7543.png');
            background-size: 100% 100%;
            position: relative;
        }

        /* 1.1: SURGICAL BLENDED MASKS 
           Color matched to the background void for seamless blending.
        */
        .mask { position: absolute; background: #080812; z-index: 5; }
        
        /* Top Status Bar (Battery/Clock) */
        #mask-status { top: 0; left: 0; width: 430px; height: 95px; z-index: 30; } 

        /* Main Score Area - Shrunk to keep 301/501/701 buttons fully visible */
        #mask-score-area { top: 255px; left: 145px; width: 140px; height: 80px; border-radius: 12px; }

        /* Dart Suggestion Boxes - Surgical coverage */
        #mask-dart1 { top: 468px; left: 78px; width: 48px; height: 24px; }
        #mask-dart2 { top: 468px; left: 203px; width: 48px; height: 24px; }
        #mask-dart3 { top: 468px; left: 328px; width: 48px; height: 24px; }

        /* Input Line Mask */
        #mask-input-line { top: 522px; left: 135px; width: 160px; height: 48px; }

        /* 1.2: NEON ACTIVE DISPLAYS 
           Positioned directly ON TOP of the black patches for clarity.
        */
        .neon-active {
            background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            z-index: 10; /* Sits above the masks */
            position: absolute;
            text-align: center;
        }

        #score-val { top: 232px; width: 430px; font-size: 92px; filter: drop-shadow(0 0 10px rgba(0,210,255,0.8)); }
        
        .dart-txt { width: 105px; text-align: center; font-size: 25px; }
        #v1 { top: 424px; left: 40px; } 
        #v2 { top: 424px; left: 164px; } 
        #v3 { top: 424px; left: 288px; }

        .rem-txt { position: absolute; font-size: 14px; color: #ff007f; font-weight: 900; z-index: 15; width: 105px; text-align: center; }
        #r1 { top: 472px; left: 40px; } 
        #r2 { top: 472px; left: 164px; } 
        #r3 { top: 472px; left: 288px; }

        #input-val { top: 515px; width: 430px; font-size: 52px; color: #72d6ff; text-shadow: 0 0 15px #00d2ff; }

        /* BUILD TAG */
        #build-tag { position: absolute; bottom: 8px; right: 15px; font-family: monospace; color: rgba(255,255,255,0.4); font-size: 10px; z-index: 40; }

        /* BUTTON HIT-BOXES */
        .hit { position: absolute; cursor: pointer; background: transparent; border: none; z-index: 25; }
        .mode-hit { top: 375px; width: 60px; height: 40px; }
        .grid { position: absolute; top: 620px; left: 50px; width: 330px; height: 240px; display: grid; grid-template-columns: repeat(3, 1fr); }
        .apply-hit { bottom: 30px; left: 50px; width: 330px; height: 70px; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="mask" id="mask-status"></div>
    <div class="mask" id="mask-score-area"></div>
    <div class="mask" id="mask-dart1"></div>
    <div class="mask" id="mask-dart2"></div>
    <div class="mask" id="mask-dart3"></div>
    <div class="mask" id="mask-input-line"></div>

    <div id="score-val" class="neon-active">501</div>
    <div id="v1" class="neon-active dart-txt">-</div><div id="r1" class="rem-txt"></div>
    <div id="v2" class="neon-active dart-txt">-</div><div id="r2" class="rem-txt"></div>
    <div id="v3" class="neon-active dart-txt">-</div><div id="r3" class="rem-txt"></div>
    <div id="input-val" class="neon-active">---</div>
    <div id="build-tag">REV: 85</div>

    <button class="hit mode-hit" style="left:125px" onclick="APP.set(301)"></button>
    <button class="hit mode-hit" style="left:185px" onclick="APP.set(501)"></button>
    <button class="hit mode-hit" style="left:245px" onclick="APP.set(701)"></button>

    <div class="grid">
        <button class="hit" style="position:relative" onclick="APP.key(7)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(8)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(9)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(4)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(5)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(6)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(1)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(2)"></button>
        <button class="hit" style="position:relative" onclick="APP.key(3)"></button>
        <button class="hit" style="position:relative" onclick="APP.clr()"></button>
        <button class="hit" style="position:relative" onclick="APP.key(0)"></button>
    </div>
    <button class="hit apply-hit" onclick="APP.apply()"></button>
</div>

<script>
const OATS = {
    170:["T20","T20","DB"], 167:["T20","T19","DB"], 164:["T20","T18","DB"], 160:["T20","T20","D20"],
    100:["T20","D20","-"], 50:["DB","-","-"], 40:["D20","-","-"], 2:["D1","-","-"]
};

const APP = {
    s: 501, i: "", v: null,
    speak: function(m) {
        if (!m) return;
        const u = new SpeechSynthesisUtterance(m); u.rate = 0.85;
        window.speechSynthesis.speak(u);
    },
    get: function(x) {
        if (!x || x === "-") return 0; if (x === "DB") return 50;
        let n = parseInt(x.substring(1)); return x[0] === "T" ? n * 3 : (x[0] === "D" ? n * 2 : n);
    },
    draw: function() {
        document.getElementById('score-val').innerText = this.s;
        document.getElementById('input-val').innerText = this.i || "---";
        let p = OATS[this.s] || (this.s > 170 ? ["-","-","-"] : ["T20", "S20", "D"+Math.floor((this.s-80)/2)]);
        if (this.s <= 1) p = ["-","-","-"];
        document.getElementById('v1').innerText = p[0];
        let r1 = this.s - this.get(p[0]); document.getElementById('r1').innerText = r1 > 0 ? r1 : "";
        document.getElementById('v2').innerText = p[1];
        let r2 = r1 - this.get(p[1]); document.getElementById('r2').innerText = r2 > 0 ? r2 : "";
        document.getElementById('v3').innerText = p[2];
        if (this.s <= 170 && this.s > 1 && this.s !== this.v) {
            let msg = p.filter(y => y !== "-").join(", ").replace(/T/g,"Triple ").replace(/D(\d+)/g,"Double $1").replace(/DB/g,"Double Bull");
            this.speak(msg); this.v = this.s;
        }
    },
    set: function(n) { this.s = n; this.i = ""; this.v = null; this.draw(); },
    key: function(n) { if (this.i.length < 3) this.i += n; this.draw(); },
    clr: function() { this.i = ""; this.draw(); },
    apply: function() {
        let v = parseInt(this.i);
        if (!isNaN(v)) { 
            if (this.s - v < 0 || this.s - v === 1) this.speak("Bust");
            else this.s -= v; 
        }
        this.i = ""; this.draw();
    }
};
APP.draw();
</script>
</body>
</html>
