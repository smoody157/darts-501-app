<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Dart Calculator</title>
<style>
  /* =========================
     0) BASE / STAGE
     ========================= */
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
  #wrap{position:relative;}
  #bg{display:block;max-width:100vw;max-height:100vh;width:auto;height:auto;}

  /* =========================
     1) OVERLAY LAYER (TEXT)
     ========================= */
  #overlay{position:absolute;inset:0;pointer-events:none;}
  .txt{position:absolute;transform:translate(-50%,-50%);text-align:center;white-space:nowrap;pointer-events:none;}
  .center{left:50%;}

  /* Color styles (edit if you want) */
  #score{font-weight:900;background:linear-gradient(180deg, rgba(110,210,255,1) 0%, rgba(255,105,200,1) 100%);
         -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
         text-shadow:0 0 18px rgba(0,0,0,.6);}
  .dart{font-weight:900;background:linear-gradient(180deg, rgba(255,105,200,1) 0%, rgba(110,210,255,1) 100%);
        -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
        text-shadow:0 0 14px rgba(0,0,0,.6);letter-spacing:.04em;}
  #input{font-weight:900;color:rgba(255,255,255,.92);letter-spacing:.14em;text-shadow:0 0 14px rgba(0,0,0,.7);}
  #version{font-weight:900;color:rgba(255,255,255,.92);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;}
  #brand{font-weight:800;color:rgba(255,255,255,.80);letter-spacing:.12em;}

  /* =========================
     2) TAP LAYER (HITBOXES)
     ========================= */
  #taps{position:absolute;inset:0;pointer-events:auto;}
  .tap{position:absolute;transform:translate(-50%,-50%);background:transparent;border:0;padding:0;margin:0;outline:none;touch-action:manipulation;}
  #pad{position:absolute;transform:translate(-50%,-50%);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);gap:0;}
  #pad button{background: transparent;;border:0;outline:0;touch-action:manipulation;}
</style>
</head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

function normalizeBgUrl(u){
  if(!u) return u;
  // If user accidentally uses GitHub "blob" URL, convert to raw.
  // Example: https://github.com/<user>/<repo>/blob/<branch>/<path>
  const m = u.match(/^https:\/\/github\.com\/([^\/]+)\/([^\/]+)\/blob\/([^\/]+)\/(.+)$/);

/* =========================
   4) APP STATE
   ========================= */
const APP = {
  mode: 501,
  s: 501,
  typed: ""
};

/* =========================
   5) LAYOUT ENGINE
   ========================= */
const bg = document.getElementById("bg");
const wrap = document.getElementById("wrap");

function place(el, r, imgW, imgH) {
  const node = document.getElementById(el);
  if(!node) return;
  node.style.left   = (r.x * imgW) + "px";
  node.style.top    = (r.y * imgH) + "px";
  node.style.width  = (r.w * imgW) + "px";
  node.style.height = (r.h * imgH) + "px";
}

function setFont(id, px) {
  const node = document.getElementById(id);
  if(node) node.style.fontSize = px + "px";
}

function layoutAll() {
  const imgW = bg.clientWidth;
  const imgH = bg.clientHeight;
  // wrap matches image box
  wrap.style.width = imgW + "px";
  wrap.style.height = imgH + "px";

  // place text overlays
  place("version", LAYOUT.version, imgW, imgH);
  place("brand",   LAYOUT.brand,   imgW, imgH);
  place("score",   LAYOUT.score,   imgW, imgH);
  place("d1",      LAYOUT.d1,      imgW, imgH);
  place("d2",      LAYOUT.d2,      imgW, imgH);
  place("d3",      LAYOUT.d3,      imgW, imgH);
  place("input",   LAYOUT.input,   imgW, imgH);

  // place tap targets
  place("m301",  LAYOUT.m301,  imgW, imgH);
  place("m501",  LAYOUT.m501,  imgW, imgH);
  place("m701",  LAYOUT.m701,  imgW, imgH);
  place("apply", LAYOUT.apply, imgW, imgH);
  place("donate",LAYOUT.donate,imgW, imgH);

  // keypad area
  const pad = document.getElementById("pad");
  const pr = LAYOUT.pad;
  pad.style.left   = (pr.x * imgW) + "px";
  pad.style.top    = (pr.y * imgH) + "px";
  pad.style.width  = (pr.w * imgW) + "px";
  pad.style.height = (pr.h * imgH) + "px";

  // fonts
  setFont("version", Math.max(10, imgH * FONT.version));
  setFont("brand",   Math.max(8,  imgH * FONT.brand));
  setFont("score",   Math.max(28, imgH * FONT.score));
  ["d1","d2","d3"].forEach(id => setFont(id, Math.max(14, imgH * FONT.darts)));
  setFont("input",   Math.max(16, imgH * FONT.input));
}

/* =========================
   6) OUT CHAIN (CURRENT NUMBER -> LOOKUP -> REM -> LOOKUP)
   ========================= */
function fmtShot(s) {
  if(!s) return "-";
  // Sheet uses B/DB already after conversion (SB->B)
  return String(s).replace(/^S/, "").replace(/^T/, "T").replace(/^D/, "D");
}

function computeOutDarts(score) {
  const darts = ["-","-","-"];
  let cur = score;

  for(let k=0;k<3;k++) {
    if(cur <= 1) break;

    // For games >501, walk down by T20 until in chart range
    if(cur > 501) {
      darts[k] = "T20";
      cur = cur - 60;
      continue;
    }

    const shot = OUT_SHOT[cur];
    const rem  = OUT_REM[cur];

    if(!shot && shot !== "0") break;
    if(rem === null || rem === undefined) break;

    darts[k] = fmtShot(shot);

    if(rem === 0) break;
    cur = rem;
  }

  return darts;
}

function updateUI() {
  document.getElementById("score").textContent = String(APP.s);
  document.getElementById("input").textContent = APP.typed.length ? APP.typed : "---";
  const darts = computeOutDarts(APP.s);
  document.getElementById("d1").textContent = darts[0];
  document.getElementById("d2").textContent = darts[1];
  document.getElementById("d3").textContent = darts[2];
}

/* =========================
   7) INPUT / WIRING
   ========================= */
function setMode(m) {
  APP.mode = m;
  APP.s = m;
  APP.typed = "";
  updateUI();
}

function keyPress(k) {
  if(k === "DEL") {
    APP.typed = APP.typed.slice(0, -1);
    updateUI();
    return;
  }
  if(k === "DONATE") {
    window.open(DONATE_URL, "_blank");
    return;
  }
  if(/^[0-9]$/.test(k)) {
    if(APP.typed.length < 3) APP.typed += k;
    updateUI();
  }
}

function applyTurn() {
  if(!APP.typed.length) return;
  const val = parseInt(APP.typed, 10);
  APP.typed = "";
  if(!Number.isFinite(val)) { updateUI(); return; }
  APP.s = Math.max(0, APP.s - val);
  updateUI();
}

document.getElementById("m301").addEventListener("click", () => setMode(301));
document.getElementById("m501").addEventListener("click", () => setMode(501));
document.getElementById("m701").addEventListener("click", () => setMode(701));
document.getElementById("apply").addEventListener("click", applyTurn);
document.getElementById("donate").addEventListener("click", () => window.open(DONATE_URL, "_blank"));

document.querySelectorAll("#pad button").forEach(btn => {
  btn.addEventListener("click", () => keyPress(btn.dataset.k));
});

/* =========================
   8) BOOT
   ========================= */
bg.onerror = () => {
  statusEl.textContent = `BG FAILED: ${bg.src}`;
  statusEl.style.background = 'rgba(180,0,0,0.55)';
};

bg.onload = () => {
  layoutAll();
  updateUI();
  setTimeout(()=>{ statusEl.remove(); }, 900);
};
window.addEventListener("resize", () => {
  layoutAll();
  updateUI();
});

bg.src = normalizeBgUrl(BG_SRC);
statusEl.textContent = `BG: ${bg.src}`;
