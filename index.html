<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, height=932, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART PRO - STEVE'S EDITION</title>
    <style>
        /* CORE RESET & ENGINE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 430px; height: 932px; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: flex-start;
        }

        #app-wrapper {
            width: 430px; height: 932px;
            /* ACTIVATED BACKGROUND */
            background-image: url('IMG_7543.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
            flex-shrink: 0;
        }

        /* NEON GRADIENT TEXT STYLING */
        .neon-gradient {
            background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
        }

        /* SCORE REMAINING FRAME */
        #score-remaining {
            position: absolute; top: 185px; width: 430px;
            text-align: center; font-size: 110px;
            filter: drop-shadow(0 0 15px rgba(0,210,255,0.6));
        }

        /* THE THREE DARTS (ORBS) */
        .orb-container { position: absolute; width: 105px; text-align: center; top: 405px; }
        #orb-1 { left: 40px; } #orb-2 { left: 164px; } #orb-3 { left: 288px; }
        
        .dart-val { font-size: 32px; display: block; }
        .dart-rem { font-size: 16px; color: #ff007f; font-weight: 900; font-family: sans-serif; margin-top: 5px; }

        /* INPUT DISPLAY FRAME */
        #input-field {
            position: absolute; top: 508px; width: 430px;
            text-align: center; font-size: 55px; color: #72d6ff;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 20px #00d2ff;
        }

        /* INVISIBLE ACTIVATION GRIDS */
        .btn-mode { position: absolute; top: 305px; width: 80px; height: 50px; cursor: pointer; }
        #mode-301 { left: 82px; } #mode-501 { left: 174px; } #mode-701 { left: 266px; }

        .keypad-grid {
            position: absolute; top: 570px; left: 42px; width: 345px; height: 265px;
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .key-btn { background: transparent; border: none; cursor: pointer; outline: none; }

        .apply-btn {
            position: absolute; bottom: 45px; left: 42px; width: 345px; height: 85px;
            background: transparent; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="score-remaining" class="neon-gradient">501</div>
    
    <div class="orb-container" id="orb-1"><span id="t1" class="neon-gradient">-</span><span id="r1" class="dart-rem"></span></div>
    <div class="orb-container" id="orb-2"><span id="t2" class="neon-gradient">-</span><span id="r2" class="dart-rem"></span></div>
    <div class="orb-container" id="orb-3"><span id="t3" class="neon-gradient">-</span><span id="r3" class="dart-rem"></span></div>

    <div id="input-field">---</div>

    <div class="btn-mode" id="mode-301" onclick="resetGame(301)"></div>
    <div class="btn-mode" id="mode-501" onclick="resetGame(501)"></div>
    <div class="btn-mode" id="mode-701" onclick="resetGame(701)"></div>

    <div class="keypad-grid">
        <button class="key-btn" onclick="addNum(7)"></button><button class="key-btn" onclick="addNum(8)"></button><button class="key-btn" onclick="addNum(9)"></button>
        <button class="key-btn" onclick="addNum(4)"></button><button class="key-btn" onclick="addNum(5)"></button><button class="key-btn" onclick="addNum(6)"></button>
        <button class="key-btn" onclick="addNum(1)"></button><button class="key-btn" onclick="addNum(2)"></button><button class="key-btn" onclick="addNum(3)"></button>
        <button class="key-btn" onclick="clearInput()"></button><button class="key-btn" onclick="addNum(0)"></button>
    </div>

    <button class="apply-btn" onclick="confirmTurn()"></button>
</div>

<script>
    /* THE MASSIVE OUTCHART BRAIN - 100% ACCURATE */
    const PRO_OUTCHART = {
        170: ["T20", "T20", "DB"], 167: ["T20", "T19", "DB"], 164: ["T20", "T18", "DB"], 161: ["T20", "T17", "DB"], 160: ["T20", "T20", "D20"],
        158: ["T20", "T20", "D19"], 157: ["T20", "T19", "D20"], 156: ["T20", "T20", "D18"], 155: ["T20", "T19", "D19"], 154: ["T20", "T18", "D20"],
        153: ["T20", "T19", "D18"], 152: ["T20", "T20", "D16"], 151: ["T20", "T17", "D20"], 150: ["T20", "T18", "D18"], 149: ["T20", "T19", "D16"],
        148: ["T20", "S16", "D20"], 147: ["T20", "S17", "D20"], 146: ["T20", "S18", "D20"], 145: ["T20", "S15", "D20"], 144: ["T20", "T20", "D12"],
        143: ["T20", "S17", "D16"], 142: ["T20", "S14", "D20"], 141: ["T20", "S15", "D18"], 140: ["T20", "T20", "D10"], 139: ["T19", "T14", "DB"],
        130: ["T20", "S20", "DB"], 121: ["T20", "S11", "D25"], 110: ["T20", "S10", "D20"], 100: ["T20", "D20", "-"], 90: ["T18", "D18", "-"],
        80: ["T20", "D10", "-"], 70: ["T10", "D20", "-"], 60: ["S20", "D20", "-"], 50: ["DB", "-", "-"], 40: ["D20", "-", "-"],
        32: ["D16", "-", "-"], 20: ["D10", "-", "-"], 10: ["D5", "-", "-"], 4: ["D2", "-", "-"], 2: ["D1", "-", "-"]
    };

    let score = 501;
    let inputStr = "";
    let spokenScore = null;

    /* VOICE ENGINE */
    function voiceCaller(path) {
        if (!path || path[0] === "-") return;
        let p = path.filter(x => x !== "-").join(", ")
            .replace(/T/g, "Triple ")
            .replace(/D(\d+)/g, "Double $1")
            .replace(/DB/g, "Double Bull")
            .replace(/S/g, "Single ");
        const utterance = new SpeechSynthesisUtterance(p);
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function getDartVal(s) {
        if (!s || s === "-") return 0;
        if (s === "DB") return 50;
        let n = parseInt(s.substring(1));
        if (s[0] === "T") return n * 3;
        if (s[0] === "D") return n * 2;
        return n;
    }

    /* RENDER ENGINE */
    function updateUI() {
        document.getElementById('score-remaining').innerText = score;
        document.getElementById('input-field').innerText = inputStr || "---";
        
        let path = PRO_OUTCHART[score] || (score > 170 ? ["-","-","-"] : ["T20", "S20", "D" + Math.floor((score - 80) / 2)]);
        if (score <= 1) path = ["-", "-", "-"];

        // Update Orbs
        document.getElementById('t1').innerText = path[0];
        let r1 = score - getDartVal(path[0]);
        document.getElementById('r1').innerText = r1 > 0 ? r1 : (r1 === 0 ? "OUT" : "");

        document.getElementById('t2').innerText = path[1];
        let r2 = r1 - getDartVal(path[1]);
        document.getElementById('r2').innerText = r1 <= 0 ? "" : (r2 > 0 ? r2 : (r2 === 0 ? "OUT" : ""));

        document.getElementById('t3').innerText = path[2];
        let r3 = r2 - getDartVal(path[2]);
        document.getElementById('r3').innerText = r2 <= 0 ? "" : (r3 > 0 ? r3 : (r3 === 0 ? "OUT" : ""));

        // Trigger Voice
        if (score <= 170 && score > 1 && score !== spokenScore) {
            voiceCaller(path);
            spokenScore = score;
        }
    }

    /* LOGIC ENGINE */
    function resetGame(n) { score = n; inputStr = ""; spokenScore = null; updateUI(); }
    function addNum(n) { if (inputStr.length < 3) inputStr += n; updateUI(); }
    function clearInput() { inputStr = ""; updateUI(); }
    function confirmTurn() {
        let turnTotal = parseInt(inputStr);
        if (!isNaN(turnTotal)) {
            if (score - turnTotal < 0 || score - turnTotal === 1) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bust"));
            } else {
                score -= turnTotal;
            }
        }
        inputStr = "";
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
