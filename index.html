<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR PRO - MASTER</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            /* Wired to your repo image */
            background: #000 url('7F737C26-56A1-497B-A4A2-CCD6141E7B8C.png') no-repeat center center;
            background-size: 100% 100%;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .canvas { width: 100vw; height: 100vh; max-width: 430px; position: relative; }

        /* Score Display Area */
        #main-score {
            position: absolute; top: 22.5%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 82px; color: #fff; text-shadow: 0 0 20px #00d2ff;
        }

        /* Game Mode Selectors (301, 501, 701) */
        .mode-grid {
            position: absolute; top: 31.5%; left: 15%; width: 70%; height: 5%;
            display: flex; justify-content: space-between;
        }
        .mode-btn { width: 30%; background: transparent; border: none; cursor: pointer; }

        /* Outchart Target Orbs */
        .dart-grid {
            position: absolute; top: 41.5%; width: 100%;
            display: flex; justify-content: space-around;
        }
        .dart-slot { width: 33%; text-align: center; }
        .target { font-size: 26px; color: #fff; display: block; font-weight: 900; }
        .remain { font-size: 16px; color: #ff007f; font-weight: 900; }

        /* Input Row (---) */
        .input-display {
            position: absolute; top: 52.8%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px; color: #00d2ff; font-weight: 900;
        }

        /* Numpad Hit-Zones */
        .keypad {
            position: absolute; top: 58%; left: 6%; width: 88%; height: 32%;
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .key { background: transparent; border: none; cursor: pointer; outline: none; }

        /* Apply Turn Action */
        .apply-btn {
            position: absolute; bottom: 4.5%; left: 5%; width: 90%; height: 60px;
            background: transparent; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="canvas">
    <div id="main-score">501</div>

    <div class="mode-grid">
        <button class="mode-btn" onclick="setGame(301)"></button>
        <button class="mode-btn" onclick="setGame(501)"></button>
        <button class="mode-btn" onclick="setGame(701)"></button>
    </div>

    <div class="dart-grid">
        <div class="dart-slot"><span class="target" id="d1-t">-</span><span class="remain" id="d1-r"></span></div>
        <div class="dart-slot"><span class="target" id="d2-t">-</span><span class="remain" id="d2-r"></span></div>
        <div class="dart-slot"><span class="target" id="d3-t">-</span><span class="remain" id="d3-r"></span></div>
    </div>

    <div id="input-val" class="input-display">---</div>

    <div class="keypad">
        <button class="key" onclick="press(7)"></button><button class="key" onclick="press(8)"></button><button class="key" onclick="press(9)"></button>
        <button class="key" onclick="press(4)"></button><button class="key" onclick="press(5)"></button><button class="key" onclick="press(6)"></button>
        <button class="key" onclick="press(1)"></button><button class="key" onclick="press(2)"></button><button class="key" onclick="press(3)"></button>
        <button class="key" onclick="del()"></button><button class="key" onclick="press(0)"></button>
    </div>

    <button class="apply-btn" onclick="apply()"></button>
</div>

<script>
    let score = 501;
    let currentInput = "";

    // FULL EMBEDDED PROFESSIONAL PDC OUTCHART (170-2)
    const masterOutchart = {
        170:["T20","T20","BULL"],167:["T20","T19","BULL"],164:["T20","T18","BULL"],161:["T20","T17","BULL"],160:["T20","T20","D20"],
        158:["T20","T20","D19"],157:["T20","T19","D20"],156:["T20","T20","D18"],155:["T20","T19","D19"],154:["T20","T18","D20"],
        153:["T20","T19","D18"],152:["T20","T20","D16"],151:["T20","T17","D20"],150:["T20","T18","D18"],149:["T20","T19","D16"],
        148:["T20","T16","D20"],147:["T20","T17","D18"],146:["T20","T18","D16"],145:["T20","T15","D20"],144:["T20","T20","D12"],
        143:["T20","T17","D16"],142:["T20","T14","D20"],141:["T20","T15","D18"],140:["T20","T20","D10"],139:["T19","T14","D20"],
        138:["T20","T18","D12"],137:["T19","T16","D16"],136:["T20","T20","D8"],135:["T20","T13","D19"],134:["T20","T14","D16"],
        133:["T20","T19","D8"],132:["T20","T16","D12"],131:["T20","T13","D16"],130:["T20","T18","D8"],129:["T19","T16","D12"],
        128:["T18","T14","D16"],127:["T20","T17","D8"],126:["T19","S19","D25"],125:["S25","T20","D20"],124:["T20","T16","D8"],
        123:["T19","T16","D9"],122:["T18","T20","D4"],121:["T20","T15","D8"],120:["T20","S20","D20"],119:["T19","T10","D16"],
        118:["T20","S18","D20"],117:["T20","S17","D20"],116:["T20","S16","D20"],115:["T20","S15","D20"],114:["T20","S14","D20"],
        113:["T20","S13","D20"],112:["T20","T12","D8"],111:["T20","S19","D16"],110:["T20","S10","D20"],109:["T20","S9","D20"],
        108:["T20","S16","D16"],107:["T19","S10","D20"],106:["T20","S10","D18"],105:["T19","S16","D16"],104:["T18","S10","D16"],
        103:["T20","S3","D20"],102:["T20","S10","D16"],101:["T17","S10","D20"],100:["T20","D20","-"],99:["T19","S10","D16"],
        98:["T20","D19","-"],97:["T19","D20","-"],96:["T20","D18","-"],95:["T19","D19","-"],94:["T18","D20","-"],
        93:["T19","D18","-"],92:["T20","D16","-"],91:["T17","D20","-"],90:["T18","D18","-"],89:["T19","D16","-"],
        88:["T16","D20","-"],87:["T17","D18","-"],86:["T18","D16","-"],85:["T15","D20","-"],84:["T20","D12","-"],
        83:["T17","D16","-"],82:["T14","D20","-"],81:["T15","D18","-"],80:["T20","D10","-"],79:["T13","D20","-"],
        78:["T14","D18","-"],77:["T15","D16","-"],76:["T20","D8","-"],75:["T17","D12","-"],74:["T14","D16","-"],
        73:["T19","D8","-"],72:["T16","D12","-"],71:["T13","D16","-"],70:["T10","D20","-"],69:["T15","D12","-"],
        68:["T20","D4","-"],67:["T17","D8","-"],66:["T14","D12","-"],65:["T19","D4","-"],64:["D16","D16","-"],
        63:["T13","D12","-"],62:["T10","D16","-"],61:["T15","D8","-"],60:["S20","D20","-"],59:["S19","D20","-"],
        58:["S18","D20","-"],57:["S17","D20","-"],56:["S16","D20","-"],55:["S15","D20","-"],54:["S14","D20","-"],
        53:["S13","D20","-"],52:["T12","D8","-"],51:["S19","D16","-"],50:["BULL","-","-"],49:["S17","D16","-"],
        48:["S16","D16","-"],47:["S15","D16","-"],46:["S14","D16","-"],45:["S13","D16","-"],44:["S12","D16","-"],
        43:["S11","D16","-"],42:["S10","D16","-"],41:["S9","D16","-"],40:["D20","-","-"],38:["D19","-","-"],
        36:["D18","-","-"],34:["D17","-","-"],32:["D16","-","-"],30:["D15","-","-"],28:["D14","-","-"],
        26:["D13","-","-"],24:["D12","-","-"],22:["D11","-","-"],20:["D10","-","-"],18:["D9","-","-"],
        16:["D8","-","-"],14:["D7","-","-"],12:["D6","-","-"],10:["D5","-","-"],8:["D4","-","-"],
        6:["D3","-","-"],4:["D2","-","-"],2:["D1","-","-"]
    };

    function getVal(t) {
        if (!t || t === "-") return 0;
        if (t === "BULL" || t === "D25") return 50;
        if (t === "S25") return 25;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        if (t.startsWith("S")) return parseInt(t.substring(1));
        return 0;
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-val').innerText = currentInput || "---";
        
        // Outchart logic
        let path = masterOutchart[score] || (score > 170 ? ["T20","T20","T20"] : ["T20","S20","D"+Math.floor((score-80)/2)]);
        if (score <= 1) path = ["-","-","-"];

        document.getElementById('d1-t').innerText = path[0];
        let r1 = score - getVal(path[0]);
        document.getElementById('d1-r').innerText = r1 > 0 ? r1 : (r1 === 0 ? "OUT" : "");

        document.getElementById('d2-t').innerText = path[1];
        let r2 = r1 - getVal(path[1]);
        document.getElementById('d2-r').innerText = r1 <= 0 ? "" : (r2 > 0 ? r2 : (r2 === 0 ? "OUT" : ""));

        document.getElementById('d3-t').innerText = path[2];
        let r3 = r2 - getVal(path[2]);
        document.getElementById('d3-r').innerText = r2 <= 0 ? "" : (r3 > 0 ? r3 : (r3 === 0 ? "OUT" : ""));
    }

    function setGame(n) { score = n; currentInput = ""; update(); }
    function press(n) { if(currentInput.length < 3) currentInput += n; update(); }
    function del() { currentInput = ""; update(); }
    function apply() {
        let v = parseInt(currentInput);
        if(!isNaN(v)) {
            if (score - v < 0 || score - v === 1) alert("BUST");
            else score -= v;
        }
        currentInput = ""; update();
    }
    update();
</script>
</body>
</html>
