<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dart Room – Dart Calculator</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background:#000; overflow:hidden; font-family: Arial, Helvetica, sans-serif; }

    /* Stage centers the background image */
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    /* We render the background as an <img> so we can read its true size and compute a perfect math transform */
    #bg {
      position: absolute;
      left: 0;
      top: 0;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      opacity: 0; /* hidden; used only to compute sizing */
      pointer-events: none;
    }

    /* The visible background layer */
    #bg-visible {
      position: absolute;
      left: 0;
      top: 0;
      width: 0px; /* set by JS */
      height: 0px; /* set by JS */
      background-image: url("OUTCHARTAPP.jpeg");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Overlay is in BASE coordinate space (430x932), then we apply a single transform (scale + translate) */
    #overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 430px;
      height: 932px;
      transform-origin: top left;
    }

    /* Text styles */
    .neon {
      background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      text-align: center;
      filter: drop-shadow(0 0 10px rgba(0,210,255,0.55));
    }

    #score {
      position: absolute;
      top: 205px;
      left: 0;
      width: 430px;
      font-size: 92px;
      line-height: 1;
      pointer-events: none;
    }

    #brand {
      position: absolute;
      top: 176px; /* moved down slightly per header spacing */
      left: 0;
      width: 430px;
      text-align: center;
      font-size: 10px; /* resized to fit between gold borders */
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.80);
      text-shadow: 0 0 8px rgba(255,255,255,0.15);
      font-weight: 700;
      pointer-events: none;
    }

    .dart-label {
      position: absolute;
      width: 105px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.75);
      font-weight: 800;
      text-shadow: 0 0 8px rgba(255,255,255,0.12);
      z-index: 6;
      pointer-events: none;
    }

    .dart-val {
      position: absolute;
      width: 105px;
      text-align: center;
      font-size: 25px;
      line-height: 1;
      z-index: 6;
      pointer-events: none;
    }

    /* Dart labels ABOVE values, per your request */
    #dl1 { top: 372px; left: 40px; }
    #dl2 { top: 372px; left: 164px; }
    #dl3 { top: 372px; left: 288px; }

    #d1  { top: 388px; left: 40px; }
    #d2  { top: 388px; left: 164px; }
    #d3  { top: 388px; left: 288px; }
/* Invisible hit zones (buttons) */
    .hit {
      position: absolute;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    
      z-index: 10;
    
      pointer-events: auto;
      touch-action: manipulation;
    }

    /* Mode buttons - aligned to your original coords */
    .mode { top: 375px; width: 60px; height: 40px; 
      z-index: 20;
    
      z-index: 60;
    }
    #m301 { left: 125px; }
    #m501 { left: 185px; }
    #m701 { left: 245px; }

    /* Keypad grid area (3 columns). We map each cell precisely. */
    #pad {
    position:absolute;
    left:50px;
    top:560px;
    width:330px;
    height:300px;
    display:grid;
    grid-template-columns:110px 110px 110px;
    grid-template-rows:75px 75px 75px 75px;
    gap: 0px;
    z-index: 50;           /* always above overlays */
    pointer-events: auto;
}
    #pad .hit{
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      z-index: 51;
      pointer-events: auto;
      touch-action: manipulation;
    }

#footer {

/**
 * MATH-LOCKED LAYOUT (NO GUESSING):
 * - Background image provides the coordinate system.
 * - Overlay is built in base coordinates (430x932).
 * - We compute ONE transform to fit the background into the viewport.
 * - All hitboxes/text move together, so nothing “floats”.
 */
(function fitToBackground(){
  const bg = document.getElementById('bg');
  const bgVisible = document.getElementById('bg-visible');
  const overlay = document.getElementById('overlay');
  const stage = document.getElementById('stage');

  function applyFit() {
    const Wb = bg.naturalWidth || 430;
    const Hb = bg.naturalHeight || 932;

    const Wv = stage.clientWidth;
    const Hv = stage.clientHeight;

    // Fit entire image into viewport (contain), but reserve a small safe-bottom
    // so the APPLY TURN button is never cut off by browser UI.
    const SAFE_BOTTOM = 10; // px in viewport space
    const scale = Math.min(Wv / Wb, (Hv - SAFE_BOTTOM) / Hb);

    const drawW = Math.round(Wb * scale);
    const drawH = Math.round(Hb * scale);

    const offsetX = Math.round((Wv - drawW) / 2);
    const offsetY = Math.round(((Hv - SAFE_BOTTOM) - drawH) / 2);

    // Visible background sized/positioned
    bgVisible.style.left = offsetX + 'px';
    bgVisible.style.top = offsetY + 'px';
    bgVisible.style.width = drawW + 'px';
    bgVisible.style.height = drawH + 'px';

    // If the jpeg name is wrong, fall back to outs.jpg automatically
    // (GitHub is case-sensitive.)
    bgVisible.style.backgroundImage = "url('OUTCHARTAPP.jpeg'), url('outs.jpg')";

    // Overlay transform: translate to offset, scale to match drawn bg,
    // and also correct from base (430x932) to actual bg pixels (Wb,Hb)
    // by scaling base-to-bg first, then viewport scale.
    const baseW = 430, baseH = 932;
    const sx = (Wb / baseW) * scale;
    const sy = (Hb / baseH) * scale;

    overlay.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${sx}, ${sy})`;
  }

  function onReady(){
    applyFit();
    window.addEventListener('resize', applyFit, { passive:true });
  }

  bg.addEventListener('load', onReady);

  // If OUTCHARTAPP.jpeg fails to load, fall back to outs.jpg
  bg.addEventListener('error', () => {
    bg.src = 'outs.jpg';
  });

  // In some caches, load may have already fired
  if (bg.complete) {
    if (bg.naturalWidth) onReady();
    else bg.src = 'outs.jpg';
  }
})();

function fmtShot(s){
  if (!s) return "-";
  s = String(s).trim().toUpperCase();
  // Your preferred labels:
  if (s === "SB") return "B";     // single bull (25)
  if (s === "DB") return "DB";    // double bull (50)
  return s;
}

/* APP LOGIC (CHART-DRIVEN OUTS) */
const APP = {
  s: 501,
  i: "",

  draw(){
    document.getElementById('score').innerText = this.s;
    document.getElementById('input').innerText = this.i || "---";
  },

  set(n){
    this.s = n;
    this.i = "";
    this.draw();
    this.updateOut();
  },

  key(n){
    if (this.i.length < 3) {
      this.i += String(n);
      this.draw();
    }
  },

  clr(){
    this.i = "";
    this.draw();
  },

  updateOut(){
    // Fill DART 1/2/3 using your chart chain: score -> (shot, remainder) -> ...
    let cur = this.s;
    const darts = ["-","-","-"];

    for (let k=0; k<3; k++) {
      if (!cur || cur < 2 || cur > 501) break;

      const shot = OUT_SHOT[cur];
      const rem  = OUT_REM[cur];

      if (!shot || rem === null || rem === undefined) break;

      darts[k] = fmtShot(shot);

      // next remaining score
      cur = rem;
      if (cur === 0) break;
    }

    document.getElementById('d1').innerText = darts[0];
    document.getElementById('d2').innerText = darts[1];
    document.getElementById('d3').innerText = darts[2];
  },

  apply(){
    const v = parseInt(this.i, 10);
    if (!isNaN(v)) {
      const next = this.s - v;

      // bust rules: cannot go below 0 or to 1
      if (next < 0 || next === 1) {
        this.i = "";
        this.draw();
        return;
      }

      this.s = next;
      this.i = "";
      this.draw();
      this.updateOut();
      return;
    }

    this.i = "";
    this.draw();
  },

  donate(){

  }
};
