<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Calculator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;font-family:Arial,Helvetica,sans-serif}

#app{
width:430px;
height:932px;
margin:0 auto;
position:relative;
background:url('oats.jpeg') no-repeat center;
background-size:100% 100%;
}

/* VERSION (top right) */
#version{
position:absolute;
top:10px;
right:14px;
font-size:11px;
color:rgba(255,255,255,.4);
}

/* CREDIT (between yellow lines) */
#credit{
position:absolute;
top:130px;
width:100%;
text-align:center;
font-size:11px;
letter-spacing:1px;
color:rgba(255,255,255,.6);
text-transform:uppercase;
}

/* SCORE REMAINING */
#scoreRemaining{
position:absolute;
top:170px;
width:100%;
text-align:center;
font-weight:900;
font-size:14px;
letter-spacing:2px;
color:#e6c16d;
}

/* MAIN SCORE */
#score{
position:absolute;
top:195px;
width:100%;
text-align:center;
font-size:92px;
font-weight:900;
background:linear-gradient(to bottom,#8be3ff 0%,#46cfff 40%,#ff4fa1 80%,#ff296d 100%);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 30px rgba(0,210,255,.3);
}

/* MODE BUTTONS */
#modes{
position:absolute;
top:275px;
width:100%;
display:flex;
justify-content:center;
gap:16px;
}

.modeBtn{
padding:10px 22px;
border-radius:12px;
border:2px solid transparent;
font-weight:900;
font-size:18px;
cursor:pointer;
background:linear-gradient(to right,#7dd8ff,#f0d07a,#7dd8ff);
-webkit-background-clip:text;
color:transparent;
position:relative;
}

.modeBtn::before{
content:'';
position:absolute;
inset:0;
border-radius:12px;
padding:2px;
background:linear-gradient(to right,#7dd8ff,#f0d07a,#7dd8ff);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

.modeBtn.active::before{
box-shadow:0 0 14px rgba(0,210,255,.4);
}

/* DART BOXES */
.dartBox{
position:absolute;
top:335px;
width:120px;
text-align:center;
}

#box1{left:25px}
#box2{left:155px}
#box3{left:285px}

.dartLabel{
font-size:11px;
font-weight:900;
letter-spacing:.7px;
text-transform:uppercase;
margin-bottom:6px;
color:rgba(255,255,255,.6);
}

.dartValue{
font-size:26px;
font-weight:900;
background:linear-gradient(to bottom,#8be3ff 0%,#ff296d 100%);
-webkit-background-clip:text;
color:transparent;
}

/* INPUT */
#input{
position:absolute;
top:470px;
width:100%;
text-align:center;
font-size:50px;
font-weight:900;
background:linear-gradient(to bottom,#8be3ff,#ff296d);
-webkit-background-clip:text;
color:transparent;
}

/* DONATE BUTTON */
#donate{
position:absolute;
bottom:115px;
right:55px;
width:110px;
height:60px;
border-radius:14px;
cursor:pointer;
background:transparent;
}

#donate::before{
content:'';
position:absolute;
inset:0;
border-radius:14px;
border:3px solid rgba(255,0,120,.6);
box-shadow:0 0 18px rgba(255,0,120,.25);
}

#donate span{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:900;
color:#ff3a8b;
text-transform:uppercase;
}

/* FOOTER PATCH */
#footerPatch{
position:absolute;
bottom:0;
width:100%;
height:55px;
background:#000;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:11px;
color:rgba(255,255,255,.6);
padding:6px 20px;
}

</style>
</head>

<body>
<div id="app">

<div id="version">v1.0.0</div>

<div id="credit">Designed by Steve’s Graphic Designs</div>

<div id="scoreRemaining">SCORE REMAINING</div>
<div id="score">501</div>

<div id="modes">
<button class="modeBtn active">501</button>
<button class="modeBtn">301</button>
<button class="modeBtn">701</button>
</div>

<div class="dartBox" id="box1">
<div class="dartLabel">Dart 1</div>
<div class="dartValue">-</div>
</div>

<div class="dartBox" id="box2">
<div class="dartLabel">Dart 2</div>
<div class="dartValue">-</div>
</div>

<div class="dartBox" id="box3">
<div class="dartLabel">Dart 3</div>
<div class="dartValue">-</div>
</div>

<div id="input">---</div>

<div id="donate">
<span>Donations<br>Welcome</span>
</div>

<div id="footerPatch">
Dart Calculator is owned by The Dart Room. © The Dart Room. All Rights Reserved.
</div>

</div>
</body>
</html>
