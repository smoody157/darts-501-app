<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR - CLOUD MASTER</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --border: rgba(255, 255, 255, 0.2);
        }

        body { 
            /* REPLACED LOCAL PATH WITH FULL CLOUD URL STRUCTURE */
            background: url('https://raw.githubusercontent.com/steve/dart-app/main/background.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #05070a; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            display: flex; 
            flex-direction: column;
            /* NEW ALIGNMENT LOGIC FOR PERFECT SPACING */
            justify-content: space-around; 
            align-items: center;
            overflow: hidden;
        }

        /* LOGO - DART CALCULATOR ONLY */
        .logo-container { 
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .logo-main { 
            font-size: 44px; 
            font-weight: 900; 
            background: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 0.8;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.3));
        }
        .logo-sub { 
            color: #ffae00; 
            font-size: 13px; 
            font-weight: 800; 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }

        /* THE DECK - GLASS MORPHISM */
        .deck {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 25px;
            width: 88%; 
            max-width: 410px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            margin-bottom: 20px;
        }

        .score-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 25px; 
            padding: 15px; 
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .main-score {
            font-size: 95px; 
            font-weight: 900; 
            line-height: 1;
            margin: 10px 0; 
            color: #fff;
            text-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        .mode-buttons { display: flex; justify-content: center; gap: 12px; }
        .mode-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #666; 
            color: #fff;
            padding: 10px 20px; 
            border-radius: 12px;
            font-size: 15px; 
            font-weight: 900; 
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active { 
            border-color: var(--neon-blue); 
            background: rgba(0, 210, 255, 0.25); 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .dart-grid { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .orb {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px; 
            padding: 15px 5px; 
            width: 31%;
        }
        .label-blue { color: var(--neon-blue); font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .target { font-size: 26px; font-weight: 900; color: #fff; display: block; margin-top: 5px; }
        .remain { font-size: 19px; color: var(--neon-pink); font-weight: 900; }

        .input-box {
            background: #000; 
            border: 2px solid var(--neon-blue);
            border-radius: 15px; 
            padding: 15px; 
            font-size: 36px;
            color: var(--neon-blue); 
            margin-bottom: 15px; 
            font-weight: 900;
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn {
            background: rgba(255,255,255,0.07); 
            border: 1px solid var(--border);
            color: #fff; 
            padding: 20px; 
            font-size: 24px; 
            border-radius: 15px; 
            font-weight: bold;
        }

        .apply {
            grid-column: span 3;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: #000; 
            font-weight: 900; 
            border: none; 
            padding: 22px;
            border-radius: 15px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-size: 18px;
        }

        .footer { font-size: 10px; letter-spacing: 2px; opacity: 0.6; padding-bottom: 15px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-main">DART<br>CALCULATOR</div>
        <div class="logo-sub">LIMITED EDITION</div>
    </div>

    <div class="deck">
        <div class="score-panel">
            <div class="label-blue">SCORE REMAINING</div>
            <div id="main-score" class="main-score">701</div>
            <div class="mode-buttons">
                <button class="mode-btn" id="btn301" onclick="setGame(301)">301</button>
                <button class="mode-btn" id="btn501" onclick="setGame(501)">501</button>
                <button class="mode-btn active" id="btn701" onclick="setGame(701)">701</button>
            </div>
        </div>

        <div class="dart-grid">
            <div class="orb">
                <div class="label-blue">DART 1</div>
                <span class="target" id="d1-t">T20</span>
                <span class="remain" id="d1-r">641</span>
            </div>
            <div class="orb">
                <div class="label-blue">DART 2</div>
                <span class="target" id="d2-t">T20</span>
                <span class="remain" id="d2-r">581</span>
            </div>
            <div class="orb">
                <div class="label-blue">DART 3</div>
                <span class="target" id="d3-t">T20</span>
                <span class="remain" id="d3-r">521</span>
            </div>
        </div>

        <div id="input-display" class="input-box">---</div>

        <div class="numpad">
            <button class="num-btn" onclick="press(7)">7</button>
            <button class="num-btn" onclick="press(8)">8</button>
            <button class="num-btn" onclick="press(9)">9</button>
            <button class="num-btn" onclick="press(4)">4</button>
            <button class="num-btn" onclick="press(5)">5</button>
            <button class="num-btn" onclick="press(6)">6</button>
            <button class="num-btn" onclick="press(1)">1</button>
            <button class="num-btn" onclick="press(2)">2</button>
            <button class="num-btn" onclick="press(3)">3</button>
            <button class="num-btn" onclick="del()" style="color: var(--neon-pink)">DEL</button>
            <button class="num-btn" onclick="press(0)">0</button>
            <button onclick="apply()" class="apply">APPLY TURN</button>
        </div>
    </div>

    <div class="footer">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>

<script>
    let score = 701;
    let input = "";

    const checkouts = { 
        "131": ["T20", "T13", "D16"], 
        "170": ["T20", "T20", "BULL"], 
        "2": ["D1", "nah", "nah"] 
    };

    function getPoints(t) {
        if (t === "nah") return 0;
        if (t === "BULL") return 50;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        return parseInt(t) || 0;
    }

    function calculateOut(s) {
        if (s <= 40 && s % 2 === 0) return ["D" + (s / 2), "nah", "nah"];
        if (s <= 60) return [(s - 32), "D16", "nah"];
        return ["T20", "T20", "T20"];
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-display').innerText = input || "---";
        let plan = score > 170 ? ["T20", "T20", "T20"] : (checkouts[score] || calculateOut(score));
        let d1t = plan[0], d1r = Math.max(0, score - getPoints(d1t));
        document.getElementById('d1-t').innerText = d1t;
        document.getElementById('d1-r').innerText = d1r;
        let d2t = (d1r <= 0) ? "nah" : plan[1], d2r = Math.max(0, d1r - getPoints(d2t));
        document.getElementById('d2-t').innerText = d2t;
        document.getElementById('d2-r').innerText = (d1r <= 0) ? "" : d2r;
        let d3t = (d2r <= 0) ? "nah" : plan[2], d3r = Math.max(0, d2r - getPoints(d3t));
        document.getElementById('d3-t').innerText = d3t;
        document.getElementById('d3-r').innerText = (d2r <= 0) ? "" : d3r;
    }

    function setGame(n) {
        score = n; input = "";
        document.getElementById('btn301').classList.toggle('active', n === 301);
        document.getElementById('btn501').classList.toggle('active', n === 501);
        document.getElementById('btn701').classList.toggle('active', n === 701);
        update();
    }

    function press(n) { if(input.length < 3) input += n; update(); }
    function del() { input = ""; update(); }
    function apply() {
        let val = parseInt(input);
        if (!isNaN(val)) {
            let next = score - val;
            if (next < 0 || next === 1) alert("BUST");
            else score = next;
        }
        input = ""; update();
    }
    update();
</script>
</body>
</html>
