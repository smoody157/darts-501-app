<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, height=932, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* SECTION 1: THE SKIN */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 430px; height: 932px; background: #000; overflow: hidden; display: flex; justify-content: center; }
        
        #app-shell {
            width: 430px; height: 932px;
            background-image: url('IMG_7543.png');
            background-size: 100% 100%;
            position: relative;
        }

        /* BLACKOUT MASKS: Covering stationary numbers in your background image */
        .mask { position: absolute; background: #0b0b1a; z-index: 1; }
        #mask-main { top: 220px; left: 100px; width: 230px; height: 110px; } /* Blocks "501" */
        #mask-o1 { top: 462px; left: 62px; width: 65px; height: 35px; }   /* Blocks "78" */
        #mask-o2 { top: 462px; left: 187px; width: 65px; height: 35px; }  /* Blocks "18" */
        #mask-o3 { top: 462px; left: 312px; width: 65px; height: 35px; }  /* Blocks "50" */

        /* ACTIVE NUMBERS: Styled to match the neon graphic */
        .neon-gradient {
            background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            z-index: 2;
        }

        #score-display {
            position: absolute; top: 200px; width: 430px;
            text-align: center; font-size: 115px;
            filter: drop-shadow(0 0 15px rgba(0,210,255,0.8));
        }

        .orb-label { position: absolute; width: 105px; text-align: center; top: 412px; z-index: 2; }
        #orb-1 { left: 40px; } #orb-2 { left: 164px; } #orb-3 { left: 288px; }
        .target-val { font-size: 32px; display: block; }
        .rem-val { position: absolute; top: 58px; width: 105px; left: 0; font-size: 18px; color: #ff007f; font-weight: 900; }

        #input-readout {
            position: absolute; top: 512px; width: 430px;
            text-align: center; font-size: 58px; color: #72d6ff;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 20px #00d2ff;
            z-index: 2;
        }

        /* BUTTON ACTIVATION: Invisible hit-boxes over background buttons */
        .hit { position: absolute; cursor: pointer; background: transparent; border: none; z-index: 10; }
        .mode-hit { top: 310px; width: 85px; height: 50px; }
        .grid { position: absolute; top: 575px; left: 45px; width: 340px; height: 260px; display: grid; grid-template-columns: repeat(3, 1fr); }
        .apply-bar { bottom: 45px; left: 45px; width: 340px; height: 85px; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="mask" id="mask-main"></div>
    <div class="mask" id="mask-o1"></div><div class="mask" id="mask-o2"></div><div class="mask" id="mask-o3"></div>

    <div id="score-display" class="neon-gradient">501</div>
    
    <div class="orb-label" id="orb-1"><span id="v1" class="neon-gradient">-</span><span id="r1" class="rem-val"></span></div>
    <div class="orb-label" id="orb-2"><span id="v2" class="neon-gradient">-</span><span id="r2" class="rem-val"></span></div>
    <div class="orb-label" id="orb-3"><span id="v3" class="neon-gradient">-</span><span id="r3" class="rem-val"></span></div>

    <div id="input-readout">---</div>

    <button class="hit mode-hit" style="left:82px" onclick="APP.reset(301)"></button>
    <button class="hit mode-hit" style="left:174px" onclick="APP.reset(501)"></button>
    <button class="hit mode-hit" style="left:266px" onclick="APP.reset(701)"></button>

    <div class="grid">
        <button class="hit" onclick="APP.tap(7)"></button><button class="hit" onclick="APP.tap(8)"></button><button class="hit" onclick="APP.tap(9)"></button>
        <button class="hit" onclick="APP.tap(4)"></button><button class="hit" onclick="APP.tap(5)"></button><button class="hit" onclick="APP.tap(6)"></button>
        <button class="hit" onclick="APP.tap(1)"></button><button class="hit" onclick="APP.tap(2)"></button><button class="hit" onclick="APP.tap(3)"></button>
        <button class="hit" onclick="APP.del()"></button><button class="hit" onclick="APP.tap(0)"></button>
    </div>

    <button class="hit apply-bar" onclick="APP.go()"></button>
</div>

<script>
/* SECTION 3: THE BRAIN */
const OATS = {
    170:["T20","T20","DB"], 167:["T20","T19","DB"], 164:["T20","T18","DB"], 160:["T20","T20","D20"],
    121:["T20","T11","D14"], 100:["T20","D20","-"], 50:["DB","-","-"], 40:["D20","-","-"], 2:["D1","-","-"]
};

const APP = {
    score: 501, input: "", last: null,
    voice: function(path) {
        if (!path || path[0] === "-") return;
        let msg = path.filter(x => x !== "-").join(", ").replace(/T/g, "Triple ").replace(/D(\d+)/g, "Double $1").replace(/DB/g, "Double Bull");
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
    },
    getVal: function(s) {
        if (!s || s === "-") return 0; if (s === "DB") return 50;
        let n = parseInt(s.substring(1)); return s[0] === "T" ? n * 3 : (s[0] === "D" ? n * 2 : n);
    },
    draw: function() {
        document.getElementById('score-display').innerText = this.score;
        document.getElementById('input-readout').innerText = this.input || "---";
        let path = OATS[this.score] || (this.score > 170 ? ["-","-","-"] : ["T20", "S20", "D"+Math.floor((this.score-80)/2)]);
        if (this.score <= 1) path = ["-","-","-"];
        document.getElementById('v1').innerText = path[0];
        let r1 = this.score - this.getVal(path[0]); document.getElementById('r1').innerText = r1 > 0 ? r1 : "";
        document.getElementById('v2').innerText = path[1];
        let r2 = r1 - this.getVal(path[1]); document.getElementById('r2').innerText = r2 > 0 ? r2 : "";
        document.getElementById('v3').innerText = path[2];
        if (this.score <= 170 && this.score > 1 && this.score !== this.last) { this.voice(path); this.last = this.score; }
    },
    reset: function(n) { this.score = n; this.input = ""; this.last = null; this.draw(); },
    tap: function(n) { if (this.input.length < 3) this.input += n; this.draw(); },
    del: function() { this.input = ""; this.draw(); },
    go: function() {
        let v = parseInt(this.input);
        if (!isNaN(v)) { if (this.score - v < 0 || this.score - v === 1) window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bust")); else this.score -= v; }
        this.input = ""; this.draw();
    }
};
APP.draw();
</script>
</body>
</html>
