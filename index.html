    /* Granular neon fade (blue->pink) */
    .neon {
      position: absolute;
      width: 430px;
      text-align: center;
      font-weight: 900;
      letter-spacing: 1px;

      background: linear-gradient(180deg, #8fe8ff 0%, #45caff 42%, #ff4fa1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;

      text-shadow:
        0 0 1px rgba(255,255,255,0.35),
        0 0 4px rgba(0,210,255,0.55),
        0 0 10px rgba(0,210,255,0.45),
        0 0 18px rgba(255,79,161,0.22),
        0 0 28px rgba(255,79,161,0.14);

      pointer-events: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #score {
      top: 262px;
      font-size: 94px;
    }

    #input {
      top: 540px;
      font-size: 50px;
      letter-spacing: 2px;
    }

    .dart-box {
      position: absolute;
      top: 404px;
      width: 118px;
      height: 104px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #box1 { left: 28px; }
    #box2 { left: 156px; }
    #box3 { left: 284px; }

    .dart-val {
      font-size: 26px;
      line-height: 1.0;
      margin-top: 6px;
    }

    .dart-label {
      position: absolute;
      bottom: 12px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 0 8px rgba(0,0,0,0.7);
    }

    .hit {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
    }
    .hit:active { background: rgba(255,255,255,0.05); border-radius: 18px; }

    #pad {
      position: absolute;
      left: 50px;
      top: 598px;
      width: 330px;
      height: 252px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 0;
      z-index: 12;
    }
    #pad .hit {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 18px;
    }

    #apply {
      left: 50px;
      bottom: 34px;
      width: 330px;
      height: 72px;
      border-radius: 18px;
      z-index: 12;
    }

    .donate-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #ff3a8b;
      text-shadow:
        0 0 6px rgba(255,0,127,0.45),
        0 0 14px rgba(255,0,127,0.25);
      pointer-events: none;
      text-transform: uppercase;
      text-align: center;
      padding: 0 8px;
      line-height: 1.05;
    }

    #tag {
      position: absolute;
      bottom: 8px;
      right: 14px;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="app" aria-label="Dart Calculator">
      <div id="score" class="neon">501</div>

      <div class="dart-box" id="box1">
        <div id="d1" class="neon dart-val">-</div>
        <div class="dart-label">DART 1</div>
      </div>
      <div class="dart-box" id="box2">
        <div id="d2" class="neon dart-val">-</div>
        <div class="dart-label">DART 2</div>
      </div>
      <div class="dart-box" id="box3">
        <div id="d3" class="neon dart-val">-</div>
        <div class="dart-label">DART 3</div>
      </div>

      <div id="input" class="neon">---</div>

      <div id="pad" aria-label="Keypad">
        <button class="hit" onclick="APP.key(7)" aria-label="7"></button>
        <button class="hit" onclick="APP.key(8)" aria-label="8"></button>
        <button class="hit" onclick="APP.key(9)" aria-label="9"></button>

        <button class="hit" onclick="APP.key(4)" aria-label="4"></button>
        <button class="hit" onclick="APP.key(5)" aria-label="5"></button>
        <button class="hit" onclick="APP.key(6)" aria-label="6"></button>

        <button class="hit" onclick="APP.key(1)" aria-label="1"></button>
        <button class="hit" onclick="APP.key(2)" aria-label="2"></button>
        <button class="hit" onclick="APP.key(3)" aria-label="3"></button>

        <button class="hit" onclick="APP.clr()" aria-label="Delete"></button>
        <button class="hit" onclick="APP.key(0)" aria-label="0"></button>

        <button class="hit" onclick="APP.donate()" aria-label="Donations Welcome">
          <span class="donate-label">DONATIONS<br>WELCOME</span>
        </button>
      </div>

      <button id="apply" class="hit" onclick="APP.apply()" aria-label="Apply Turn"></button>

      <div id="tag">REV: aligned + granular + donate</div>
    </div>
  </div>

<script>
function buildDarts() {
  const darts = [];
  for (let n = 1; n <= 20; n++) darts.push({ lab: "S"+n, val: n });
  darts.push({ lab: "SB", val: 25 });
  for (let n = 1; n <= 20; n++) darts.push({ lab: "D"+n, val: n*2, fin: true });
  darts.push({ lab: "DB", val: 50, fin: true });
  for (let n = 1; n <= 20; n++) darts.push({ lab: "T"+n, val: n*3 });
  return darts;
}
const DARTS = buildDarts();
const FINISHERS = DARTS.filter(d => d.fin);

function isBull(lab) { return lab === "SB" || lab === "DB"; }
function finPref(lab) {
  const order = ["D20","D16","D18","D10","D12","D8","DB"];
  const i = order.indexOf(lab);
  return i === -1 ? 99 : i;
}
function rankPath(path) {
  const dartsUsed = path.length;
  const v1 = (path[0] ? path[0].val : 0);
  const v2 = (path[1] ? path[1].val : 0);
  const v3 = (path[2] ? path[2].val : 0);
  const bulls = path.reduce((a,d)=>a+(isBull(d.lab)?1:0),0);
  return [dartsUsed, bulls, finPref(path[path.length-1].lab), -v1, -v2, -v3];
}
function better(a, b) {
  for (let i=0;i<a.length;i++){ if (a[i] < b[i]) return true; if (a[i] > b[i]) return false; }
  return false;
}

function computeOuts() {
  const outs = {};
  for (let target=2; target<=170; target++){
    let best=null, bestRank=null;

    for (const f of FINISHERS){
      if (f.val===target){
        const r=rankPath([f]);
        if (!best || better(r,bestRank)){ best=[f]; bestRank=r; }
      }
    }
    for (const a of DARTS){
      for (const f of FINISHERS){
        if (a.val+f.val===target){
          const r=rankPath([a,f]);
          if (!best || better(r,bestRank)){ best=[a,f]; bestRank=r; }
        }
      }
    }
    for (const a of DARTS){
      for (const b of DARTS){
        const partial=a.val+b.val;
        if (partial>=target) continue;
        for (const f of FINISHERS){
          if (partial+f.val===target){
            const r=rankPath([a,b,f]);
            if (!best || better(r,bestRank)){ best=[a,b,f]; bestRank=r; }
          }
        }
      }
    }
    if (best){
      const labs=best.map(d=>d.lab);
      while (labs.length<3) labs.push("-");
      outs[target]=labs;
    }
  }
  return outs;
}
const OUTS = computeOuts();

const APP = {
  score: 501,
  input: "",
  venmoUrl: "https://venmo.com/YOUR_VENMO_HERE",

  draw() {
    document.getElementById("score").textContent = String(this.score);
    document.getElementById("input").textContent = this.input.length ? this.input : "---";

    const p = OUTS[this.score] || ["-","-","-"];
    document.getElementById("d1").textContent = p[0] || "-";
    document.getElementById("d2").textContent = p[1] || "-";
    document.getElementById("d3").textContent = p[2] || "-";
  },

  key(n) {
    if (this.input.length >= 3) return;
    if (this.input.length === 0 && n === 0) return;
    this.input += String(n);
    this.draw();
  },

  clr() {
    this.input = "";
    this.draw();
  },

  apply() {
    const v = parseInt(this.input, 10);
    if (!Number.isNaN(v)) {
      const next = this.score - v;
      if (next >= 0 && next !== 1) this.score = next;
    }
    this.input = "";
    this.draw();
  },

  donate() {
    try { window.open(this.venmoUrl, "_blank", "noopener"); } catch (e) {}
  }
};

function fit() {
  const app = document.getElementById("app");
  const scale = Math.min(window.innerWidth / 430, window.innerHeight / 932);
  const supportsZoom = (window.CSS && CSS.supports && CSS.supports("zoom","1"));
  if (supportsZoom) {
    app.style.zoom = String(scale);
    app.style.transform = "";
  } else {
    app.style.zoom = "";
    app.style.transformOrigin = "top left";
    app.style.transform = "scale(" + scale + ")";
  }
}
window.addEventListener("resize", fit, { passive:true });
fit();
APP.draw();
</script>
</body>
</html>
