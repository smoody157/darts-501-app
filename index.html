<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Dart Calculator</title>
<style>
  :root {
    --appW: 430;
    --appH: 932;
    --xShift: 0px;
    --yShift: 0px;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:#000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  #wrap {
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 12px 0;
  }
  #app {
    position:relative;
    width: calc(var(--appW) * 1px);
    height: calc(var(--appH) * 1px);
    transform: translate(var(--xShift), var(--yShift));
    overflow:hidden;
  }
  /* scale to fit small screens */
  @media (max-width: 460px) {
    #app {
      width: 100vw;
      height: calc(100vw * (var(--appH) / var(--appW)));
      max-height: 100vh;
    }
  }
  #bg {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
    user-select:none;
    -webkit-user-drag:none;
  }
  #overlay {
    position:absolute; inset:0;
    z-index:5;
  }
  /* helper: absolute positioned item with translate scaling from design coords */
  .abs {
    position:absolute;
    transform: translate(-50%, -50%);
    text-align:center;
  }

  /* text styles */
  .smallcaps {
    letter-spacing: 3px;
    font-weight: 700;
    opacity: 0.9;
  }

  /* gradient text */
  .gradPink {
    background: linear-gradient(#7fe6ff, #ff5ac8);
    -webkit-background-clip:text;
    background-clip:text;
    color: transparent;
    text-shadow: 0 0 12px rgba(127,230,255,.20);
  }
  .gradCyan {
    background: linear-gradient(#b7fbff, #4ad9ff);
    -webkit-background-clip:text;
    background-clip:text;
    color: transparent;
    text-shadow: 0 0 12px rgba(127,230,255,.25);
  }
  .gold {
    color:#d8b35a;
    text-shadow: 0 0 10px rgba(216,179,90,.18);
  }

  /* top texts */
  #version {
    position:absolute;
    right: 14px;
    top: 18px;
    font-size: 14px;
    color: rgba(255,255,255,.55);
    z-index:10;
  }
  #brand {
    left: 215px; top: 205px;
    width: 390px;
    font-size: 16px;
    color: rgba(255,255,255,.65);
  }
  #scoreLabel {
    left: 215px; top: 236px;
    width: 360px;
    font-size: 16px;
  }
  #score {
    left: 215px; top: 310px;
    width: 380px;
    font-size: 92px;
    font-weight: 900;
    line-height: 1;
  }

  /* mode buttons (301/501/701) */
  #modes {
    position:absolute;
    left: 215px;
    top: 390px;
    width: 360px;
    height: 56px;
    transform: translate(-50%, -50%);
    display:flex;
    gap: 18px;
    justify-content:center;
    align-items:center;
  }
  .modeBtn {
    width: 104px;
    height: 44px;
    border-radius: 14px;
    border: 2px solid rgba(127,230,255,.75);
    background: rgba(0,0,0,.45);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #d8b35a;
    box-shadow: 0 0 18px rgba(127,230,255,.12);
  }
  .modeBtn.active {
    border-color: rgba(216,179,90,.9);
    box-shadow: 0 0 20px rgba(216,179,90,.22), 0 0 16px rgba(127,230,255,.10) inset;
  }

  /* dart out boxes */
  .dartLabel {
    position:absolute;
    width: 110px;
    font-size: 14px;
    color: rgba(255,255,255,.60);
    letter-spacing: 2px;
    font-weight: 800;
    text-transform: uppercase;
    text-align:center;
    pointer-events:none;
  }
  .dartVal {
    position:absolute;
    width: 110px;
    height: 40px;
    font-size: 30px;
    font-weight: 1000;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  /* centers inside each small box */
  #dl1 { left: 96px;  top: 458px; }
  #dl2 { left: 215px; top: 458px; }
  #dl3 { left: 334px; top: 458px; }

  #d1 { left: 96px;  top: 505px; }
  #d2 { left: 215px; top: 505px; }
  #d3 { left: 334px; top: 505px; }

  /* turn input (middle long bar) */
  #input {
    left: 215px; top: 610px;
    width: 300px;
    font-size: 72px;
    font-weight: 1000;
    letter-spacing: 2px;
  }

  /* keypad hit areas */
  #keys {
    position:absolute;
    left: 215px;
    top: 758px;
    width: 360px;
    height: 320px;
    transform: translate(-50%, -50%);
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 18px 18px;
  }
  .key {
    border-radius: 18px;
    background: rgba(0,0,0,0.001); /* transparent but clickable */
    border: none;
    padding:0;
    margin:0;
    cursor:pointer;
  }
  /* special buttons live outside grid */
  #del {
    position:absolute;
    left: 92px; top: 790px;
    width: 150px; height: 78px;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.001);
    border:none;
    border-radius: 18px;
    cursor:pointer;
  }
  #zero {
    position:absolute;
    left: 215px; top: 790px;
    width: 150px; height: 78px;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.001);
    border:none;
    border-radius: 18px;
    cursor:pointer;
  }

  /* donate button */
  #donate {
    position:absolute;
    left: 334px; top: 790px;
    width: 150px; height: 78px;
    transform: translate(-50%, -50%);
    border-radius: 18px;
    border:none;
    background: rgba(0,0,0,0.001);
    cursor:pointer;
  }

  /* apply turn */
  #apply {
    position:absolute;
    left: 215px; top: 885px;
    width: 360px; height: 66px;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.001);
    border:none;
    border-radius: 18px;
    cursor:pointer;
  }

  /* footer */
  #footer {
    position:absolute;
    left: 215px; top: 920px;
    width: 410px;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: rgba(255,255,255,.65);
    letter-spacing: 0.5px;
    text-align:center;
    padding: 0 10px;
  }
</style>
</head>

  <div id="wrap">
    <div id="app">
      <img id="bg" alt="background" />
      <div id="version">v1.3.2</div>
      <div id="overlay">
        <div id="brand" class="abs smallcaps">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>
        <div id="scoreLabel" class="abs smallcaps gold">SCORE REMAINING</div>
        <div id="score" class="abs gradPink">501</div>

        <div id="modes" aria-label="Game mode">
          <button id="m301" class="modeBtn" type="button">301</button>
          <button id="m501" class="modeBtn active" type="button">501</button>
          <button id="m701" class="modeBtn" type="button">701</button>
        </div>

        <div id="dl1" class="dartLabel">DART 1</div>
        <div id="dl2" class="dartLabel">DART 2</div>
        <div id="dl3" class="dartLabel">DART 3</div>

        <div id="d1" class="dartVal gradPink"></div>
        <div id="d2" class="dartVal gradPink"></div>
        <div id="d3" class="dartVal gradPink"></div>

        <div id="input" class="abs gradCyan">00</div>

        <!-- keypad -->
        <div id="keys" aria-label="Keypad">
          <button class="key" data-k="7" type="button"></button>
          <button class="key" data-k="8" type="button"></button>
          <button class="key" data-k="9" type="button"></button>
          <button class="key" data-k="4" type="button"></button>
          <button class="key" data-k="5" type="button"></button>
          <button class="key" data-k="6" type="button"></button>
          <button class="key" data-k="1" type="button"></button>
          <button class="key" data-k="2" type="button"></button>
          <button class="key" data-k="3" type="button"></button>
          <div></div><div></div><div></div>
        </div>

        <button id="del" type="button" aria-label="Delete"></button>
        <button id="zero" type="button" aria-label="Zero"></button>

        <button id="donate" type="button" aria-label="Donations Welcome"></button>
        <button id="apply" type="button" aria-label="Apply Turn"></button>

        <div id="footer">Dart Calculator is owned by The Dart Room. © The Dart Room. All Rights Reserved.</div>
      </div>
    </div>
  </div>

  // Background file loader (supports different filename casing in repo)

    const bg = document.getElementById('bg');
    const candidates = [
      './OUTCHARTAPP.jpeg',
      './outchartapp.jpeg',
      './OUTCHARTAPP.jpg',
      './outchartapp.jpg',
      './outs.jpg',
      './outs.jpeg'
    ];
    let i = 0;
    const tryNext = () => {
      if (i >= candidates.length) {
        // fallback: solid black
        bg.style.display = 'none';
        return;
      }
      const src = candidates[i++];
      const img = new Image();
      img.onload = () => { bg.src = src; };
      img.onerror = () => tryNext();
      img.src = src + '?v=' + Date.now();
    };
    tryNext();
  })();

  170: ["T20", "T19", "S13"]
};

  const scoreEl = document.getElementById('score');
  const inputEl = document.getElementById('input');
  const d1El = document.getElementById('d1');
  const d2El = document.getElementById('d2');
  const d3El = document.getElementById('d3');

  const modeBtns = {
    301: document.getElementById('m301'),
    501: document.getElementById('m501'),
    701: document.getElementById('m701'),
  };

  let startScore = 501;
  let remaining = 501;
  let entry = '00';

  function setMode(val) {
    startScore = val;
    remaining = val;
    entry = '00';
    Object.values(modeBtns).forEach(b => b.classList.remove('active'));
    modeBtns[val].classList.add('active');
    render();
  }

  function setEntry(next) {
    // keep 0-180 (typical max), but allow up to 999 for safety
    if (next.length === 0) next = '0';
    if (next.length > 3) next = next.slice(-3);
    // prevent leading zeros like 000
    next = String(parseInt(next, 10));
    if (isNaN(next)) next = '0';
    if (next === '0') entry = '00';
    else entry = next;
    renderInputOnly();
  }

  function renderInputOnly() {
    inputEl.textContent = entry.padStart(2, '0');
  }

  function renderOuts() {
    // show outs only when remaining is in 2..170
    if (remaining >= 2 && remaining <= 170 && OUTS[remaining]) {
      const [a,b,c] = OUTS[remaining];
      d1El.textContent = a || '';
      d2El.textContent = b || '';
      d3El.textContent = c || '';
    } else {
      d1El.textContent = '';
      d2El.textContent = '';
      d3El.textContent = '';
    }
  }

  function render() {
    scoreEl.textContent = String(remaining);
    renderInputOnly();
    renderOuts();
  }

  function applyTurn() {
    const val = parseInt(entry, 10);
    if (!isFinite(val) || val < 0) return;
    // don't allow subtracting below 0
    const next = remaining - val;
    remaining = next < 0 ? remaining : next;
    entry = '00';
    render();
  }

  // keypad
  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.getAttribute('data-k');
      const cur = (entry === '00') ? '' : String(parseInt(entry,10));
      setEntry(cur + k);
    });
  });
  document.getElementById('zero').addEventListener('click', () => {
    const cur = (entry === '00') ? '' : String(parseInt(entry,10));
    setEntry(cur + '0');
  });
  document.getElementById('del').addEventListener('click', () => {
    const cur = (entry === '00') ? '' : String(parseInt(entry,10));
    const next = cur.slice(0, -1);
    setEntry(next);
  });
  document.getElementById('apply').addEventListener('click', applyTurn);

  // modes
  modeBtns[301].addEventListener('click', () => setMode(301));
  modeBtns[501].addEventListener('click', () => setMode(501));
  modeBtns[701].addEventListener('click', () => setMode(701));

  // donate
  document.getElementById('donate').addEventListener('click', () => {
    window.open('https://venmo.com/u/Steve-Moody-8', '_blank', 'noopener,noreferrer');
  });

  // init
  render();
</script>

</html>
