<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dart Calculator</title>
<style>
body{margin:0;background:#000;font-family:Arial,Helvetica,sans-serif;}
#app{width:100vw;height:100vh;background:url('OUTCHARTAPP.jpeg') center/contain no-repeat;position:relative;color:white;}

#brand{
position:absolute;
top:15%;
width:100%;
text-align:center;
font-size:14px;
letter-spacing:2px;
color:#e5e5e5;
}

#score{
position:absolute;
top:22%;
width:100%;
text-align:center;
font-size:82px;
font-weight:900;
background:linear-gradient(#8cecff,#ff4fa1);
-webkit-background-clip:text;
color:transparent;
}

.mode{
position:absolute;
top:36%;
width:100%;
display:flex;
justify-content:center;
gap:24px;
}

.mode button{
padding:10px 22px;
font-weight:bold;
border-radius:14px;
border:2px solid #6ad7ff;
background:rgba(0,0,0,0.6);
color:#ffe28a;
box-shadow:0 0 10px #6ad7ff;
}

#darts{
position:absolute;
top:46%;
width:100%;
display:flex;
justify-content:space-around;
}

.dart{text-align:center;font-weight:bold;}

#input{
position:absolute;
top:58%;
width:100%;
text-align:center;
font-size:40px;
}

#pad{
position:absolute;
top:64%;
width:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:0 40px;
}

#pad button{
padding:20px;
font-size:24px;
border-radius:14px;
border:none;
background:rgba(255,255,255,.1);
color:white;
}

#donate{
border:3px solid #ff3a8b !important;
color:#ff3a8b !important;
font-weight:bold;
}

#apply{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:18px 80px;
border-radius:20px;
border:none;
background:#9ecbff;
color:black;
font-weight:bold;
}

footer{
position:absolute;
bottom:0;
width:100%;
text-align:center;
font-size:12px;
opacity:.85;
}
</style>
</head>

<body>
<div id="app">

<div id="brand">Designed by Steve's Graphic Designs</div>

<div id="score">501</div>

<div class="mode">
<button onclick="setMode(301)">301</button>
<button onclick="setMode(501)">501</button>
<button onclick="setMode(701)">701</button>
</div>

<div id="darts">
<div class="dart">DART 1<br>-</div>
<div class="dart">DART 2<br>-</div>
<div class="dart">DART 3<br>-</div>
</div>

<div id="input">---</div>

<div id="pad">
<button onclick="key(7)">7</button>
<button onclick="key(8)">8</button>
<button onclick="key(9)">9</button>
<button onclick="key(4)">4</button>
<button onclick="key(5)">5</button>
<button onclick="key(6)">6</button>
<button onclick="key(1)">1</button>
<button onclick="key(2)">2</button>
<button onclick="key(3)">3</button>
<button onclick="del()">DEL</button>
<button onclick="key(0)">0</button>
<button id="donate" onclick="donate()">DONATIONS<br>WELCOME</button>
</div>

<button id="apply" onclick="apply()">APPLY TURN</button>

<footer>Dart Calculator is owned by The Dart Room. © The Dart Room. All Rights Reserved.</footer>

</div>

<script>
let score=501;
let input="";

function draw(){
document.getElementById("score").innerText=score;
document.getElementById("input").innerText=input||"---";
}

function setMode(v){
score=v;
input="";
draw();
}

function key(n){
if(input.length<3) input+=n;
draw();
}

function del(){
input="";
draw();
}

function apply(){
let v=parseInt(input||0);
score=Math.max(0,score-v);
input="";
draw();
}

function donate(){
window.open("https://venmo.com/u/Steve-Moody-8","_blank");
}

draw();
</script>

</body>
</html>
