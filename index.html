<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --border: rgba(255, 255, 255, 0.15);
        }

        body { 
            background-color: #05070a; 
            color: #fff; 
            font-family: system-ui, sans-serif;
            text-align: center; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* LOGO CONTAINER WITH CUSTOM OVERLAY */
        .logo-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin-top: 5px;
        }

        .header-logo {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.8;
        }

        .logo-overlay {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .deck {
            background: rgba(20, 20, 25, 0.98);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 8px;
            width: 94%; max-width: 400px;
        }

        .main-score { font-size: 70px; font-weight: 900; margin: -5px 0; color: #fff; line-height: 1; }
        
        .mode-buttons { display: flex; justify-content: center; gap: 6px; margin: 5px 0; }
        .mode-btn {
            background: #1a1a1a; border: 1px solid #333; color: #fff;
            padding: 5px 10px; border-radius: 6px; font-size: 12px;
        }
        .mode-btn.active { border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.2); }

        .dart-grid { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .orb { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 5px 2px; width: 32%; }
        .label-blue { color: var(--neon-blue); font-size: 9px; font-weight: bold; }
        .target { font-size: 20px; font-weight: 900; display: block; }
        .remain { font-size: 14px; color: var(--neon-pink); font-weight: 900; }

        .input-box {
            background: #000; border: 2px solid var(--neon-blue);
            border-radius: 8px; padding: 5px; font-size: 32px;
            color: var(--neon-blue); font-weight: 900; margin-bottom: 8px;
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .num-btn {
            background: #151515; border: 1px solid var(--border);
            color: #fff; padding: 14px 0; font-size: 24px; border-radius: 10px; font-weight: bold;
        }
        .enter-btn { background: var(--neon-green); color: #000; font-size: 18px; font-weight: 900; }
        .del-btn { color: var(--neon-pink); }

        .footer { font-size: 9px; padding: 5px 0; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/smoody157/darts-501-app/main/7F737C26-56A1-497B-A4A2-CCD6141E7B8C.png" alt="Logo" class="header-logo">
        <div class="logo-overlay">DART CALCULATOR</div>
    </div>

    <div class="deck">
        <div class="mode-buttons">
            <button class="mode-btn" id="btn301" onclick="setGame(301)">301</button>
            <button class="mode-btn active" id="btn501" onclick="setGame(501)">501</button>
            <button class="mode-btn" id="btn701" onclick="setGame(701)">701</button>
        </div>

        <div id="main-score" class="main-score">501</div>

        <div class="dart-grid">
            <div class="orb"><div class="label-blue">D1</div><span class="target" id="d1-t">-</span><span class="remain" id="d1-r"></span></div>
            <div class="orb"><div class="label-blue">D2</div><span class="target" id="d2-t">-</span><span class="remain" id="d2-r"></span></div>
            <div class="orb"><div class="label-blue">D3</div><span class="target" id="d3-t">-</span><span class="remain" id="d3-r"></span></div>
        </div>

        <div id="input-display" class="input-box">---</div>

        <div class="numpad">
            <button class="num-btn" onclick="press(7)">7</button><button class="num-btn" onclick="press(8)">8</button><button class="num-btn" onclick="press(9)">9</button>
            <button class="num-btn" onclick="press(4)">4</button><button class="num-btn" onclick="press(5)">5</button><button class="num-btn" onclick="press(6)">6</button>
            <button class="num-btn" onclick="press(1)">1</button><button class="num-btn" onclick="press(2)">2</button><button class="num-btn" onclick="press(3)">3</button>
            <button class="num-btn del-btn" onclick="del()">DEL</button><button class="num-btn" onclick="press(0)">0</button><button class="num-btn enter-btn" onclick="apply()">ENTER</button>
        </div>
    </div>

    <div class="footer">STEVE'S GRAPHIC DESIGNS</div>

<script>
    let score = 501;
    let input = "";

    const checkoutMap = {
        170:["T20","T20","BULL"],167:["T20","T19","BULL"],125:["S25","T20","D20"],121:["T20","T15","D8"],100:["T20","D20","-"],
        80:["T20","D10","-"],40:["D20","-","-"],2:["D1","-","-"]
    };

    function getVal(t) {
        if (!t || t === "-" || t === "None") return 0;
        if (t === "BULL" || t === "D25") return 50;
        if (t === "S25" || t === "25") return 25;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        if (t.startsWith("S")) return parseInt(t.substring(1));
        return parseInt(t) || 0;
    }

    function getFullDataPath(s) {
        if (s > 170) return ["T20", "T20", "T20"];
        return checkoutMap[s] || ["T20", "T20", "T20"];
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-display').innerText = input || "---";
        const path = getFullDataPath(score);
        let r1 = score - getVal(path[0]);
        document.getElementById('d1-t').innerText = path[0];
        document.getElementById('d1-r').innerText = Math.max(0, r1);
        let r2 = (r1 <= 0) ? 0 : r1 - getVal(path[1]);
        document.getElementById('d2-t').innerText = (r1 <= 0) ? "-" : path[1];
        document.getElementById('d2-r').innerText = (r1 <= 0) ? "" : Math.max(0, r2);
        let r3 = (r2 <= 0) ? 0 : r2 - getVal(path[2]);
        document.getElementById('d3-t').innerText = (r2 <= 0) ? "-" : path[2];
        document.getElementById('d3-r').innerText = (r2 <= 0) ? "" : Math.max(0, r3);
    }

    function setGame(n) { score = n; input = ""; update(); }
    function press(n) { if(input.length < 3) input += n; update(); }
    function del() { input = ""; update(); }
    function apply() {
        let v = parseInt(input);
        if (!isNaN(v)) {
            if (score - v < 0 || score - v === 1) alert("BUST");
            else score -= v;
        }
        input = ""; update();
    }
    update();
</script>
</body>
</html>
