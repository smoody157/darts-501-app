<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Calculator</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
position:relative;
}

.logo{
width:100%;
}

.designed{
margin-top:-18px;
font-size:12px;
letter-spacing:2px;
color:#ccc;
}

.scorelabel{
color:#e6c97a;
font-weight:bold;
letter-spacing:2px;
margin-top:10px;
}

.score{
font-size:90px;
font-weight:bold;
background:linear-gradient(#8ee7ff,#ff4fa0);
-webkit-background-clip:text;
color:transparent;
margin-top:5px;
}

.modes{
display:flex;
justify-content:center;
gap:18px;
margin-top:10px;
}

.modebtn{
border:2px solid #6ad7ff;
border-radius:14px;
padding:8px 18px;
color:#ffe28a;
background:rgba(0,0,0,.5);
font-weight:bold;
}

.darts{
display:flex;
justify-content:space-between;
margin-top:18px;
}

.dartbox{
width:30%;
border:2px solid #6ad7ff;
border-radius:14px;
padding:10px;
}

.input{
border:2px solid #e6c97a;
border-radius:16px;
margin:18px 10px;
padding:14px;
font-size:30px;
}

.pad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:0 10px;
}

.pad button{
padding:18px;
font-size:22px;
border-radius:12px;
border:none;
background:#1a1a1a;
color:#fff;
}

.del{
background:#ff2e7a;
}

.donate{
border:3px solid #ff2e7a;
color:#ff2e7a;
background:transparent;
font-weight:bold;
}

.apply{
margin-top:14px;
padding:18px;
border-radius:18px;
border:none;
background:#9dc6ff;
color:#000;
font-weight:bold;
width:90%;
}

footer{
font-size:12px;
margin-top:12px;
opacity:.8;
}
</style>
</head>

<body>

<div class="container">

<img src="OUTCHARTAPP.jpeg" class="logo">

<div class="designed">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>

<div class="scorelabel">SCORE REMAINING</div>
<div class="score" id="score">501</div>

<div class="modes">
<button class="modebtn" onclick="setMode(301)">301</button>
<button class="modebtn" onclick="setMode(501)">501</button>
<button class="modebtn" onclick="setMode(701)">701</button>
</div>

<div class="darts">
<div class="dartbox">DART 1<br><span id="d1">-</span></div>
<div class="dartbox">DART 2<br><span id="d2">-</span></div>
<div class="dartbox">DART 3<br><span id="d3">-</span></div>
</div>

<div class="input" id="input">---</div>

<div class="pad">
<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>
<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>
<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>
<button class="del" onclick="del()">DEL</button>
<button onclick="num(0)">0</button>
<button class="donate" onclick="donate()">DONATIONS<br>WELCOME</button>
</div>

<button class="apply" onclick="applyTurn()">APPLY TURN</button>

<footer>
Dart Calculator is owned by The Dart Room. © The Dart Room. All Rights Reserved.
</footer>

</div>

<script>

let score=501
let input=""
let dart=1

function update(){
document.getElementById("score").innerText=score
document.getElementById("input").innerText=input||"---"
}

function setMode(v){
score=v
dart=1
document.getElementById("d1").innerText="-"
document.getElementById("d2").innerText="-"
document.getElementById("d3").innerText="-"
input=""
update()
}

function num(n){
if(input.length<3){
input+=n
update()
}
}

function del(){
input=""
update()
}

function applyTurn(){

if(!input)return

let v=parseInt(input)

score=Math.max(0,score-v)

document.getElementById("d"+dart).innerText=v

dart++
if(dart>3)dart=1

input=""
update()
}

function donate(){
window.open("https://venmo.com/u/Steve-Moody-8","_blank")
}

update()

</script>

</body>
</html>
