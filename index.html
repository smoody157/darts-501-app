<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OATS Checkout</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#000; font-family:Arial, sans-serif; overflow:hidden; }

#app {
  width:430px;
  height:932px;
  margin:auto;
  position:relative;

  /* GITHUB PROJECT PAGE SAFE PATH */
  background:url('/darts-501-app/oats.jpeg') no-repeat center center;
  background-size:100% 100%;
}

/* Radiant Text */
.radiant {
  position:absolute;
  width:100%;
  text-align:center;
  font-weight:900;
  color:#79dcff;
  text-shadow:
    0 0 6px rgba(0,210,255,0.90),
    0 0 14px rgba(0,210,255,0.55),
    0 0 22px rgba(255,79,161,0.35);
  pointer-events:none;
}

#score { top:230px; font-size:90px; }
#input { top:515px; font-size:52px; }

/* Dart Boxes */
.dart-box { position:absolute; width:105px; top:418px; text-align:center; }
.dart-label {
  position:absolute;
  top:6px;
  left:8px;
  font-size:10px;
  font-weight:700;
  color:rgba(255,255,255,0.55);
  text-shadow:0 0 6px rgba(0,0,0,0.65);
}
.dart-val {
  position:absolute;
  top:28px;
  width:100%;
  font-size:24px;
  font-weight:900;
  color:#79dcff;
  text-shadow:
    0 0 6px rgba(0,210,255,0.85),
    0 0 16px rgba(255,79,161,0.35);
}

#d1 { left:40px; }
#d2 { left:164px; }
#d3 { left:288px; }

/* Keypad */
.grid {
  position:absolute;
  top:620px;
  left:50px;
  width:330px;
  height:240px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,1fr);
}

.grid button {
  background:transparent;
  border:none;
  width:100%;
  height:100%;
}

#apply {
  position:absolute;
  bottom:30px;
  left:50px;
  width:330px;
  height:70px;
  background:transparent;
  border:none;
}

.grid button:active, #apply:active {
  background:rgba(255,255,255,0.05);
  border-radius:18px;
}
</style>
</head>

<body>
<div id="app">

<div id="score" class="radiant">501</div>
<div id="input" class="radiant">---</div>

<div class="dart-box" id="d1">
  <div class="dart-label">Dart 1</div>
  <div class="dart-val" id="d1v">-</div>
</div>

<div class="dart-box" id="d2">
  <div class="dart-label">Dart 2</div>
  <div class="dart-val" id="d2v">-</div>
</div>

<div class="dart-box" id="d3">
  <div class="dart-label">Dart 3</div>
  <div class="dart-val" id="d3v">-</div>
</div>

<div class="grid">
<button onclick="APP.key(7)"></button>
<button onclick="APP.key(8)"></button>
<button onclick="APP.key(9)"></button>
<button onclick="APP.key(4)"></button>
<button onclick="APP.key(5)"></button>
<button onclick="APP.key(6)"></button>
<button onclick="APP.key(1)"></button>
<button onclick="APP.key(2)"></button>
<button onclick="APP.key(3)"></button>
<button onclick="APP.clear()"></button>
<button onclick="APP.key(0)"></button>
<button onclick="window.open(APP.donateUrl,'_blank')"></button>
</div>

<button id="apply" onclick="APP.apply()"></button>

</div>

<script>
const OUTS = { 170:["T20","T20","DB"], 167:["T20","T19","DB"], 164:["T20","T18","DB"],
160:["T20","T20","D20"], 158:["T20","T20","D19"], 157:["T20","T19","D20"],
156:["T20","T20","D18"], 155:["T20","T19","D19"], 154:["T20","T18","D20"],
153:["T20","T19","D18"], 152:["T20","T20","D16"], 151:["T20","T17","D20"],
150:["T20","T18","D18"], 149:["T20","T19","D16"], 148:["T20","T20","D14"],
147:["T20","T17","D18"], 146:["T20","T18","D16"], 145:["T20","T15","D20"],
144:["T20","T20","D12"], 143:["T20","T17","D16"], 142:["T20","T14","D20"],
141:["T20","T19","D12"], 140:["T20","T20","D10"], 139:["T20","T13","D20"],
138:["T20","T18","D12"], 137:["T20","T19","D10"], 136:["T20","T20","D8"],
135:["T20","T17","D12"], 134:["T20","T14","D16"], 133:["T20","T19","D8"],
132:["T20","T20","D6"], 131:["T20","T13","D16"], 130:["T20","T20","D5"],
125:["T20","T19","D4"], 120:["T20","S20","D20"], 100:["T20","D20","-"],
98:["T20","D19","-"], 96:["T20","D18","-"], 95:["T19","D19","-"],
90:["T18","D18","-"], 88:["T16","D20","-"], 85:["T15","D20","-"],
80:["T20","D10","-"], 75:["T17","D12","-"], 70:["T18","D8","-"],
60:["S20","D20","-"], 50:["DB","-","-"], 40:["D20","-","-"],
32:["D16","-","-"], 24:["D12","-","-"], 16:["D8","-","-"],
8:["D4","-","-"], 2:["D1","-","-"] };

const APP = {
score:501,
input:"",
donateUrl:"https://your-donation-link.com",

draw(){
document.getElementById("score").innerText=this.score;
document.getElementById("input").innerText=this.input||"---";
let out=OUTS[this.score]||["-","-","-"];
document.getElementById("d1v").innerText=out[0]||"-";
document.getElementById("d2v").innerText=out[1]||"-";
document.getElementById("d3v").innerText=out[2]||"-";
},

key(n){ if(this.input.length<3) this.input+=n; this.draw(); },
clear(){ this.input=""; this.draw(); },

apply(){
let v=parseInt(this.input);
if(!isNaN(v) && this.score-v>=0 && this.score-v!==1)
this.score-=v;
this.input="";
this.draw();
}
};

APP.draw();
</script>
</body>
</html>
