<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --border: rgba(255, 255, 255, 0.2);
        }

        body { 
            background-color: #05070a; 
            color: #fff; 
            font-family: system-ui, sans-serif;
            text-align: center; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header-logo {
            width: 100%;
            max-width: 320px;
            margin-top: 15px;
            height: auto;
        }

        .deck {
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px;
            width: 94%; max-width: 380px;
            margin-top: 5px;
        }

        .main-score { font-size: 75px; font-weight: 900; margin: 0; color: #fff; line-height: 1.1; }
        
        .mode-buttons { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .mode-btn {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold;
        }
        .mode-btn.active { border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.2); }

        .dart-grid { display: flex; justify-content: center; gap: 5px; margin-bottom: 8px; }
        .orb { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 8px 2px; width: 32%; }
        .label-blue { color: var(--neon-blue); font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .target { font-size: 22px; font-weight: 900; display: block; }
        .remain { font-size: 15px; color: var(--neon-pink); font-weight: 900; }

        .input-box {
            background: #000; border: 2px solid var(--neon-blue);
            border-radius: 10px; padding: 10px; font-size: 32px;
            color: var(--neon-blue); font-weight: 900; margin-bottom: 8px;
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .num-btn {
            background: #1a1a1a; border: 1px solid var(--border);
            color: #fff; padding: 18px; font-size: 24px; border-radius: 10px; font-weight: bold;
        }
        .enter-btn { background: var(--neon-green); color: #000; font-size: 18px; font-weight: 900; }
        .del-btn { color: var(--neon-pink); }

        .footer { font-size: 9px; margin-top: 10px; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/smoody157/darts-501-app/main/7F737C26-56A1-497B-A4A2-CCD6141E7B8C.png" alt="Logo" class="header-logo">

    <div class="deck">
        <div class="mode-buttons">
            <button class="mode-btn" id="btn301" onclick="setGame(301)">301</button>
            <button class="mode-btn active" id="btn501" onclick="setGame(501)">501</button>
            <button class="mode-btn" id="btn701" onclick="setGame(701)">701</button>
        </div>

        <div id="main-score" class="main-score">501</div>

        <div class="dart-grid">
            <div class="orb"><div class="label-blue">Dart 1</div><span class="target" id="d1-t">-</span><span class="remain" id="d1-r"></span></div>
            <div class="orb"><div class="label-blue">Dart 2</div><span class="target" id="d2-t">-</span><span class="remain" id="d2-r"></span></div>
            <div class="orb"><div class="label-blue">Dart 3</div><span class="target" id="d3-t">-</span><span class="remain" id="d3-r"></span></div>
        </div>

        <div id="input-display" class="input-box">---</div>

        <div class="numpad">
            <button class="num-btn" onclick="press(7)">7</button><button class="num-btn" onclick="press(8)">8</button><button class="num-btn" onclick="press(9)">9</button>
            <button class="num-btn" onclick="press(4)">4</button><button class="num-btn" onclick="press(5)">5</button><button class="num-btn" onclick="press(6)">6</button>
            <button class="num-btn" onclick="press(1)">1</button><button class="num-btn" onclick="press(2)">2</button><button class="num-btn" onclick="press(3)">3</button>
            <button class="num-btn del-btn" onclick="del()">DEL</button><button class="num-btn" onclick="press(0)">0</button><button class="num-btn enter-btn" onclick="apply()">ENTER</button>
        </div>
    </div>

    <div class="footer">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>

<script>
    let score = 501;
    let input = "";

    const checkouts = {
        170: ["T20", "T20", "BULL"], 167: ["T20", "T19", "BULL"], 164: ["T20", "T18", "BULL"],
        161: ["T20", "T17", "BULL"], 160: ["T20", "T20", "D20"], 158: ["T20", "T20", "D19"],
        157: ["T20", "T19", "D20"], 156: ["T20", "T20", "D18"], 155: ["T20", "T19", "D19"],
        154: ["T20", "T18", "D20"], 153: ["T20", "T19", "D18"], 152: ["T20", "T20", "D16"],
        151: ["T20", "T17", "D20"], 150: ["T20", "T18", "D18"], 149: ["T20", "T19", "D16"],
        148: ["T20", "T16", "D20"], 147: ["T20", "T17", "D18"], 146: ["T20", "T18", "D16"],
        145: ["T20", "T15", "D20"], 144: ["T20", "T20", "D12"], 143: ["T20", "T17", "D16"],
        142: ["T20", "T14", "D20"], 141: ["T20", "T15", "D18"], 140: ["T20", "T20", "D10"],
        130: ["T20", "T20", "D5"], 121: ["T20", "T15", "D8"], 100: ["T20", "D20", "-"],
        90: ["T18", "D18", "-"], 80: ["T20", "D10", "-"], 60: ["S20", "D20", "-"],
        40: ["D20", "-", "-"], 32: ["D16", "-", "-"], 16: ["D8", "-", "-"], 8: ["D4", "-", "-"], 4: ["D2", "-", "-"], 2: ["D1", "-", "-"]
    };

    function getVal(t) {
        if (t === "-" || t === "Bust") return 0;
        if (t === "BULL") return 50;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        if (t.startsWith("S")) return parseInt(t.substring(1));
        return parseInt(t) || 0;
    }

    function getPath(s) {
        // High Score Logic: Reduce by T20
        if (s > 170 || [169, 168, 166, 165, 163, 162, 159].includes(s)) return ["T20", "T20", "T20"];
        if (checkouts[s]) return checkouts[s];
        // Dynamic Checkout for everything else
        if (s <= 40 && s % 2 === 0) return ["D" + (s/2), "-", "-"];
        if (s <= 60 && s > 40) return ["S" + (s-40), "D20", "-"];
        if (s < 40 && s % 2 !== 0) return ["S1", "D" + ((s-1)/2), "-"];
        return ["T20", "T20", "T20"];
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-display').innerText = input || "---";
        const path = getPath(score);
        
        let s1 = path[0], r1 = score - getVal(s1);
        document.getElementById('d1-t').innerText = s1;
        document.getElementById('d1-r').innerText = r1;

        let s2 = (r1 <= 0) ? "-" : path[1], r2 = r1 - getVal(s2);
        document.getElementById('d2-t').innerText = s2;
        document.getElementById('d2-r').innerText = (r1 <= 0) ? "" : r2;

        let s3 = (r2 <= 0) ? "-" : path[2], r3 = r2 - getVal(s3);
        document.getElementById('d3-t').innerText = s3;
        document.getElementById('d3-r').innerText = (r2 <= 0) ? "" : r3;
    }

    function setGame(n) { score = n; input = ""; update(); }
    function press(n) { if(input.length < 3) input += n; update(); }
    function del() { input = ""; update(); }
    function apply() {
        let v = parseInt(input);
        if (!isNaN(v)) {
            if (score - v < 0 || score - v === 1) alert("BUST");
            else score -= v;
        }
        input = ""; update();
    }
    update();
</script>
</body>
</html>
