<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Dart Room – Out Chart App</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none; }
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family: Arial, Helvetica, sans-serif; }

  /* Stage */
  #stage { position:relative; width:100vw; height:100vh; background:#000; overflow:hidden; }

  /* Probe image (hidden) to read true background size */
  #bgProbe { position:absolute; left:0; top:0; opacity:0; pointer-events:none; }

  /* Visible background */
  #bg { position:absolute; left:0; top:0; width:0px; height:0px; background-position:center; background-repeat:no-repeat; background-size:100% 100%; }

  /* Overlay in BASE coordinate space (430x932) */
  #overlay { position:absolute; left:0; top:0; width:430px; height:932px; transform-origin: top left; }

  /* Text styles */
  .neon {
    background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    text-align: center;
    filter: drop-shadow(0 0 12px rgba(0,210,255,0.60));
  }

  /* Patch to hide baked-in header text if present */
  #headerPatch {
    position:absolute;
    left: 55px;
    top: 165px;
    width: 320px;
    height: 36px;
    background: rgba(0,0,0,0.55);
    border-radius: 12px;
    pointer-events:none;
  }

  #brand {
    position:absolute;
    left:0;
    top: 176px;
    width:430px;
    text-align:center;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.78);
    text-shadow: 0 0 10px rgba(0,0,0,0.55);
    font-weight: 900;
  }

  #score {
    position:absolute;
    left:0;
    top: 262px; /* tuned down */
    width:430px;
    font-size:92px;
    line-height: 1;
  }

  /* Dart boxes: label above value */
  .dartLabel {
    position:absolute;
    width:120px;
    text-align:center;
    font-size:11px;
    letter-spacing:2px;
    color: rgba(255,255,255,0.72);
    font-weight: 900;
    text-shadow: 0 0 10px rgba(0,0,0,0.55);
  }
  .dartVal {
    position:absolute;
    width:120px;
    text-align:center;
    font-size:30px;
    line-height:1;
    filter: drop-shadow(0 0 12px rgba(0,210,255,0.65));
  }
  /* moved UP per your screenshot notes */
  #dl1 { left: 35px; top: 372px; }
  #dl2 { left: 155px; top: 372px; }
  #dl3 { left: 275px; top: 372px; }
  #d1  { left: 35px; top: 398px; }
  #d2  { left: 155px; top: 398px; }
  #d3  { left: 275px; top: 398px; }

  /* Input display in the long bar */
  #input {
    position:absolute;
    left:0;
    top: 508px; /* moved up into bar */
    width:430px;
    text-align:center;
    font-size:54px;
    color:#72d6ff;
    text-shadow: 0 0 16px rgba(0,210,255,0.65);
    font-weight: 900;
  }

  /* Invisible hit zones */
  .hit { position:absolute; background:transparent; border:0; padding:0; margin:0; cursor:pointer; }

  /* Mode buttons (make them cover the full rounded squares) */
  .mode { top: 336px; width: 74px; height: 46px; }
  #m301 { left: 110px; }
  #m501 { left: 178px; }
  #m701 { left: 246px; }

  /* Keypad surface exactly: 330x240 => each key 110x60 */
  #pad {
    position:absolute;
    top: 610px;
    left: 50px;
    width: 330px;
    height: 240px;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 0;
  }
  #pad .hit { position:relative; width:100%; height:100%; }

  /* Apply button */
  #apply { position:absolute; left: 50px; top: 862px; width: 330px; height: 58px; }

  /* Donate button (right side of bottom row) */
  #donate { position:absolute; left: 270px; top: 790px; width: 110px; height: 60px; }

  /* Version */
  #version {
    position:absolute;
    right: 14px;
    top: 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    text-shadow: 0 0 10px rgba(0,0,0,0.6);

  /* Footer patch + footer */
  #footerPatch {
    position:absolute; left:0; top: 920px; width:430px; height: 20px;
    background: rgba(0,0,0,0.85);
    pointer-events:none;

    position:absolute; left:0; top: 922px; width:430px;
    font-size:10px; text-align:center;
    color: rgba(255,255,255,0.72);
    text-shadow: 0 0 10px rgba(0,0,0,0.6);
  }

/* ====== Math fit: background and overlay use the same translate + scale ====== */
(function fitToBackground() {
  const probe = document.getElementById('bgProbe');
  const bg = document.getElementById('bg');
  const overlay = document.getElementById('overlay');
  const stage = document.getElementById('stage');

  function applyFit() {
    const Wb = probe.naturalWidth || 430;
    const Hb = probe.naturalHeight || 932;
    const Wv = stage.clientWidth;
    const Hv = stage.clientHeight;

    const scale = Math.min(Wv / Wb, Hv / Hb);
    const drawW = Math.round(Wb * scale);
    const drawH = Math.round(Hb * scale);

    const offsetX = Math.round((Wv - drawW) / 2);
    const offsetYraw = Math.round((Hv - drawH) / 2);
    const offsetY = offsetYraw - 22; // move whole art/UI up to remove top gap

    bg.style.left = offsetX + 'px';
    bg.style.top = offsetY + 'px';
    bg.style.width = drawW + 'px';
    bg.style.height = drawH + 'px';
    bg.style.backgroundImage = "url('OUTCHARTAPP.jpeg'), url('outs.jpg')";
    bg.style.backgroundSize = '100% 100%';

    // Map base (430x932) to real bg (Wb,Hb) then to viewport scale
    const baseW = 430, baseH = 932;
    const sx = (Wb / baseW) * scale;
    const sy = (Hb / baseH) * scale;

    overlay.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${sx}, ${sy})`;
  }

  probe.addEventListener('load', () => {
    applyFit();
    window.addEventListener('resize', applyFit, { passive:true });
  });

  probe.addEventListener('error', () => {
    probe.src = 'outs.jpg';
  });

  if (probe.complete) {
    if (probe.naturalWidth) {
      applyFit();
      window.addEventListener('resize', applyFit, { passive:true });
    } else {
      probe.src = 'outs.jpg';
    }
  }
})();

/* ====== App Logic ====== */
const APP = {
  mode: 501,
  score: 501,
  input: "",

  setMode(n) {
    this.mode = n;
    this.score = n;
    this.input = "";
    this.draw();
  },

  key(n) {
    if (this.input.length < 3) {
      this.input += String(n);
      this.draw();
    }
  },

  clr() {
    this.input = "";
    this.draw();
  },

  apply() {
    const v = parseInt(this.input, 10);
    if (!isNaN(v)) {
      const next = this.score - v;
      // bust: cannot go below 0 or to 1
      if (next >= 0 && next !== 1) {
        this.score = next;
      }
    }
    this.input = "";
    this.draw();
  },

  donate() {
    window.open("https://venmo.com/u/Steve-Moody-8", "_blank");
  },

  drawOuts() {
    // Blank until you are in checkout range
    if (this.score > 170 || this.score < 2) {
      document.getElementById('d1').innerText = "";
      document.getElementById('d2').innerText = "";
      document.getElementById('d3').innerText = "";
      return;
    }

    const p = OUTS[this.score] || ["-","-","-"];
    const a = (p[0] && p[0] !== "-" && p[0] !== "—") ? String(p[0]).trim() : "";
    const b = (p[1] && p[1] !== "-" && p[1] !== "—") ? String(p[1]).trim() : "";
    const c = (p[2] && p[2] !== "-" && p[2] !== "—") ? String(p[2]).trim() : "";

    document.getElementById('d1').innerText = a;
    document.getElementById('d2').innerText = b;
    document.getElementById('d3').innerText = c;
  },

  draw() {
    document.getElementById('score').innerText = this.score;
    document.getElementById('input').innerText = this.input || "---";
    this.drawOuts();
  }
};
