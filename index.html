<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, height=932, initial-scale=1.0, user-scalable=no">
    <title>DART PRO MASTER - TOTAL EMBED</title>
    <style>
        body, html { margin: 0; padding: 0; width: 430px; height: 932px; background: #000; overflow: hidden; display: flex; justify-content: center; }
        
        #app-canvas {
            width: 430px; height: 932px;
            /* IMAGE EMBEDDED DIRECTLY BELOW */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAa4AAALkCAYAAABv6...') /* Full Base64 String here */;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
        }

        #main-score {
            position: absolute; top: 185px; width: 430px;
            text-align: center; font-size: 92px; color: #fff;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 20px #00d2ff;
        }

        .mode-btn { position: absolute; top: 300px; width: 80px; height: 45px; cursor: pointer; }
        #btn301 { left: 82px; } #btn501 { left: 175px; } #btn701 { left: 268px; }

        .orb { position: absolute; width: 100px; text-align: center; top: 390px; }
        #orb1 { left: 40px; } #orb2 { left: 165px; } #orb3 { left: 290px; }
        .target { font-size: 32px; color: #fff; display: block; font-weight: 900; line-height: 1; }
        .rem { font-size: 14px; color: #ff007f; font-weight: 900; }

        #input-view {
            position: absolute; top: 500px; width: 430px;
            text-align: center; font-size: 48px; color: #00d2ff; font-weight: 900;
        }

        .keypad {
            position: absolute; top: 560px; left: 40px; width: 350px; height: 260px;
            display: grid; grid-template-columns: repeat(3, 1fr);
        }
        .k { background: transparent; border: none; cursor: pointer; outline: none; }

        .apply-bar {
            position: absolute; bottom: 40px; left: 40px; width: 350px; height: 80px;
            background: transparent; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app-canvas">
    <div id="main-score">701</div>
    <div class="mode-btn" id="btn301" onclick="init(301)"></div>
    <div class="mode-btn" id="btn501" onclick="init(501)"></div>
    <div class="mode-btn" id="btn701" onclick="init(701)"></div>
    <div class="orb" id="orb1"><span class="target" id="t1">-</span><span class="rem" id="r1"></span></div>
    <div class="orb" id="orb2"><span class="target" id="t2">-</span><span class="rem" id="r2"></span></div>
    <div class="orb" id="orb3"><span class="target" id="t3">-</span><span class="rem" id="r3"></span></div>
    <div id="input-view">---</div>
    <div class="keypad">
        <button class="k" onclick="press(7)"></button><button class="k" onclick="press(8)"></button><button class="k" onclick="press(9)"></button>
        <button class="k" onclick="press(4)"></button><button class="k" onclick="press(5)"></button><button class="k" onclick="press(6)"></button>
        <button class="k" onclick="press(1)"></button><button class="k" onclick="press(2)"></button><button class="k" onclick="press(3)"></button>
        <button class="k" onclick="del()"></button><button class="k" onclick="press(0)"></button>
    </div>
    <button class="apply-bar" onclick="apply()"></button>
</div>

<script>
    let score = 701;
    let inputStr = "";
    let lastVoiceScore = null;

    // PROFESSIONAL OUTCHART DATABASE
    const outs = {
        170: ["T20", "T20", "DB"], 167: ["T20", "T19", "DB"], 164: ["T20", "T18", "DB"], 161: ["T20", "T17", "DB"], 160: ["T20", "T20", "D20"],
        158: ["T20", "T20", "D19"], 157: ["T20", "T19", "D20"], 156: ["T20", "T20", "D18"], 155: ["T20", "T19", "D19"], 154: ["T20", "T18", "D20"],
        140: ["T20", "T20", "D10"], 130: ["T20", "S20", "DB"], 125: ["DB", "T20", "D20"], 121: ["T20", "T11", "D14"], 110: ["T20", "S10", "D20"],
        100: ["T20", "D20", "-"], 90: ["T18", "D18", "-"], 80: ["T20", "D10", "-"], 70: ["T10", "D20", "-"], 60: ["S20", "D20", "-"],
        50: ["DB", "-", "-"], 40: ["D20", "-", "-"], 32: ["D16", "-", "-"], 20: ["D10", "-", "-"], 10: ["D5", "-", "-"], 2: ["D1", "-", "-"]
    };

    function voiceCaller(path) {
        if (!path || path[0] === "-") return;
        let phrase = path.filter(x => x !== "-").join(", ")
            .replace(/T/g, "Triple ")
            .replace(/D(\d+)/g, "Double $1")
            .replace(/DB/g, "Double Bull")
            .replace(/S/g, "Single ");
        const msg = new SpeechSynthesisUtterance(phrase);
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function val(s) {
        if (!s || s === "-") return 0;
        if (s === "DB") return 50;
        let n = parseInt(s.substring(1));
        if (s[0] === "T") return n * 3;
        if (s[0] === "D") return n * 2;
        return n;
    }

    function refresh() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-view').innerText = inputStr || "---";
        let path = outs[score] || (score > 170 ? ["-","-","-"] : ["T20", "S20", "D" + Math.floor((score - 80) / 2)]);
        if (score <= 1) path = ["-", "-", "-"];

        document.getElementById('t1').innerText = path[0];
        let r1 = score - val(path[0]); document.getElementById('r1').innerText = r1 > 0 ? r1 : "";
        document.getElementById('t2').innerText = path[1];
        let r2 = r1 - val(path[1]); document.getElementById('r2').innerText = r2 > 0 ? r2 : "";
        document.getElementById('t3').innerText = path[2];

        if (score <= 170 && score > 1 && score !== lastVoiceScore) {
            voiceCaller(path);
            lastVoiceScore = score;
        }
    }

    function init(n) { score = n; inputStr = ""; lastVoiceScore = null; refresh(); }
    function press(n) { if (inputStr.length < 3) inputStr += n; refresh(); }
    function del() { inputStr = ""; refresh(); }
    function apply() {
        let v = parseInt(inputStr);
        if (!isNaN(v)) {
            if (score - v < 0 || score - v === 1) window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bust"));
            else score -= v;
        }
        inputStr = ""; refresh();
    }
    refresh();
</script>
</body>
</html>
