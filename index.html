<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OATS Checkout</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#000; font-family:Arial, sans-serif; overflow:hidden; }

#app {
  width:430px;
  height:932px;
  margin:auto;
  position:relative;
  background:url('./oats.jpeg') no-repeat center center;
  background-size:100% 100%;
}

/* --- RADIANT TEXT (no transparent fill, so it never "shows background through the letters") --- */
.radiant {
  position:absolute;
  width:100%;
  text-align:center;
  font-weight:900;
  color:#79dcff;                 /* main neon color */
  text-shadow:
    0 0 6px rgba(0,210,255,0.90),
    0 0 14px rgba(0,210,255,0.55),
    0 0 22px rgba(255,79,161,0.35); /* subtle pink halo */
  pointer-events:none;
}

#score { top:230px; font-size:90px; }
#input { top:515px; font-size:52px; color:#79dcff; }

/* Dart suggestion boxes */
.dart-box { position:absolute; width:105px; top:418px; text-align:center; }
.dart-label {
  position:absolute;
  top:6px;
  left:8px;
  font-size:10px;
  font-weight:700;
  color:rgba(255,255,255,0.55);
  text-shadow: 0 0 6px rgba(0,0,0,0.65);
  pointer-events:none;
}
.dart-val {
  position:absolute;
  top:28px;              /* leaves room for the label */
  left:0;
  width:100%;
  font-size:24px;
  font-weight:900;
  color:#79dcff;
  text-shadow:
    0 0 6px rgba(0,210,255,0.85),
    0 0 16px rgba(255,79,161,0.35);
  pointer-events:none;
}

#d1 { left:40px; }
#d2 { left:164px; }
#d3 { left:288px; }

/* Keypad */
.grid {
  position:absolute;
  top:620px;
  left:50px;
  width:330px;
  height:240px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,1fr);
}

.grid button {
  background:transparent;
  border:none;
  width:100%;
  height:100%;
}

/* Apply */
#apply { position:absolute; bottom:30px; left:50px; width:330px; height:70px; background:transparent; border:none; }

/* Donate = bottom-right cell in keypad (opposite DEL) - same "tap feel" */
.grid button:active, #apply:active { background: rgba(255,255,255,0.04); border-radius:18px; }
</style>
</head>

<body>
<div id="app">

<div id="score" class="radiant">501</div>
<div id="input" class="radiant">---</div>

<div class="dart-box" id="d1">
  <div class="dart-label">Dart 1</div>
  <div class="dart-val" id="d1v">-</div>
</div>
<div class="dart-box" id="d2">
  <div class="dart-label">Dart 2</div>
  <div class="dart-val" id="d2v">-</div>
</div>
<div class="dart-box" id="d3">
  <div class="dart-label">Dart 3</div>
  <div class="dart-val" id="d3v">-</div>
</div>

<div class="grid">
  <button onclick="APP.key(7)" aria-label="7"></button>
  <button onclick="APP.key(8)" aria-label="8"></button>
  <button onclick="APP.key(9)" aria-label="9"></button>
  <button onclick="APP.key(4)" aria-label="4"></button>
  <button onclick="APP.key(5)" aria-label="5"></button>
  <button onclick="APP.key(6)" aria-label="6"></button>
  <button onclick="APP.key(1)" aria-label="1"></button>
  <button onclick="APP.key(2)" aria-label="2"></button>
  <button onclick="APP.key(3)" aria-label="3"></button>
  <button onclick="APP.clear()" aria-label="DEL"></button>
  <button onclick="APP.key(0)" aria-label="0"></button>
  <!-- Donate (opposite DEL). Replace the URL below with your real donate link. -->
  <button onclick="window.open(APP.donateUrl,'_blank')" aria-label="Donations Welcome"></button>
</div>

<button id="apply" onclick="APP.apply()" aria-label="Apply Turn"></button>

</div>

<script>
/* Full double-out table (standard PDC). Two-dart outs use "-" for the 3rd box. */
const OUTS = {
  170:["T20","T20","DB"], 167:["T20","T19","DB"], 164:["T20","T18","DB"],
  161:["T20","T17","DB"], 160:["T20","T20","D20"], 158:["T20","T20","D19"],
  157:["T20","T19","D20"], 156:["T20","T20","D18"], 155:["T20","T19","D19"],
  154:["T20","T18","D20"], 153:["T20","T19","D18"], 152:["T20","T20","D16"],
  151:["T20","T17","D20"], 150:["T20","T18","D18"], 149:["T20","T19","D16"],
  148:["T20","T20","D14"], 147:["T20","T17","D18"], 146:["T20","T18","D16"],
  145:["T20","T15","D20"], 144:["T20","T20","D12"], 143:["T20","T17","D16"],
  142:["T20","T14","D20"], 141:["T20","T19","D12"], 140:["T20","T20","D10"],
  139:["T20","T13","D20"], 138:["T20","T18","D12"], 137:["T20","T19","D10"],
  136:["T20","T20","D8"], 135:["T20","T17","D12"], 134:["T20","T14","D16"],
  133:["T20","T19","D8"], 132:["T20","T20","D6"], 131:["T20","T13","D16"],
  130:["T20","T20","D5"], 129:["T19","T16","D12"], 128:["T18","T14","D16"],
  127:["T20","T17","D8"], 126:["T19","T19","D6"], 125:["T20","T19","D4"],
  124:["T20","T16","D8"], 123:["T19","T16","D9"], 122:["T18","T20","D4"],
  121:["T20","T11","D14"], 120:["T20","S20","D20"], 119:["T19","T12","D13"],
  118:["T20","S18","D20"], 117:["T20","S17","D20"], 116:["T20","S16","D20"],
  115:["T20","S15","D20"], 114:["T20","S14","D20"], 113:["T20","S13","D20"],
  112:["T20","S12","D20"], 111:["T20","S11","D20"], 110:["T20","S10","D20"],
  109:["T20","S9","D20"], 108:["T20","S8","D20"], 107:["T19","S10","D20"],
  106:["T20","S6","D20"], 105:["T20","S5","D20"], 104:["T18","S18","D16"],
  103:["T20","S3","D20"], 102:["T20","S2","D20"], 101:["T17","S10","D20"],

  100:["T20","D20","-"], 99:["T19","S10","D16"], 98:["T20","D19","-"],
  97:["T19","D20","-"], 96:["T20","D18","-"], 95:["T19","D19","-"],
  94:["T18","D20","-"], 93:["T19","D18","-"], 92:["T20","D16","-"],
  91:["T17","D20","-"], 90:["T18","D18","-"], 89:["T19","D16","-"],
  88:["T16","D20","-"], 87:["T17","D18","-"], 86:["T18","D16","-"],
  85:["T15","D20","-"], 84:["T20","D12","-"], 83:["T17","D16","-"],
  82:["T14","D20","-"], 81:["T19","D12","-"], 80:["T20","D10","-"],
  79:["T19","D11","-"], 78:["T18","D12","-"], 77:["T19","D10","-"],
  76:["T20","D8","-"], 75:["T17","D12","-"], 74:["T14","D16","-"],
  73:["T19","D8","-"], 72:["T16","D12","-"], 71:["T13","D16","-"],
  70:["T18","D8","-"], 69:["T19","D6","-"], 68:["T20","D4","-"],
  67:["T17","D8","-"], 66:["T10","D18","-"], 65:["T19","D4","-"],
  64:["T16","D8","-"], 63:["T13","D12","-"], 62:["T10","D16","-"],
  61:["T15","D8","-"], 60:["S20","D20","-"], 59:["S19","D20","-"],
  58:["S18","D20","-"], 57:["S17","D20","-"], 56:["S16","D20","-"],
  55:["S15","D20","-"], 54:["S14","D20","-"], 53:["S13","D20","-"],
  52:["S12","D20","-"], 51:["S11","D20","-"], 50:["DB","-","-"],
  49:["S9","D20","-"], 48:["S16","D16","-"], 47:["S15","D16","-"],
  46:["S14","D16","-"], 45:["S13","D16","-"], 44:["S12","D16","-"],
  43:["S11","D16","-"], 42:["S10","D16","-"], 41:["S9","D16","-"],
  40:["D20","-","-"], 38:["D19","-","-"], 36:["D18","-","-"], 34:["D17","-","-"],
  32:["D16","-","-"], 30:["D15","-","-"], 28:["D14","-","-"], 26:["D13","-","-"],
  24:["D12","-","-"], 22:["D11","-","-"], 20:["D10","-","-"], 18:["D9","-","-"],
  16:["D8","-","-"], 14:["D7","-","-"], 12:["D6","-","-"], 10:["D5","-","-"],
  8:["D4","-","-"], 6:["D3","-","-"], 4:["D2","-","-"], 2:["D1","-","-"]
};

const APP = {
  score: 501,
  input: "",
  donateUrl: "https://your-donation-link.com",

  draw() {
    document.getElementById("score").innerText = this.score;
    document.getElementById("input").innerText = this.input || "---";

    const out = OUTS[this.score] || ["-","-","-"];
    document.getElementById("d1v").innerText = out[0] || "-";
    document.getElementById("d2v").innerText = out[1] || "-";
    document.getElementById("d3v").innerText = out[2] || "-";
  },

  key(n) {
    if (this.input.length < 3) this.input += String(n);
    this.draw();
  },

  clear() {
    this.input = "";
    this.draw();
  },

  apply() {
    const v = parseInt(this.input, 10);
    if (!Number.isNaN(v)) {
      const next = this.score - v;
      if (next < 0 || next === 1) {
        // bust -> ignore (you can add speech here if you want)
      } else {
        this.score = next;
      }
    }
    this.input = "";
    this.draw();
  }
};

APP.draw();
</script>
</body>
</html>
