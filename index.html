<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=430, height=932, initial-scale=1.0">
<title>Dart Calculator</title>

<style>
body{margin:0;background:#000;font-family:Arial, Helvetica, sans-serif;}
#app{width:430px;height:932px;margin:auto;background:url("OUTCHARTAPP.jpeg") no-repeat center;background-size:100% 100%;position:relative;}
.neon{background:linear-gradient(#72d6ff,#ff4fa1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;text-align:center;}
#score{position:absolute;top:232px;width:430px;font-size:92px;}
.dart{position:absolute;width:105px;font-size:25px;text-align:center;}
#d1{top:424px; left:40px;}
#d2{top:424px; left:164px;}
#d3{top:424px; left:288px;}
#input{position:absolute;top:515px;width:430px;font-size:52px;text-align:center;color:#72d6ff;}
.hit{position:absolute;background:transparent;border:none;}
.mode{top:375px;width:60px;height:40px;}
#mode301{left:125px;}
#mode501{left:185px;}
#mode701{left:245px;}
.grid{position:absolute;top:620px;left:50px;width:330px;height:240px;display:grid;grid-template-columns:repeat(3,1fr);}
.grid button{background:transparent;border:none;}
#apply{position:absolute;bottom:30px;left:50px;width:330px;height:70px;background:transparent;border:none;}
#donate{position:absolute;bottom:30px;right:20px;width:120px;height:40px;background:transparent;border:none;}
footer{position:absolute;bottom:5px;width:100%;text-align:center;font-size:10px;color:#aaa;}
</style>
</head>

<body>

<div id="app">

<div id="score" class="neon">501</div>

<div id="d1" class="neon dart">-</div>
<div id="d2" class="neon dart">-</div>
<div id="d3" class="neon dart">-</div>

<div id="input">---</div>

<button id="mode301" class="hit mode" onclick="setGame(301)"></button>
<button id="mode501" class="hit mode" onclick="setGame(501)"></button>
<button id="mode701" class="hit mode" onclick="setGame(701)"></button>

<div class="grid">
<button onclick="key(7)"></button>
<button onclick="key(8)"></button>
<button onclick="key(9)"></button>
<button onclick="key(4)"></button>
<button onclick="key(5)"></button>
<button onclick="key(6)"></button>
<button onclick="key(1)"></button>
<button onclick="key(2)"></button>
<button onclick="key(3)"></button>
<button onclick="clearInput()"></button>
<button onclick="key(0)"></button>
</div>

<button id="apply" onclick="applyScore()"></button>
<button id="donate" onclick="donate()"></button>

<footer>Dart Calculator is owned by The Dart Room. All rights reserved.</footer>

</div>

<script>
let score=501
let input=""
let dart=1

function draw(){
document.getElementById("score").innerText=score
document.getElementById("input").innerText=input||"---"
}

function setGame(v){
score=v
input=""
dart=1
document.getElementById("d1").innerText="-"
document.getElementById("d2").innerText="-"
document.getElementById("d3").innerText="-"
draw()
}

function key(n){
if(input.length<3){input+=n;draw()}
}

function clearInput(){
input="";draw()
}

function applyScore(){
if(!input)return
let v=parseInt(input)
score=Math.max(0,score-v)
document.getElementById("d"+dart).innerText=v
dart++; if(dart>3)dart=1
input="";draw()
}

function donate(){
window.open("https://venmo.com/u/Steve-Moody-8","_blank")
}

draw()
</script>

</body>
</html>
