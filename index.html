<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR PRO</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            /* LINKED DIRECTLY TO YOUR REPO FILE */
            background: #000 url('https://raw.githubusercontent.com/smoody157/darts-501-app/main/7F737C26-56A1-497B-A4A2-CCD6141E7B8C.png') no-repeat center center;
            background-size: 100% 100%;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .canvas { width: 100vw; height: 100vh; max-width: 430px; position: relative; }

        /* Main Score Display */
        #main-score {
            position: absolute; top: 22.5%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 82px; color: #fff; text-shadow: 0 0 20px #00d2ff;
        }

        /* Mode Toggles (Top boxes) */
        .mode-grid {
            position: absolute; top: 31.5%; left: 15%; width: 70%; height: 5%;
            display: flex; justify-content: space-between;
        }
        .mode-btn { width: 30%; background: transparent; border: none; cursor: pointer; }

        /* Professional Outchart Display */
        .dart-grid {
            position: absolute; top: 41.5%; width: 100%;
            display: flex; justify-content: space-around;
        }
        .dart-slot { width: 33%; text-align: center; }
        .target { font-size: 26px; color: #fff; display: block; font-weight: 900; }
        .remain { font-size: 16px; color: #ff007f; font-weight: 900; }

        /* Input Display (---) */
        .input-display {
            position: absolute; top: 52.8%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px; color: #00d2ff; font-weight: 900;
        }

        /* Numpad (Invisible keys over your image) */
        .keypad {
            position: absolute; top: 58%; left: 6%; width: 88%; height: 32%;
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .key { background: transparent; border: none; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }

        /* APPLY TURN - Bottom box */
        .apply-btn {
            position: absolute; bottom: 4.5%; left: 5%; width: 90%; height: 60px;
            background: transparent; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="canvas">
    <div id="main-score">501</div>
    <div class="mode-grid">
        <button class="mode-btn" onclick="setGame(301)"></button>
        <button class="mode-btn" onclick="setGame(501)"></button>
        <button class="mode-btn" onclick="setGame(701)"></button>
    </div>
    <div class="dart-grid">
        <div class="dart-slot"><span class="target" id="d1-t">-</span><span class="remain" id="d1-r"></span></div>
        <div class="dart-slot"><span class="target" id="d2-t">-</span><span class="remain" id="d2-r"></span></div>
        <div class="dart-slot"><span class="target" id="d3-t">-</span><span class="remain" id="d3-r"></span></div>
    </div>
    <div class="input-display" id="input-val">---</div>
    <div class="keypad">
        <button class="key" onclick="press(7)"></button><button class="key" onclick="press(8)"></button><button class="key" onclick="press(9)"></button>
        <button class="key" onclick="press(4)"></button><button class="key" onclick="press(5)"></button><button class="key" onclick="press(6)"></button>
        <button class="key" onclick="press(1)"></button><button class="key" onclick="press(2)"></button><button class="key" onclick="press(3)"></button>
        <button class="key" onclick="del()"></button><button class="key" onclick="press(0)"></button>
    </div>
    <button class="apply-btn" onclick="apply()"></button>
</div>

<script>
    let score = 501;
    let inputStr = "";

    // Professional Outchart Data
    const masterOuts = {
        170:["T20","T20","BULL"],167:["T20","T19","BULL"],164:["T20","T18","BULL"],161:["T20","T17","BULL"],160:["T20","T20","D20"],
        150:["T20","T18","D18"],140:["T20","T20","D10"],121:["T20","T15","D8"],100:["T20","D20","-"],80:["T20","D10","-"],
        60:["S20","D20","-"],50:["BULL","-","-"],40:["D20","-","-"],32:["D16","-","-"],16:["D8","-","-"],8:["D4","-","-"],4:["D2","-","-"],2:["D1","-","-"]
    };

    function getVal(t) {
        if (!t || t === "-") return 0;
        if (t === "BULL") return 50;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        if (t.startsWith("S")) return parseInt(t.substring(1));
        return parseInt(t) || 0;
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-val').innerText = inputStr || "---";
        let path = masterOuts[score] || (score > 170 ? ["T20","T20","T20"] : ["T20","S20","D"+Math.floor((score-80)/2)]);
        if (score <= 1) path = ["-","-","-"];

        document.getElementById('d1-t').innerText = path[0];
        let r1 = score - getVal(path[0]);
        document.getElementById('d1-r').innerText = r1 > 0 ? r1 : (r1 === 0 ? "OUT" : "");

        document.getElementById('d2-t').innerText = path[1];
        let r2 = r1 - getVal(path[1]);
        document.getElementById('d2-r').innerText = r1 <= 0 ? "" : (r2 > 0 ? r2 : (r2 === 0 ? "OUT" : ""));

        document.getElementById('d3-t').innerText = path[2];
        let r3 = r2 - getVal(path[2]);
        document.getElementById('d3-r').innerText = r2 <= 0 ? "" : (r3 > 0 ? r3 : (r3 === 0 ? "OUT" : ""));
    }

    function setGame(n) { score = n; inputStr = ""; update(); }
    function press(n) { if(inputStr.length < 3) inputStr += n; update(); }
    function del() { inputStr = ""; update(); }
    function apply() {
        let v = parseInt(inputStr);
        if(!isNaN(v)) {
            if (score - v < 0 || score - v === 1) alert("BUST");
            else score -= v;
        }
        inputStr = ""; update();
    }
    update();
</script>
</body>
</html>
