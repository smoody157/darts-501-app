<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dart Room – Dart Calculator</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background:#000; overflow:hidden; font-family: Arial, Helvetica, sans-serif; }

    /* Stage centers the background image */
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    /* We render the background as an <img> so we can read its true size and compute a perfect math transform */
    #bg {
      position: absolute;
      left: 0;
      top: 0;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      opacity: 0; /* hidden; used only to compute sizing */
      pointer-events: none;
    }

    /* The visible background layer */
    #bg-visible {
      position: absolute;
      left: 0;
      top: 0;
      width: 0px; /* set by JS */
      height: 0px; /* set by JS */
      background-image: url("OUTCHARTAPP.jpeg");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    
      filter: contrast(1.08) saturate(1.18) brightness(1.06);
      will-change: transform;
    }

    /* Overlay is in BASE coordinate space (430x932), then we apply a single transform (scale + translate) */
    #overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 430px;
      height: 932px;
      transform-origin: top left;
    }

    /* Text styles */
    .neon {
      background: linear-gradient(to bottom, #72d6ff 0%, #ff4fa1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      text-align: center;
      filter: drop-shadow(0 0 10px rgba(0,210,255,0.55));
    }

    #score {
      position: absolute;
      top: 200px;
      left: 0;
      width: 430px;
      font-size: 92px;
      line-height: 1;
    }

    #brand {
      position: absolute;
      top: 168px;
      left: 0;
      width: 430px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.80);
      text-shadow: 0 0 8px rgba(255,255,255,0.15);
      font-weight: 700;
    }

    .dart-label {
      position: absolute;
      width: 105px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.75);
      font-weight: 800;
      text-shadow: 0 0 8px rgba(255,255,255,0.12);
    }

    .dart-val {
      position: absolute;
      width: 105px;
      text-align: center;
      font-size: 36px;
      line-height: 1;
    }

    /* Dart labels ABOVE values, per your request */
    #dl1 { top: 368px; left: 34px; }
    #dl2 { top: 368px; left: 164px; }
    #dl3 { top: 368px; left: 294px; }
    #d1  { top: 394px; left: 34px; }
    #d2  { top: 394px; left: 164px; }
    #d3  { top: 394px; left: 294px; }

    #input {
      position: absolute;
      top: 468px;
      left: 0;
      width: 430px;
      font-size: 52px;
      text-align: center;
      color: #72d6ff;
      text-shadow: 0 0 15px rgba(0,210,255,0.65);
      font-weight: 900;
    }

    #version {
      position: absolute;
      top: 18px;
      right: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 0 6px rgba(0,0,0,0.45);
    }

    /* Invisible hit zones (buttons) */
    .hit {
      position: absolute;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }

    /* Mode buttons - aligned to your original coords */
    .mode { top: 375px; width: 60px; height: 40px; }
    #m301 { left: 125px; }
    #m501 { left: 185px; }
    #m701 { left: 245px; }

    /* Keypad grid area (3 columns). We map each cell precisely. */
    #pad {
      position:absolute;
      left:50px;
      top:590px;
      width:330px;
      height:256px;
      z-index:40;
    }
    #pad .hit{
      position:absolute;
      width:110px;
      height:64px;
      background:transparent;
      border:none;
      padding:0;
      margin:0;
      outline:none;
      z-index:41;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }


    /* rows */
    #pad .hit:nth-of-type(1), #pad .hit:nth-of-type(2), #pad .hit:nth-of-type(3){ top:0%; }
    #pad .hit:nth-of-type(4), #pad .hit:nth-of-type(5), #pad .hit:nth-of-type(6){ top:25%; }
    #pad .hit:nth-of-type(7), #pad .hit:nth-of-type(8), #pad .hit:nth-of-type(9){ top:50%; }
    #pad .hit:nth-of-type(10), #pad .hit:nth-of-type(11), #pad .hit:nth-of-type(12){ top:75%; }

    /* Donations overlay text (text only, not a button) */
    #donateText{
      position:absolute;
      left:66.6666%;
      top:75%;
      width:33.3333%;
      height:25%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:7px;
      letter-spacing:1px;
      opacity:.85;
      color: rgba(255,255,255,0.80);
      text-shadow: 0 0 8px rgba(0,0,0,0.55);
      pointer-events:none;
      text-align:center;
      padding:0 6px;
      box-sizing:border-box;
    }
    /* Apply button */
    #apply { bottom: 56px; left: 50px; width: 330px; height: 70px; }

    /* Footer patch + text (covers any ghost footer in artwork) */
    #footerPatch{
      position:absolute;
      left:0;
      bottom:0;
      width:430px;
      height:28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
      pointer-events:none;
    }
    #footer{
      position:absolute;
      left:50px;
      top:900px;
      width:330px;
      text-align:center;
      font-size:8px;
      line-height:1.15;
      color: rgba(255,255,255,0.65);
      text-shadow: 0 0 8px rgba(0,0,0,0.70);
      letter-spacing:0.3px;
      pointer-events:none;
      z-index:21;
    }
  
    /* Header: same width as buttons (330px) */
    #headerBar{
      position:absolute;
      left:50px;
      top:14px;
      width:330px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:10px;
      color: rgba(255,255,255,0.70);
      text-shadow: 0 0 8px rgba(0,0,0,0.55);
      letter-spacing:0.5px;
      pointer-events:none;
      z-index:20;
    }
    #headerBar .hbVer{
      color: rgba(70,160,255,0.95);
      text-shadow: 0 0 10px rgba(70,160,255,0.45);
    }

    /* Footer: same width as buttons, sits closer to APPLY TURN (not wider than buttons) */
    #footer{
      position:absolute;
      left:50px;
      width:330px;
      bottom:30px;
      text-align:center;
      font-size:10px;
      color: rgba(255,255,255,0.70);
      text-shadow: 0 0 8px rgba(0,0,0,0.55);
      letter-spacing:0.5px;
      pointer-events:none;
      z-index:20;
    }
  
    /* Donations cell mask + smaller label (text only) */
    #donateMask{
      position:absolute;
      left:66.6666%;
      top:75%;
      width:33.3333%;
      height:25%;
      background: rgba(0,0,0,0.55);
      border-radius: 14px;
      pointer-events:none;
      z-index:42;
    }
    #donateLabel{
      position:absolute;
      left:66.6666%;
      top:75%;
      width:33.3333%;
      height:25%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-size:6px;
      letter-spacing:1px;
      opacity:.92;
      color: rgba(255,255,255,0.88);
      text-shadow: 0 0 8px rgba(0,0,0,0.75);
      pointer-events:none;
      text-align:center;
      line-height:1.05;
      padding:0 6px;
      box-sizing:border-box;
      z-index:43;
    }
  
    /* Mask the baked-in footer art so our footer text is clean */
    #footerMask{
      position:absolute;
      left:50px;
      top:896px;
      width:330px;
      height:28px;
      background: rgba(0,0,0,0.45);
      border-radius: 10px;
      pointer-events:none;
      z-index:20;
    }
  </style>
</head>

<body>
  <div id="stage">
    <!-- hidden loader img for true dimensions -->
    <img id="bg" src="OUTCHARTAPP.jpeg" alt="bg" />

    <!-- visible background -->
    <div id="bg-visible"></div>

    <!-- overlay in base coordinate space -->
    <div id="overlay">

      <div id="headerBar" aria-hidden="true">
        <span class="hbL">THE DART ROOM</span>
        <span class="hbC"><span class="hbVer">v1.2.8</span></span>
        <span class="hbR">DART CALCULATOR</span>
      </div>

<div id="brand">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>

      <div id="score" class="neon">501</div>

      <div id="dl1" class="dart-label">NEXT 1</div>
      <div id="dl2" class="dart-label">NEXT 2</div>
      <div id="dl3" class="dart-label">NEXT 3</div>

      <div id="d1" class="neon dart-val">-</div>
      <div id="d2" class="neon dart-val">-</div>
      <div id="d3" class="neon dart-val">-</div>

      <div id="input">---</div>

      <!-- Mode hit zones -->
      <button id="m301" class="hit mode" aria-label="301" onclick="APP.set(301)"></button>
      <button id="m501" class="hit mode" aria-label="501" onclick="APP.set(501)"></button>
      <button id="m701" class="hit mode" aria-label="701" onclick="APP.set(701)"></button>

      <!-- Keypad hit zones (invisible, aligned to artwork keypad grid) -->
      <div id="pad" aria-label="Keypad">        <button class="hit" data-key="7" style="left:0px; top:0px;" aria-label="7" onclick="APP.key(7)"></button>
        <button class="hit" data-key="8" style="left:110px; top:0px;" aria-label="8" onclick="APP.key(8)"></button>
        <button class="hit" data-key="9" style="left:220px; top:0px;" aria-label="9" onclick="APP.key(9)"></button>
        <button class="hit" data-key="4" style="left:0px; top:64px;" aria-label="4" onclick="APP.key(4)"></button>
        <button class="hit" data-key="5" style="left:110px; top:64px;" aria-label="5" onclick="APP.key(5)"></button>
        <button class="hit" data-key="6" style="left:220px; top:64px;" aria-label="6" onclick="APP.key(6)"></button>
        <button class="hit" data-key="1" style="left:0px; top:128px;" aria-label="1" onclick="APP.key(1)"></button>
        <button class="hit" data-key="2" style="left:110px; top:128px;" aria-label="2" onclick="APP.key(2)"></button>
        <button class="hit" data-key="3" style="left:220px; top:128px;" aria-label="3" onclick="APP.key(3)"></button>
        <button class="hit" data-key="del" style="left:0px; top:192px;" aria-label="DEL" onclick="APP.clr()"></button>
        <button class="hit" data-key="0" style="left:110px; top:192px;" aria-label="0" onclick="APP.key(0)"></button>
        <button class="hit" data-key="donate" style="left:220px; top:192px;" aria-label="DONATE" onclick="APP.donate()"></button>
        <div id="donateMask" aria-hidden="true"></div>
        <div id="donateLabel" aria-hidden="true">DONATIONS<br>WELCOME</div>
</div>
        <div id="donateLabel" aria-hidden="true">DONATIONS<br>WELCOME</div>
</div>

      <!-- Apply hit zone -->
      <button id="apply" class="hit" aria-label="Apply Turn" onclick="APP.apply()"></button>
<div id="footerMask" aria-hidden="true"></div>
      <div id="footer">Dart Calculator is owned by The Dart Room. © The Dart Room 2026. All Rights Reserved.</div>
    </div>
  </div>

<script>
/**
 * MATH-LOCKED LAYOUT (NO GUESSING):
 * - Background image provides the coordinate system.
 * - Overlay is built in base coordinates (430x932).
 * - We compute ONE transform to fit the background into the viewport.
 * - All hitboxes/text move together, so nothing “floats”.
 */
(function fitToBackground(){
  const bg = document.getElementById('bg');
  const bgVisible = document.getElementById('bg-visible');
  const overlay = document.getElementById('overlay');
  const stage = document.getElementById('stage');

  function applyFit() {
    const Wb = bg.naturalWidth || 430;
    const Hb = bg.naturalHeight || 932;

    const Wv = stage.clientWidth;
    const Hv = stage.clientHeight;

    // Fit entire image into viewport (contain)
    const scale = Math.min(Wv / Wb, Hv / Hb);

    const drawW = Math.round(Wb * scale);
    const drawH = Math.round(Hb * scale);

    const offsetX = Math.round((Wv - drawW) / 2);
    const offsetY = Math.round((Hv - drawH) / 2);

    const SHIFT_UP = 0; // keep full logo visible
    const offsetY2 = Math.max(0, offsetY - SHIFT_UP);

    // Visible background sized/positioned
    bgVisible.style.left = offsetX + 'px';
    bgVisible.style.top = offsetY2 + 'px';
    bgVisible.style.width = drawW + 'px';
    bgVisible.style.height = drawH + 'px';

    // If the jpeg name is wrong, fall back to outs.jpg automatically
    // (GitHub is case-sensitive.)
    bgVisible.style.backgroundImage = "url('OUTCHARTAPP.jpeg'), url('outs.jpg')";

    // Overlay transform: translate to offset, scale to match drawn bg,
    // and also correct from base (430x932) to actual bg pixels (Wb,Hb)
    // by scaling base-to-bg first, then viewport scale.
    const baseW = 430, baseH = 932;
    const sx = (Wb / baseW) * scale;
    const sy = (Hb / baseH) * scale;

    overlay.style.transform = `translate(${offsetX}px, ${offsetY2}px) scale(${sx}, ${sy})`;
  }

  function onReady(){
    applyFit();
    window.addEventListener('resize', applyFit, { passive:true });
  }

  bg.addEventListener('load', onReady);

  // If OUTCHARTAPP.jpeg fails to load, fall back to outs.jpg
  bg.addEventListener('error', () => {
    bg.src = 'outs.jpg';
  });

  // In some caches, load may have already fired
  if (bg.complete) {
    if (bg.naturalWidth) onReady();
    else bg.src = 'outs.jpg';
  }
})();

/* APP LOGIC (ALL BUTTONS ACTIVE) */

  function suggestCheckout(rem){
    // Returns 3 suggested targets (strings) to finish, preferring standard checkouts.
    // Targets: S1-20, D1-20, T1-20, SB (25), DB (50), MISS (0)
    const throws = [];
    for(let n=1;n<=20;n++){
      throws.push({t:`T${n}`, v:3*n});
      throws.push({t:`D${n}`, v:2*n});
      throws.push({t:`S${n}`, v:n});
    }
    throws.push({t:"SB", v:25});
    throws.push({t:"DB", v:50});
    throws.push({t:"MISS", v:0});

    const finishes = new Set();
    for(let n=1;n<=20;n++) finishes.add(2*n); // doubles
    finishes.add(50); // DB

    // brute-force 3 darts, last dart must be a finish
    let best = null;
    for(const a of throws){
      for(const b of throws){
        const r2 = rem - a.v - b.v;
        if(r2 <= 0) continue;
        // choose best last dart that finishes exactly
        for(const c of throws){
          if(!finishes.has(c.v)) continue;
          if(r2 - c.v !== 0) continue;
          const score = a.v*10000 + b.v*100 + c.v; // prefer higher first, then second
          if(!best || score > best.score){
            best = {score, seq:[a.t,b.t,c.t]};
          }
        }
      }
    }
    // fallback: greedy scoring if no checkout
    if(!best){
      const pick = (r)=>{
        if(r>=60) return "T20";
        if(r>=57) return "T19";
        if(r>=54) return "T18";
        if(r>=51) return "T17";
        if(r>=50) return "DB";
        if(r>=40 && r%2===0) return `D${r/2}`;
        if(r>=25) return "SB";
        return `S${Math.max(1, Math.min(20, r))}`;
      };
      let r=rem;
      const seq=[];
      for(let i=0;i<3;i++){
        const t=pick(r);
        const v = t==="DB"?50 : t==="SB"?25 : t==="MISS"?0 : (t[0]==="T"?3: t[0]==="D"?2:1)*parseInt(t.slice(1),10);
        seq.push(t);
        r = Math.max(0, r - v);
      }
      return seq;
    }
    return best.seq;
  }

  var APP = {
  s: 501,
  i: "",

  draw(){
    document.getElementById('score').innerText = this.s;
    document.getElementById('input').innerText = this.i || "---";

    const rem = this.s;
    const seq = (typeof suggestCheckout === 'function') ? suggestCheckout(rem) : ["-","-","-"];
    document.getElementById('d1').innerText = seq[0] || "-";
    document.getElementById('d2').innerText = seq[1] || "-";
    document.getElementById('d3').innerText = seq[2] || "-";
  },

  set(n){
    this.s = n;
    this.i = "";
    this.draw();
  },

  key(n){
    if (this.i.length < 3) {
      this.i += String(n);
      this.draw();
    }
  },

  clr(){
    this.i = "";
    this.draw();
  },

  apply(){
    const v = parseInt(this.i, 10);
    if (!isNaN(v)) {
      const next = this.s - v;
      if (next < 0 || next === 1) {
        this.i = "";
        this.draw();
        return;
      }
      this.s = next;
    }
    this.i = "";
    this.draw();
  },

  donate(){
    window.open("https://venmo.com/u/Steve-Moody-8", "_blank");
  }
};

APP.draw();

</script>
</body>
