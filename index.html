<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DART CALCULATOR - ALIGNED MASTER</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --border: rgba(255, 255, 255, 0.15);
        }

        body { 
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #05070a; 
            color: #fff; 
            font-family: system-ui, sans-serif;
            text-align: center; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            /* PERFECT VERTICAL ALIGNMENT */
            justify-content: space-evenly; 
            align-items: center;
            overflow: hidden;
        }

        /* LOGO - CENTERED & SPACED */
        .logo-container { 
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-main { 
            font-size: 42px; font-weight: 900; 
            background: linear-gradient(to bottom, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 0.85;
        }
        .logo-sub { color: #ffae00; font-size: 12px; font-weight: bold; letter-spacing: 4px; margin-top: 5px; }

        /* THE DECK - ADJUSTED FOR VISIBILITY */
        .deck {
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 20px;
            width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .score-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px; padding: 10px; margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .main-score {
            font-size: 85px; font-weight: 900; line-height: 1;
            margin: 5px 0; text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .mode-buttons { display: flex; justify-content: center; gap: 8px; }
        .mode-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid #444; color: #fff;
            padding: 6px 15px; border-radius: 8px;
            font-size: 13px; font-weight: 800; cursor: pointer;
        }
        .mode-btn.active { border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.2); }

        .dart-grid { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
        .orb {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 15px; padding: 12px 2px; width: 32%;
        }
        .label-blue { color: var(--neon-blue); font-size: 9px; font-weight: 800; letter-spacing: 1px; }
        .target { font-size: 22px; font-weight: 900; color: #fff; display: block; margin-top: 4px; }
        .remain { font-size: 18px; color: var(--neon-pink); font-weight: 900; }

        .input-box {
            background: #000; border: 1px solid var(--neon-blue);
            border-radius: 12px; padding: 10px; font-size: 28px;
            color: var(--neon-blue); margin-bottom: 12px; font-weight: 900;
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .num-btn {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            color: #fff; padding: 15px; font-size: 20px; border-radius: 12px; font-weight: bold;
        }

        .apply {
            grid-column: span 3;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: #000; font-weight: 900; border: none; padding: 15px;
            border-radius: 12px; text-transform: uppercase; letter-spacing: 2px;
        }

        .footer { font-size: 8px; letter-spacing: 2px; opacity: 0.5; margin-top: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-main">DART<br>CALCULATOR</div>
        <div class="logo-sub">LIMITED EDITION</div>
    </div>

    <div class="deck">
        <div class="score-panel">
            <div class="label-blue">SCORE REMAINING</div>
            <div id="main-score" class="main-score">701</div>
            <div class="mode-buttons">
                <button class="mode-btn" id="btn301" onclick="setGame(301)">301</button>
                <button class="mode-btn" id="btn501" onclick="setGame(501)">501</button>
                <button class="mode-btn active" id="btn701" onclick="setGame(701)">701</button>
            </div>
        </div>

        <div class="dart-grid">
            <div class="orb">
                <div class="label-blue">DART 1</div>
                <span class="target" id="d1-t">T20</span>
                <span class="remain" id="d1-r">641</span>
            </div>
            <div class="orb">
                <div class="label-blue">DART 2</div>
                <span class="target" id="d2-t">T20</span>
                <span class="remain" id="d2-r">581</span>
            </div>
            <div class="orb">
                <div class="label-blue">DART 3</div>
                <span class="target" id="d3-t">T20</span>
                <span class="remain" id="d3-r">521</span>
            </div>
        </div>

        <div id="input-display" class="input-box">---</div>

        <div class="numpad">
            <button class="num-btn" onclick="press(7)">7</button>
            <button class="num-btn" onclick="press(8)">8</button>
            <button class="num-btn" onclick="press(9)">9</button>
            <button class="num-btn" onclick="press(4)">4</button>
            <button class="num-btn" onclick="press(5)">5</button>
            <button class="num-btn" onclick="press(6)">6</button>
            <button class="num-btn" onclick="press(1)">1</button>
            <button class="num-btn" onclick="press(2)">2</button>
            <button class="num-btn" onclick="press(3)">3</button>
            <button class="num-btn" onclick="del()" style="color: var(--neon-pink)">DEL</button>
            <button class="num-btn" onclick="press(0)">0</button>
            <button onclick="apply()" class="apply">APPLY TURN</button>
        </div>
        
        <div class="footer">DESIGNED BY STEVE'S GRAPHIC DESIGNS</div>
    </div>

<script>
    let score = 701;
    let input = "";

    const checkouts = { "131": ["T20", "T13", "D16"], "170": ["T20", "T20", "BULL"], "2": ["D1", "nah", "nah"] };

    function getPoints(t) {
        if (t === "nah") return 0;
        if (t === "BULL") return 50;
        if (t.startsWith("T")) return parseInt(t.substring(1)) * 3;
        if (t.startsWith("D")) return parseInt(t.substring(1)) * 2;
        return parseInt(t) || 0;
    }

    function calculateOut(s) {
        if (s <= 40 && s % 2 === 0) return ["D" + (s / 2), "nah", "nah"];
        if (s <= 60) return [(s - 32), "D16", "nah"];
        return ["T20", "T20", "T20"];
    }

    function update() {
        document.getElementById('main-score').innerText = score;
        document.getElementById('input-display').innerText = input || "---";
        let plan = score > 170 ? ["T20", "T20", "T20"] : (checkouts[score] || calculateOut(score));
        let d1t = plan[0], d1r = Math.max(0, score - getPoints(d1t));
        document.getElementById('d1-t').innerText = d1t;
        document.getElementById('d1-r').innerText = d1r;
        let d2t = (d1r <= 0) ? "nah" : plan[1], d2r = Math.max(0, d1r - getPoints(d2t));
        document.getElementById('d2-t').innerText = d2t;
        document.getElementById('d2-r').innerText = (d1r <= 0) ? "" : d2r;
        let d3t = (d2r <= 0) ? "nah" : plan[2], d3r = Math.max(0, d2r - getPoints(d3t));
        document.getElementById('d3-t').innerText = d3t;
        document.getElementById('d3-r').innerText = (d2r <= 0) ? "" : d3r;
    }

    function setGame(n) {
        score = n; input = "";
        document.getElementById('btn301').classList.toggle('active', n === 301);
        document.getElementById('btn501').classList.toggle('active', n === 501);
        document.getElementById('btn701').classList.toggle('active', n === 701);
        update();
    }

    function press(n) { if(input.length < 3) input += n; update(); }
    function del() { input = ""; update(); }
    function apply() {
        let val = parseInt(input);
        if (!isNaN(val)) {
            let next = score - val;
            if (next < 0 || next === 1) alert("BUST");
            else score = next;
        }
        input = ""; update();
    }
    update();
</script>
</body>
</html>
