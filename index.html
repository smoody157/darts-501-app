<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=430, height=932, initial-scale=1.0, user-scalable=no">
    <title>DART PRO CALCULATOR</title>
    <style>
        body, html { margin: 0; padding: 0; width: 430px; height: 932px; background: #000; overflow: hidden; display: flex; justify-content: center; }
        #canvas {
            width: 430px; height: 932px;
            background-image: url('IMG_7543.png');
            background-size: 100% 100%;
            position: relative;
        }
        /* Overlays aligned to your image graphics */
        #score-display { position: absolute; top: 185px; width: 100%; text-align: center; font-size: 95px; color: #fff; font-family: 'Arial Black', sans-serif; text-shadow: 0 0 20px #00d2ff; }
        .orb { position: absolute; width: 105px; text-align: center; top: 390px; }
        #o1 { left: 40px; } #o2 { left: 165px; } #o3 { left: 290px; }
        .dart-target { font-size: 34px; color: #fff; display: block; font-weight: 900; }
        .remainder { font-size: 14px; color: #ff007f; font-weight: 900; }
        #input-view { position: absolute; top: 500px; width: 100%; text-align: center; font-size: 48px; color: #00d2ff; font-weight: 900; }
        
        /* Hit-Box Grids */
        .mode-btn { position: absolute; top: 300px; width: 80px; height: 45px; cursor: pointer; }
        .key { background: transparent; border: none; cursor: pointer; }
        .keypad { position: absolute; top: 560px; left: 40px; width: 350px; height: 260px; display: grid; grid-template-columns: repeat(3, 1fr); }
        .apply { position: absolute; bottom: 40px; left: 40px; width: 350px; height: 80px; background: transparent; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div id="canvas">
    <div id="score-display">701</div>
    <div class="mode-btn" style="left:82px" onclick="resetGame(301)"></div>
    <div class="mode-btn" style="left:175px" onclick="resetGame(501)"></div>
    <div class="mode-btn" style="left:268px" onclick="resetGame(701)"></div>
    
    <div class="orb" id="o1"><span class="dart-target" id="t1">-</span><span class="remainder" id="r1"></span></div>
    <div class="orb" id="o2"><span class="dart-target" id="t2">-</span><span class="remainder" id="r2"></span></div>
    <div class="orb" id="o3"><span class="dart-target" id="t3">-</span><span class="remainder" id="r3"></span></div>

    <div id="input-view">---</div>

    <div class="keypad">
        <button class="key" onclick="press(7)"></button><button class="key" onclick="press(8)"></button><button class="key" onclick="press(9)"></button>
        <button class="key" onclick="press(4)"></button><button class="key" onclick="press(5)"></button><button class="key" onclick="press(6)"></button>
        <button class="key" onclick="press(1)"></button><button class="key" onclick="press(2)"></button><button class="key" onclick="press(3)"></button>
        <button class="key" onclick="del()"></button><button class="key" onclick="press(0)"></button>
    </div>
    <button class="apply" onclick="calculate()"></button>
</div>

<script>
    let score = 701; let input = ""; let lastCall = null;
    
    // Manual DB (Outchart Brain)
    const outDB = { 
        170:["T20","T20","DB"], 167:["T20","T19","DB"], 164:["T20","T18","DB"], 161:["T20","T17","DB"], 160:["T20","T20","D20"],
        125:["DB","T20","D20"], 121:["T20","T11","D14"], 100:["T20","D20","-"], 50:["DB","-","-"], 40:["D20","-","-"] 
    };
    
    function voiceCall(path) {
        if (!path || path[0] === "-") return;
        let text = path.filter(x => x !== "-").join(", ")
            .replace(/T/g, "Triple ")
            .replace(/D(\d+)/g, "Double $1")
            .replace(/DB/g, "Double Bull");
        let msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function getVal(s) {
        if(!s || s==="-") return 0; if(s==="DB") return 50;
        let n = parseInt(s.substring(1)); return s[0]==="T" ? n*3 : (s[0]==="D" ? n*2 : n);
    }

    function render() {
        document.getElementById('score-display').innerText = score;
        document.getElementById('input-view').innerText = input || "---";
        
        let path = outDB[score] || (score > 170 ? ["-","-","-"] : ["T20", "S20", "D"+Math.floor((score-80)/2)]);
        if(score <= 1) path = ["-","-","-"];
        
        document.getElementById('t1').innerText = path[0];
        let r1 = score - getVal(path[0]); document.getElementById('r1').innerText = r1 > 0 ? r1 : "";
        document.getElementById('t2').innerText = path[1];
        let r2 = r1 - getVal(path[1]); document.getElementById('r2').innerText = r2 > 0 ? r2 : "";
        document.getElementById('t3').innerText = path[2];

        // Voice Activation Logic
        if(score <= 170 && score > 1 && score !== lastCall) { 
            voiceCall(path); 
            lastCall = score; 
        }
    }

    function resetGame(n) { score = n; input = ""; lastCall = null; render(); }
    function press(n) { if(input.length < 3) input += n; render(); }
    function del() { input = ""; render(); }
    function calculate() {
        let v = parseInt(input);
        if(!isNaN(v)) { 
            if(score - v < 0 || score - v === 1) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bust"));
            } else {
                score -= v;
            }
        }
        input = ""; render();
    }
    render();
</script>
</body>
</html>
