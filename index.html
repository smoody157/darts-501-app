    <style>

        #branding { color: #00FFCC; font-size: 12px; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { color: #FF00FF; font-size: 28px; margin: 5px 0; text-shadow: 2px 2px #440044; }
        #score-box { font-size: 60px; color: #00CCFF; margin: 10px 0; font-weight: bold; }
        #target-display { background: #111; border: 5px solid #333; border-radius: 20px; padding: 30px; margin: 15px auto; width: 85%; }

        #next-dart { font-size: 90px; color: #39FF14; text-shadow: 0 0 15px #39FF14; }
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 320px; margin: 0 auto; }
        button { background: #222; border: 2px solid #444; color: #fff; padding: 20px; font-size: 24px; border-radius: 12px; font-weight: bold; }
        button:active { background: #39FF14; color: #000; }
        .enter-btn { background: #004400; border-color: #00FF00; color: #00FF00; }
        .del-btn { background: #440000; border-color: #FF0000; color: #FF0000; }

    function update() {
        document.getElementById('score-box').innerText = entry || score;

        if (score === 0) target = "WIN";
        document.getElementById('next-dart').innerText = target;
    }

    function num(n) { 
        if (entry.length < 3) {
            entry += n; 
            update(); 
        }
    }

    function del() { 
        entry = ""; 
        update(); 
    }

    function ent() {
        let val = parseInt(entry);
        if (!isNaN(val)) {
            let remain = score - val;
            if (remain < 0 || remain === 1) {

            } else {
                score = remain;
            }
        }
        entry = "";
        update();
    }
